let recognition;
let _currentRecorder = null;
let _currentAudioBlob = null;
// Set to true only when the student explicitly tapped the "⏹ 完成" button
// (i.e. _stopRecordingFromUI ran). Used to gate the recognition onend
// / onerror fallback paths so we don't auto-jump to the result page when
// the browser internally auto-stops the recognition session (e.g. Chrome
// macOS zHK backend unstable: starts the session, ~1s later auto-ends
// without ever firing onresult). Before this flag, that auto-end would
// trigger _fallbackScore → scorePassage → navigate to result page
// before the student has had a chance to even read the passage, hence
// the "1 second auto-skip" UX bug.
let _userExplicitlyStopped = false;
// Flag set by the user from the "⏭ 跳過等侯" button on the transcribe
// progress banner. Read inside the transcribe Promise to bail out of
// slow CDN/model loads (e.g. Whisper first-use ~40MB download) and go
// straight to a transcript-only result page. Module-scope so the
// inline onclick="App._skipTranscribe()" handler can flip it.
let _transcribeSkipRequested = false;
// Last score context, used by the result page's "edit transcript" textbox
// to live-rerender sub-scores + diff + fluency without re-recording. Set
// inside scorePassage's render path, read by _rerenderWithTranscript.
let _lastScoreContext = null;  // { target, passage, transcript, features, scoreResult, audioBlob }

// "Stop recording" trigger from the in-recording UI button.
// Works for both Web Speech (recognition.stop()) and MediaRecorder (recorder.stop()).
function _stopRecordingFromUI() {
  // Instant visual feedback so the user doesn't think the page is frozen
  // (transcription + scoring takes 200ms-2s depending on engine).
  // Re-query each time: the user may have navigated away and back, which
  // would re-render assessmentContent and detach the previously-cached
  // recordingStatus div.
  const status = document.getElementById('recordingStatus');
  if (status) {
    status.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin:8px 0;">
        <div style="font-size:1.3em;color:#0ea5e9;font-weight:bold;display:flex;align-items:center;gap:8px;">
          <span style="display:inline-block;width:12px;height:12px;background:#0ea5e9;border-radius:50%;animation:recbar-pulse 1.2s ease-in-out infinite;"></span>
          ⏳ 處理中…
        </div>
        <div class="recbar"><div class="recbar-processing"></div></div>
        <div style="font-size:0.95em;color:rgba(255,255,255,0.6);">分析錄音 + 評分中</div>
      </div>`;
  }
  // Disable the 完成 button so a double-tap doesn't fire onstop twice
  // (the 完成 button is the only button inside #recordingStatus that contains '⏹')
  if (status) {
    status.querySelectorAll('button').forEach(b => {
      if ((b.textContent || '').includes('⏹ 完成')) {
        b.disabled = true;
        b.textContent = '⏳ 處理中…';
      }
    });
  }
  try {
    // Mark the user as the one who triggered the stop. This gates the
    // recognition onend/onerror fallback paths below so Chrome's internal
    // auto-end (e.g. macOS zHK backend unstable, no-speech) doesn't kick
    // the user out to the result page mid-recording.
    _userExplicitlyStopped = true;
    __debug.log('stopFromUI', { recognitionActive: !!(typeof recognition !== 'undefined' && recognition), recState: _currentRecorder?.state, recMIME: _currentRecorder?.mimeType });
    if (typeof recognition !== 'undefined' && recognition) {
      try { recognition.stop(); } catch(e) { __debug.warn('stopFromUI.recognition.stop.fail', e); }
    }
    if (_currentRecorder && _currentRecorder.state === 'recording') {
      __debug.mark('MR.stop()');
      _currentRecorder.stop();
    } else {
      __debug.warn('stopFromUI.noActiveRecorder', { state: _currentRecorder?.state, isNull: _currentRecorder == null });
    }
  } catch(e) { console.warn('stop from UI failed', e); __debug.error('stopFromUI.outerCatch', e); }
}

function startRecording() {
  const status = document.getElementById('recordingStatus');
  const engine = _ASR_ENGINES[state.asrEngine] || _ASR_ENGINES.webspeech;
  const passage = state.currentPassage;
  // Reset the explicit-stop flag for this recording session. Without this
  // reset, a previous session's "⏹ 完成" tap (which set the flag) would
  // permanently enable the fallback, so the first Chrome auto-end of the
  // NEW session would also fire scorePassage prematurely.
  _userExplicitlyStopped = false;
  // No auto-stop: student finishes when ready, then taps "完成" button.
  state.recordingTimeout = null;
  __debug.log('startRecording', { engine: engine.id, engineName: engine.name, passageId: passage?.id, passageTitle: passage?.title, available: engine.isAvailable() });

  if (!engine.isAvailable()) {
    __debug.warn('startRecording.engineUnavailable', { engine: engine.id });
    status.innerHTML = '❌ 此裝置唔支援 ' + engine.name;
    return;
  }

  status.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin:8px 0;">
      <div style="font-size:1.4em;color:#ef4444;font-weight:bold;display:flex;align-items:center;gap:8px;">
        <span style="display:inline-block;width:14px;height:14px;background:#ef4444;border-radius:50%;animation:recbar-pulse 1.0s ease-in-out infinite;"></span>
        🔴 錄音中
      </div>
      <div class="recbar"><div class="recbar-recording"></div></div>
      <div style="font-size:1em;color:rgba(255,255,255,0.7);">大聲朗讀文章，準備好就撳「完成」 👄</div>
      <button onclick="App._stopRecordingFromUI()" style="background:#22c55e;font-size:1.2em;padding:14px 32px;min-height:56px;border-radius:14px;color:#fff;min-width:160px;">⏹ 完成</button>
    </div>`;

  // For non-WebSpeech engines, we use MediaRecorder to capture audio blob
  if (engine.id === 'webspeech') {
    // Abort any prior recognition session before starting a new one. The
    // previous session's onend can fire AFTER the student has moved on to
    // a new passage (e.g. a slow onend from a prior noSpeech path), and
    // would otherwise trigger _fallbackScore against the new currentPassage,
    // producing a phantom 0 score the student didn't earn. Without this
    // guard, the user sees: "I read 床前明月光 perfectly" → result page
    // suddenly shows 0 分 on the NEW passage. (Production fix 2026-06-15.)
    if (recognition) {
      try { recognition.abort(); } catch(e) { /* ignore */ }
      try { recognition.onend = null; recognition.onerror = null; recognition.onresult = null; } catch(e) {}
      recognition = null;
    }
    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
      status.innerHTML = '❌ 請用 Chrome（Safari 支援有限）';
      return;
    }
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRec();
    recognition.lang = 'zh-HK';
    recognition.continuous = false;
    recognition.interimResults = false;

    try { recognition.start(); } catch (e) {
      console.error(e);
      // Re-query status (closure-captured one may be detached).
      const st = document.getElementById('recordingStatus');
      if (st) st.innerHTML = '❌ 無法啟動錄音，請檢查權限';
      return;
    }
    // Auto-abort watchdog. Chrome's internal no-speech timeout is
    // 10-15s but unreliable across versions. If the user has been
    // silent for 15s without producing a transcript, force-abort the
    // recognition session so they aren't stranded on the 錄音中 status
    // forever. Without this, onerror/onend can both fail to fire (e.g.
    // Safari webkitSpeechRecognition partial impl) and the user has
    // no way to abandon. The user can re-tap "開始朗讀" to start over.
    setTimeout(() => {
      if (_userExplicitlyStopped) return;  // user already finished
      const st = document.getElementById('recordingStatus');
      const onResult = st && st.innerHTML.includes('你讀咗：');
      if (onResult) return;  // already produced a result
      try { recognition.abort(); } catch (e) {}
      if (st && (st.innerHTML.includes('錄音中') || st.innerHTML.includes('⏳'))) {
        st.innerHTML = '⏱ 錄音超時（15 秒無語音輸入），請再試一次';
      }
    }, 15000);

    // Parallel MediaRecorder capture for webspeech engine. Web Speech API
    // gives us the transcript but no audio data, so fluency/expression
    // sub-scores were always null AND the replay button had nothing to
    // play. Capture the same mic stream independently so _analyzeAudioFeatures
    // can compute duration/pause/RMS, AND _currentAudioBlob is set for
    // the replay button. If getUserMedia fails (very rare since webspeech
    // already opened the mic), we silently fall back to transcript-only.
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        // Don't clobber a recorder that was started for whisper/custom.
        if (_currentRecorder) {
          stream.getTracks().forEach(t => t.stop());
          return;
        }
        const rec = new MediaRecorder(stream);
        const chunks = [];
        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        rec.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          // Only set if no other engine has already populated it
          if (!_currentAudioBlob) {
            _currentAudioBlob = new Blob(chunks, { type: 'audio/webm' });
          }
          // Clear the recorder reference so a subsequent startRecording
          // (e.g. user records a 2nd passage) can open a fresh parallel
          // recorder. Without this, the `if (_currentRecorder)` guard
          // above permanently bails out and we lose audioBlob coverage
          // for the 2nd+ recording session in the same page session.
          if (_currentRecorder === rec) _currentRecorder = null;
        };
        _currentRecorder = rec;
        try { rec.start(); }
        catch (e) { console.warn('parallel recorder start failed', e); }
      }).catch(e => { console.warn('parallel getUserMedia failed', e); });
    }

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.trim();
      // Re-query the status element: the closure-captured `status` may
      // point to a detached DOM node if the user navigated away from
      // the assessment page mid-recording (e.g. via back button) and
      // the assessmentContent was re-rendered, replacing the
      // recordingStatus div. Without this re-query, status.innerHTML
      // writes go to the detached element and the user sees no
      // feedback — looks like a silent hang.
      const st = document.getElementById('recordingStatus');
      if (st) st.innerHTML = `你讀咗：${_e(transcript)}`;
      // The parallel MediaRecorder's onstop may run AFTER onresult
      // (recognition.stop() + recorder.stop() in _stopRecordingFromUI
      //  fire onresult synchronously, but onstop is async). Poll up to
      // 1500ms for the blob so _analyzeAudioFeatures has real audio
      // data. Without this, fluency/expression are null and the replay
      // button is broken for the webspeech engine. 1500ms is generous
      // (typical onstop fires within 200ms) but covers slow devices.
      const tryScore = (blob) => scorePassage(transcript, { audioBlob: blob || null });
      if (_currentAudioBlob) {
        tryScore(_currentAudioBlob);
      } else {
        let waited = 0;
        const t = setInterval(() => {
          waited += 50;
          if (_currentAudioBlob || waited >= 1500) {
            clearInterval(t);
            tryScore(_currentAudioBlob);
          }
        }, 50);
      }
    };
    // Module-scoped guard: only one fallback scorePassage call per
    // recognition session, regardless of which path triggers it.
    let _recognitionScored = false;
    function _fallbackScore(reason, msg) {
      if (_recognitionScored) return;
      _recognitionScored = true;
      const p = state.currentPassage;
      if (p) scorePassage('', { engine: 'webspeech', noSpeech: true, errorMsg: msg || reason });
    }

    recognition.onerror = (event) => {
      console.error('Speech error:', event.error);
      let msg = '❌ 錄音出錯';
      if (event.error === 'not-allowed') msg = '❌ 請允許麥克風權限';
      else if (event.error === 'network') msg = '❌ 需要網絡連接';
      else if (event.error === 'no-speech') msg = '❌ 冇聽到聲音，請大聲啲';
      else if (event.error === 'audio-capture') msg = '❌ 麥克風問題，請檢查';
      else if (event.error === 'service-not-allowed') msg = '❌ 瀏覽器不支援，請用 Chrome';
      else if (event.error === 'aborted') msg = '❌ 已取消，請再試';
      else msg = '❌ 請大聲啲或換個安靜地方';
      // Do NOT auto-trigger scorePassage here. Previously we had
      // setTimeout(_fallbackScore, 600) which caused a "1 second auto
      // skip to result page" bug: Chrome on macOS rejects the recognition
      // session fast (e.g. mic permission still pending or zHK backend
      // unavailable), the user sees a flash of error message, then 600ms
      // later they're whisked to the result page before they had a chance
      // to do anything. Instead: show the error inline + give the user a
      // "🔄 再試一次" button so they can choose to retry. If they want
      // to give up on this recording, they can hit the back button to
      // pick a different passage — we no longer trap them on the result
      // page with a forced 0 score.
      // Re-query the status element (closure-captured one may be
      // detached if the user navigated during recording).
      const st = document.getElementById('recordingStatus');
      if (st) st.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin:8px 0;">
          <div style="font-size:1.1em;color:#ef4444;font-weight:bold;">${msg}</div>
          <div style="font-size:0.85em;color:rgba(255,255,255,0.6);">你可以再撳下面掣重試，或揀過另一篇文章。</div>
          <button onclick="App.startRecording()" style="background:#0ea5e9;font-size:1em;padding:10px 18px;border-radius:10px;color:#fff;min-height:48px;">🔄 再試一次</button>
        </div>`;
    };
    recognition.onend = () => {
      // Only fire fallback if:
      //  (a) onresult never fired (so we don't have a transcript yet)
      //  (b) the user explicitly tapped "⏹ 完成" (so they're expecting
      //      the result page navigation)
      // Without _userExplicitlyStopped guard, Chrome's internal auto-end
      // (which fires ~1s after start on macOS with unstable zHK backend)
      // would trigger fallback → scorePassage → navigate → "1 second
      // auto-skip" UX bug.
      // Re-query status: closure-captured one may be detached if user
      // navigated during recording.
      const st = document.getElementById('recordingStatus');
      const alreadyScored = st ? st.innerHTML.startsWith('你讀咗：') : true;
      if (alreadyScored) return;  // onresult already handled this
      if (!_userExplicitlyStopped) {
        // Browser auto-ended without user input. Just leave the recording
        // status as-is (the error handler above already showed retry
        // buttons if onerror fired; otherwise the original "🔴 錄音中" +
        // "⏹ 完成" button is still there). The user can tap 完成 to
        // explicitly end and trigger the scoring path.
        return;
      }
      const p = state.currentPassage;
      if (p) {
        _fallbackScore('end');
      } else {
        if (st) st.innerHTML = `錄音結束 — 冇收到語音。撳「🎤 讀一次」重試，或撳「📖 其他文章 →」揀別篇。`;
      }
    };
  } else {
    // Whisper / Custom: use MediaRecorder to capture audio blob
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      status.innerHTML = '❌ 此瀏覽器不支援錄音';
      return;
    }
    __debug.mark('getUserMedia.start');
    // Race getUserMedia against a 5s timeout. If the user denied mic
    // permission, blocked the prompt, or the OS mic mutex is held by
    // another app (e.g. Zoom), getUserMedia hangs forever with no
    // feedback. Without this timeout, the user sees "🔴 錄音中"
    // and a non-responsive 完成 button — they don't know what's wrong.
    // 5s is generous for normal mic-grant flow (sub-second typical).
    const __gumTimeout = setTimeout(() => {
      __debug.warn('getUserMedia.timeout.5s', { msg: 'mic permission or device unavailable' });
      const st = document.getElementById('recordingStatus');
      if (st) st.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin:8px 0;">
          <div style="font-size:1.1em;color:#ef4444;font-weight:bold;">❌ 麥克風 5 秒內無回應</div>
          <div style="font-size:0.85em;color:rgba(255,255,255,0.6);text-align:center;line-height:1.4;">
            可能原因：瀏覽器冇彈 mic 權限 dialog、權限被 block、或其他 app 鎖住 mic。<br>
            請去 Chrome 網址列左邊嘅 🔒 icon 確認 mic 權限為「允許」，然後重試。
          </div>
          <button onclick="App.startRecording()" style="background:#0ea5e9;font-size:1em;padding:10px 18px;border-radius:10px;color:#fff;min-height:48px;">🔄 再試一次</button>
        </div>`;
      showToast('❌ 麥克風無回應，檢查權限');
    }, 5000);
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      clearTimeout(__gumTimeout);
      __debug.log('getUserMedia.then', { tracks: stream.getTracks().length, trackKinds: stream.getTracks().map(t => t.kind) });
      _currentRecorder = new MediaRecorder(stream);
      const rec = _currentRecorder;  // capture for closure
      const chunks = [];
      _currentRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          chunks.push(e.data);
          __debug.log('MR.ondataavailable', { size: e.data.size, chunkCount: chunks.length });
        }
      };
      _currentRecorder.onstop = async function() {
        __debug.mark('onstop.fire');
        __debug.log('onstop.entry', { thisIsRec: this === _currentRecorder, _currentRecorderIsRec: _currentRecorder === rec, recState: this?.state, chunkCount: chunks.length });
        // CRITICAL: must be a `function` (not arrow) so `this` is the
        // MediaRecorder instance, not the enclosing lexical scope.
        // The stale-fire guard below compares `this` against
        // `_currentRecorder` to filter out callbacks from a previous
        // recording session that the user already abandoned. If we
        // used an arrow function here, `this` would be `window` (the
        // enclosing scope's this) and the guard would always trigger,
        // making the entire onstop body a no-op. Result: audioBlob
        // never gets set, transcribe never runs, the 5s scorePassage
        // watchdog fires, the result page's audioBlob-dependent
        // sub-scores stay null, and the user sees a permanent
        // "⏳ 處理中…" with no navigation to the result page.
        // Guard against double-fire: if 完成 is tapped twice (e.g. SEN
        // student re-tapping before the first tap's async transcribe has
        // returned), both stop() calls land on the same MediaRecorder
        // instance, and the same onstop can fire twice. The 完成 button
        // is disabled in _stopRecordingFromUI but a queued click event
        // can still land. Without this guard: 2 history records, double
        // confetti, and double progress write.
        if (_currentRecorder !== this) {
          __debug.warn('onstop.staleFireGuard', { thisIsRec: this === rec, _currentRecorderIsRec: _currentRecorder === rec });
          return;
        }
        __debug.log('onstop.guardPassed', { recState: this?.state, recMime: this?.mimeType });
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: 'audio/webm' });
        _currentAudioBlob = blob;
        _currentRecorder = null;
        __debug.log('onstop.blobCreated', { blobSize: blob.size, blobType: blob.type });
        // Engine-specific progress UI. Whisper needs ~40MB model download
        // on first use (1-3 min) and then inference. Without a cancel
        // button, a stuck transcribe (e.g. CDN blocked, ad-blocker
        // intercepting) leaves the user staring at '⏳ 處理中…'
        // forever — they have no way to abandon the recording. This
        // banner with a manual-skip button gives them an exit.
        //
        // Skip-grace design (2026-06-18):
        // Production trace showed users clicking the skip button within
        // 130ms of the banner appearing — the "⏭ 跳過等侯" button was
        // visually too prominent and the "下載 40MB" hint made them panic.
        // Result: a 4.76s recording got scored as "noSpeech: total=12"
        // because the user skipped before inference even started.
        //
        // Fix: hide the skip button for the first 5 seconds. Cached
        // model + WASM-warm inference completes in 2-5s, so most users
        // never see the skip button at all and get a real score. Slow
        // first-use (5-15s typical) users see the button appear after
        // the cache hit window has passed — by then they have real
        // feedback that inference is actively working, and clicking
        // skip is an informed choice not a panic reflex.
        const __SKIP_BUTTON_GRACE_MS = 5000;
        const __inferenceStartMs = Date.now();
        const __isSkipButtonVisible = () =>
          (Date.now() - __inferenceStartMs) >= __SKIP_BUTTON_GRACE_MS;
        const progressBanner = (msg) => {
          // Re-query status: closure-captured one may be detached if user
          // navigated during recording.
          const st = document.getElementById('recordingStatus');
          if (!st) return;
          const skipVisible = __isSkipButtonVisible();
          const skipBlock = skipVisible
            ? `<button onclick="App._skipTranscribe()" style="background:#4b5563;font-size:0.9em;padding:7px 14px;border-radius:10px;color:#fff;min-height:40px;opacity:0.85;">⏭ 放棄等侯，手動輸入 transcript</button>`
            : `<div style="font-size:0.8em;color:rgba(255,255,255,0.45);font-style:italic;">⏭ 跳過掣將於 5 秒後出現</div>`;
          st.innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin:8px 0;">
              <div style="font-size:1.2em;color:#7c3aed;font-weight:bold;display:flex;align-items:center;gap:8px;">
                <span style="display:inline-block;width:12px;height:12px;background:#7c3aed;border-radius:50%;animation:recbar-pulse 1.4s ease-in-out infinite;"></span>
                ⏳ ${_e(msg)}
              </div>
              <div class="recbar"><div class="recbar-whisper"></div></div>
              <div style="font-size:0.85em;color:rgba(255,255,255,0.6);">下載 Whisper 模型約 40MB（首次使用），請耐心等候…</div>
              ${skipBlock}
            </div>`;
        };
        // Reset skip flag for this recording session.
        _transcribeSkipRequested = false;
        // Re-render the banner once the skip-button grace period ends so
        // the button actually appears (the first onProgress may fire
        // before the 5s mark, painting the banner without the button).
        setTimeout(() => {
          // Only re-render if we're still in the inference phase (i.e.
          // the banner is still showing the progress UI, not the result
          // page or an error state). Cheap heuristic: re-query status and
          // check that it still has the ⏳ marker.
          const st = document.getElementById('recordingStatus');
          if (st && st.innerHTML.includes('⏳') && !st.innerHTML.includes('放棄等侯')) {
            // Extract current message from existing banner; fallback to
            // a generic label if parsing fails.
            const m = st.innerHTML.match(/⏳ ([^<]+)/);
            const currentMsg = m ? m[1].trim() : '處理中…';
            progressBanner(currentMsg);
          }
        }, __SKIP_BUTTON_GRACE_MS);
        // FIX (Bug B + C): External 12s watchdog + 200ms skip poller.
        // The inner 8s Promise.race timeout is the FIRST layer of defense
        // — it relies on the engine actually rejecting (or the re-throw
        // fix in whisper.transcribe propagating). But if a different
        // engine path or an in-pipeline WASM loop hangs without rejecting,
        // we still need a guarantee that the user lands on the result
        // page. The 200ms skip poller also fixes Bug C: the previous
        // design only checked _transcribeSkipRequested inside the
        // onProgress callback, which never fires if the engine is stuck
        // BEFORE its first progress update (e.g. import() blocked
        // without ever reaching the stage change that fires the
        // onProgress({ stage: 'cdn-load' }) call).
        let __onstopResolved = false;
        const __onstopSafeNavigate = (reason) => {
          if (__onstopResolved) return;
          __onstopResolved = true;
          __debug.log('onstop.safeNavigate', { reason });
          if (state.currentPassage) {
            scorePassage('', { engine: engine.id, audioBlob: blob, noSpeech: true, errorMsg: reason });
          }
        };
        const __onstopWatchdog = setTimeout(() => {
          __debug.warn('onstop.watchdog35s', { msg: 'external watchdog fired' });
          console.warn('[onstop] external watchdog 35s — forcing fallback');
          __onstopSafeNavigate('⏰ 引擎等侯超時（35秒），已自動跳到結果頁');
        }, 35000);
        const __onstopSkipPoll = setInterval(() => {
          if (_transcribeSkipRequested) {
            __debug.log('onstop.skipPolled', { skipFlag: true });
            console.log('[onstop] user skipped — forcing fallback');
            __onstopSafeNavigate('⏭ 用戶跳過等侯');
          }
        }, 200);
        try {
          // 30-second race timeout for the actual transcribe inference.
          // Production evidence (2026-06-17 user trace): pipe() inference
          // legitimately takes 7+ seconds for ~6s of audio on first use
          // (WASM warmup + chunked stride processing). The previous 8s
          // race was way too aggressive — it timed out before inference
          // even started emitting results, dropping the user into a
          // empty-transcript fallback when the model was actually working.
          // The user-visible cost is: "score = 12" on what should have
          // been a real score.
          //
          // Why 30s, not 60s:
          //   - On a cached model + WASM-warm second run: inference
          //     completes in 2-5s.
          //   - On first-use WASM compile + model download: 5-15s
          //     typical, up to 25s on slow devices.
          //   - Beyond 30s the user has already given up mentally; better
          //     to land on the result page with a clear error than to
          //     make them stare at a spinner.
          __debug.mark('engine.transcribe.start');
          let transcribeResult;
          try {
            transcribeResult = await Promise.race([
              engine.transcribe(blob, (progress) => {
                __debug.log('transcribe.progress', { stage: progress.stage, message: progress.message });
                progressBanner(progress.message || '處理中…');
                if (_transcribeSkipRequested) throw new Error('user-skipped');
              }),
              new Promise((_, rej) => setTimeout(() => {
                __debug.warn('transcribe.race30s.timeout');
                rej(new Error('transcribe timeout (30s)'));
              }, 30000))
            ]);
            __debug.mark('engine.transcribe.end');
            __debug.log('transcribe.resolved', { text: transcribeResult?.text?.substring(0, 60), textLen: transcribeResult?.text?.length });
          } catch (transcribeErr) {
            __debug.warn('transcribe.rejected', { message: transcribeErr.message, name: transcribeErr.name });
            console.warn('[onstop] transcribe failed/timed out:', transcribeErr.message);
            transcribeResult = { text: '', error: transcribeErr.message };
          }
          // If the external watchdog or skip-poller already navigated,
          // don't double-render. The scorePassage('') inside safeNavigate
          // has its own 5s watchdog so we're covered either way.
          if (__onstopResolved) return;
          const result = transcribeResult || { text: '' };
          // Re-query status: closure-captured one may be detached.
          const st = document.getElementById('recordingStatus');
          // If engine returned text, score it. If empty (mock/whisper not
          // implemented, or timeout), fall through to the custom/manual path.
          if (result.text) {
            if (st) st.innerHTML = `你讀咗：${_e(result.text)}`;
            __debug.log('onstop.scorePath.text', { transcriptLen: result.text.length });
            scorePassage(result.text, { engine: engine.id, audioBlob: blob, raw: result.raw });
          } else {
            if (engine.id === 'custom') {
              if (st) st.innerHTML = '🎤 自訂模式：分析聲音特徵中…';
              let customScore;
              try {
                customScore = await _customScoreAudio(blob, state.currentPassage);
              } catch (e) { customScore = { score: 0, error: e.message }; }
              __debug.log('onstop.scorePath.custom', { score: customScore.score });
              scorePassage('', { engine: 'custom', customScore, audioBlob: blob });
            } else {
              // Whisper / engine that returned no text: STILL go to result
              // page with a fallback 0 score + helpful note. The old path
              // prompted for manual input, which could be skipped or hang.
              if (st) st.innerHTML = `⚠️ ${engine.name} 未能識別 — 跳到結果頁。`;
              __debug.log('onstop.scorePath.noSpeech', { engine: engine.id, error: result.error });
              scorePassage('', { engine: engine.id, audioBlob: blob, noSpeech: true });
            }
          }
        } catch (e) {
          // Outer catch (very rare — should not happen now that inner has
          // its own try/catch). Stay safe: navigate to fallback result.
          __debug.error('onstop.outerCatch', e);
          console.error('[onstop] outer error:', e);
          if (state.currentPassage && !__onstopResolved) {
            scorePassage('', { engine: engine.id, audioBlob: blob, noSpeech: true, errorMsg: '引擎錯誤：' + e.message });
          }
        } finally {
          clearTimeout(__onstopWatchdog);
          clearInterval(__onstopSkipPoll);
        }
      };
      __debug.mark('MR.start()');
      try {
        _currentRecorder.start();
        __debug.log('MR.start.done', { state: _currentRecorder.state, mimeType: _currentRecorder.mimeType });
      } catch (startErr) {
        __debug.error('MR.start.fail', startErr);
        throw startErr;
      }
      // No auto-stop: student finishes when ready and taps "完成".
    }).catch(err => {
      clearTimeout(__gumTimeout);
      __debug.error('getUserMedia.catch', err);
      // Re-query status (closure-captured one may be detached).
      const st = document.getElementById('recordingStatus');
      if (st) st.innerHTML = '❌ 麥克風權限被拒：' + err.message;
    });
  }
}

function _promptManualPassageInput(status, passage) {
  // Fallback: ask student what they read (text input)
  const txt = prompt(`你讀嘅文章：${passage.title}\n\n輸入你讀咗嘅文字（粵語/普通話皆可）：`);
  if (txt === null) {
    status.innerHTML = '已取消';
    return;
  }
  status.innerHTML = `你讀咗：${_e(txt)}`;
  scorePassage(txt, { engine: 'manual' });
}

async function _customScoreAudio(audioBlob, passage) {
  try {
    const arrayBuffer = await audioBlob.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    audioCtx.close();

    const channel = decoded.getChannelData(0);
    const duration = decoded.duration;
    let sumSq = 0, peak = 0, zcr = 0;
    for (let i = 0; i < channel.length; i++) {
      const v = channel[i];
      sumSq += v * v;
      if (Math.abs(v) > peak) peak = Math.abs(v);
      if (i > 0 && Math.sign(channel[i-1]) !== Math.sign(v)) zcr++;
    }
    const rms = Math.sqrt(sumSq / channel.length);
    // Recording is unlimited — duration match is gentle (only penalises very short or runaway-long takes).
    const expected = 15;
    const durationMatch = duration > 2 ? Math.max(0, 1 - Math.abs(duration - expected) / Math.max(duration, expected)) : 0;
    const energyMatch = rms > 0.01 ? 0.8 : 0.4;
    const score = Math.round(Math.min(100, Math.max(0, energyMatch * 50 + durationMatch * 40 + (peak > 0.05 ? 10 : 0))));
    return { score, duration, rms, peak, durationMatch, energyMatch };
  } catch (e) {
    console.warn('custom scoring failed', e);
    return { score: 60, error: e.message };
  }
}

function _getAudioBaseline(word) {
  try {
    const all = JSON.parse(localStorage.getItem('yueAudioBaselines') || '{}');
    return all[word] || {};
  } catch(e) { return {}; }
}

function _updateAudioBaseline(word, features) {
  try {
    const all = JSON.parse(localStorage.getItem('yueAudioBaselines') || '{}');
    const existing = all[word];
    if (existing) {
      // EMA blend with new measurement
      existing.duration = existing.duration * 0.7 + features.duration * 0.3;
      existing.rms = existing.rms * 0.7 + features.rms * 0.3;
      existing.peak = existing.peak * 0.7 + features.peak * 0.3;
      existing.samples = (existing.samples || 0) + 1;
    } else {
      all[word] = { ...features, samples: 1 };
    }
    localStorage.setItem('yueAudioBaselines', JSON.stringify(all));
  } catch(e) {}
}

// ================== PASSAGE-LEVEL SCORING ==================
// Strip punctuation/whitespace for text comparison.
function _normText(s) {
  return (s || '').replace(/[，。！？、；：""''「」（）《》\.\,\!\?\;\:\s\n\r\(\)\[\]"'`]/g, '');
}

// Word-segment a Chinese string into individual characters (loose tokenization).
// Treats each Chinese char as a "word"; Latin tokens kept as-is.
function _tokenize(s) {
  const out = [];
  const re = /[\u4e00-\u9fff]|[A-Za-z0-9]+/g;
  let m;
  while ((m = re.exec(s)) !== null) out.push(m[0]);
  return out;
}

// Build a Levenshtein DP table and return alignment as two parallel arrays
// of {op: 'match'|'sub'|'del'|'ins', a, b} for traceback.
// Used to produce char-level diff highlight + accuracy sub-score.
function _alignTokens(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
  for (let i = 0; i <= n; i++) dp[0][i] = i;
  for (let j = 0; j <= m; j++) dp[j][0] = j;
  for (let j = 1; j <= m; j++) {
    for (let i = 1; i <= n; i++) {
      if (a[i - 1] === b[j - 1]) {
        dp[j][i] = dp[j - 1][i - 1];
      } else {
        dp[j][i] = 1 + Math.min(dp[j - 1][i - 1], dp[j][i - 1], dp[j - 1][i]);
      }
    }
  }
  // Traceback. Convention: a = target, b = user.
  //   del  = target has a token the user didn't say (skip in target)   → dp[j][i-1] predecessor
  //   ins  = user said a token the target doesn't have (extra in user) → dp[j-1][i] predecessor
  //   sub  = token differs                                            → dp[j-1][i-1] predecessor
  // Prefer del over sub on ties so the "single word retry" list shows what was *missed*,
  // not what was *substituted* (substitution often = dialect/cantonese variation that
  // doesn't need remediation).
  const ops = [];
  let i = n, j = m;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i - 1] === b[j - 1] && dp[j][i] === dp[j - 1][i - 1]) {
      ops.push({ op: 'match', a: a[i - 1], b: b[j - 1] });
      i--; j--;
    } else if (i > 0 && j > 0 &&
               (dp[j][i] === dp[j][i - 1] + 1) &&
               (dp[j][i] < dp[j - 1][i - 1] + 1)) {
      // del: target skipped, user didn't say this token.
      ops.push({ op: 'del', a: a[i - 1], b: null });
      i--;
    } else if (i > 0 && j > 0 && dp[j][i] === dp[j - 1][i - 1] + 1) {
      ops.push({ op: 'sub', a: a[i - 1], b: b[j - 1] });
      i--; j--;
    } else if (i > 0 && dp[j][i] === dp[j][i - 1] + 1) {
      // del tied with sub: prefer del for pedagogical reasons
      ops.push({ op: 'del', a: a[i - 1], b: null });
      i--;
    } else if (j > 0) {
      ops.push({ op: 'ins', a: null, b: b[j - 1] });
      j--;
    } else {
      break;
    }
  }
  ops.reverse();
  return { ops, dp, distance: dp[m][n] };
}

// Filler-word analytics. Counts ins (extra) tokens in the alignment that
// match a curated list of common Cantonese/Mandarin fillers. Heavy filler
// use is a clinical signal for language-disordered reading: students who
// frequently insert 呀/啦/囉 etc. tend to lose reading fluency and
// confidence. Surfaced as a 5th sub-score row so teachers see it
// alongside accuracy/coverage/fluency/expression.
//
//   score: 100 = 0% filler, 80 = 0-3% filler (natural), 60 = 3-7% (slight
//          habit), 40 = 7-15% (concerning), 20 = 15-25% (heavy), 0 = >25%
function _fillerStats(ops) {
  // 粵語/普通話常見口頭禪 — list curated for SEN reading (avoid common
  // words like 我/的/了 which are content, not fillers).
  const FILLERS = new Set([
    '呀', '啊', '啦', '囉', '呢', '嘅', '咩', '喎', '㗎', '㖭', '㗎喂', '哦', '噢', '誒',
    'ya', 'ah', 'la', 'lo', 'ne', 'ge', 'me', 'wo', 'ga', 'ar', 'eh', 'oh'
  ]);
  let count = 0, totalIns = 0;
  const fillerWords = [];
  for (const o of ops) {
    if (o.op === 'ins') {
      totalIns++;
      // o.b is the user-side token (single token like 呀, or longer
      // multi-char fillers like 呀嗎). Single-char check is the common case.
      const tok = String(o.b || '');
      if (FILLERS.has(tok) || FILLERS.has(tok.toLowerCase())) {
        count++;
        fillerWords.push(tok);
      }
    }
  }
  // Ratio = filler insertions / total ins tokens. 0 fillers = perfect (100).
  // Otherwise scaled: 1-3% = 80, 3-7% = 60, 7-15% = 40, 15-25% = 20, >25% = 0.
  let score;
  if (totalIns === 0 || count === 0) score = 100;
  else {
    const ratio = count / totalIns;  // 0..1, fraction of ins that are fillers
    if (ratio <= 0.05) score = 100;
    else if (ratio <= 0.15) score = 80;
    else if (ratio <= 0.30) score = 60;
    else if (ratio <= 0.50) score = 40;
    else if (ratio <= 0.75) score = 20;
    else score = 0;
  }
  return { count, totalIns, score, words: fillerWords };
}

// Accuracy: alignment-based. match / max(target, user) * 100, with sub treated as half-credit.
function _accuracyScore(ops, targetLen, userLen) {
  if (targetLen === 0) return userLen === 0 ? 100 : 0;
  let correct = 0, near = 0;
  for (const o of ops) {
    if (o.op === 'match') correct++;
    else if (o.op === 'sub') near++;
  }
  const denom = Math.max(targetLen, userLen, 1);
  return Math.round(((correct + near * 0.5) / denom) * 100);
}

// Coverage: of target tokens, how many were matched (or substituted, since
// student at least attempted a token at that position).
function _coverageScore(ops, targetLen) {
  if (targetLen === 0) return 100;
  let hit = 0;
  for (const o of ops) {
    if (o.op === 'match' || o.op === 'sub') hit++;
  }
  return Math.round((hit / targetLen) * 100);
}

// Fluency: speech rate (chars/sec) within a TYPE-AWARE ideal band.
//   prose:  [1.5, 4] cps — natural conversational reading
//   poetry: [0.8, 2.5] cps — classical Chinese cadence (靜夜思 ≈ 1 cps)
// Pause penalty was REMOVED (2026-06-15 review): _expressionScore already
// accounts for pause cadence via the pauseRatio. Keeping the penalty here
// double-counted pauses (5-15 false-penalty points for strong SEN readers
// with deliberate cadence).
function _fluencyScore(charCount, audioDuration, longPauses, passageType) {
  if (!audioDuration || audioDuration < 0.5) return null;  // null = "no data"
  const cps = charCount / audioDuration;
  // Type-aware band
  const lowCps  = (passageType === 'poetry') ? 0.8 : 1.5;
  const highCps = (passageType === 'poetry') ? 2.5 : 4.0;
  let paceScore;
  if (cps >= lowCps && cps <= highCps) paceScore = 100;
  else if (cps < lowCps) paceScore = Math.max(0, 100 - (lowCps - cps) * (passageType === 'poetry' ? 80 : 60));
  else paceScore = Math.max(0, 100 - (cps - highCps) * (passageType === 'poetry' ? 30 : 15));
  return Math.round(Math.max(0, Math.min(100, paceScore)));
}

// Expression: from pause distribution only (real prosody needs more audio features).
// Even cadence of short pauses (~punctuation) scores higher than clustered or absent pauses.
// Returns null when no audio captured (mirrored from _fluencyScore).
function _expressionScore(longPauses, charCount, audioDuration) {
  if (!audioDuration || charCount === 0) return null;
  // Ideal: ~1 pause per 8 chars (matches natural Chinese punctuation cadence)
  const idealPauses = charCount / 8;
  const pauseRatio = (longPauses || 0) / idealPauses;
  let score;
  if (pauseRatio >= 0.7 && pauseRatio <= 1.3) score = 90;
  else if (pauseRatio < 0.7) score = 60 + pauseRatio * 30;  // too few pauses
  else score = 90 - (pauseRatio - 1.3) * 20;                // too many
  return Math.round(Math.max(0, Math.min(100, score)));
}

// Decode an audio blob and compute fluency-relevant features:
// returns {duration, charCount, longPauses, rms} (rms for diagnostics).
async function _analyzeAudioFeatures(blob, charCount) {
  const features = { duration: 0, longPauses: 0, rms: 0, valid: false };
  if (!blob || !blob.size) return features;
  try {
    const buf = await blob.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return features;
    const ctx = new AudioCtx();
    const decoded = await ctx.decodeAudioData(buf.slice(0));
    ctx.close();
    features.duration = decoded.duration;
    // Scan channel for silent gaps > 1s
    const ch = decoded.getChannelData(0);
    const sampleRate = decoded.sampleRate;
    const winSize = Math.floor(sampleRate * 0.05);  // 50ms windows
    const threshold = 0.01;
    const minPauseSamples = sampleRate * 1.0;  // 1s
    let silentRun = 0, totalSilent = 0;
    for (let i = 0; i < ch.length; i += winSize) {
      let sumSq = 0, n = 0;
      for (let k = 0; k < winSize && i + k < ch.length; k++) { sumSq += ch[i + k] * ch[i + k]; n++; }
      const rms = Math.sqrt(sumSq / n);
      if (rms < threshold) {
        silentRun += n;
      } else {
        if (silentRun >= minPauseSamples) totalSilent++;
        silentRun = 0;
      }
    }
    if (silentRun >= minPauseSamples) totalSilent++;
    features.longPauses = totalSilent;
    // overall RMS for diagnostics
    let ss = 0;
    for (let i = 0; i < ch.length; i++) ss += ch[i] * ch[i];
    features.rms = Math.sqrt(ss / ch.length);
    features.valid = true;
    return features;
  } catch (e) {
    console.warn('audio analysis failed', e);
    return features;
  }
}

// 4-dimension reading scoring. Used by scorePassage() and single-word repractice.
//  Returns {total, sub:{accuracy,coverage,fluency,expression}, alignment, tier, feedback, errorWords, fluencyMeta}
function _computePassageScore(target, transcript, audioFeatures, passageType) {
  const tClean = _normText(target);
  const uClean = _normText(transcript);
  const targetTokens = _tokenize(tClean);
  const userTokens = _tokenize(uClean);
  const align = _alignTokens(targetTokens, userTokens);

  const accuracy = _accuracyScore(align.ops, targetTokens.length, userTokens.length);
  const coverage = _coverageScore(align.ops, targetTokens.length);

  // Filler-word analytics: count ins (extra tokens) that are common
  // Cantonese/Mandarin fillers. Heavy filler use is a clinical signal
  // for language-disordered reading and shouldn't be silently hidden in
  // the alignment diff. We surface a 5th sub-score row and log the raw
  // count to the audit trail.
  const filler = _fillerStats(align.ops);

  // Fluency + expression need audio; fall back to neutral if no audio.
  // passageType biases the pace band (poetry: [0.8, 2.5] cps; prose: [1.5, 4]).
  const charCount = userTokens.length;
  const dur = audioFeatures && audioFeatures.valid ? audioFeatures.duration : 0;
  const longPauses = audioFeatures && audioFeatures.valid ? audioFeatures.longPauses : 0;
  const fluency = _fluencyScore(charCount, dur, longPauses, passageType);
  const expression = _expressionScore(longPauses, charCount, dur);

  // Weighted total: accuracy 32% / coverage 28% / fluency 18% / expression 12% / filler 10%
  // (filler replaces a small slice of expression since filler analytics
  // is text-only and observable without audio).
  // If no audio features, redistribute weight: accuracy 45% / coverage 40% / filler 15%
  let total, sub;
  if (dur > 0) {
    sub = { accuracy, coverage, fluency, expression, filler: filler.score };
    // fluency/expression may be null if their input was zero — fall through
    // to the no-audio weights so the total stays well-defined.
    const f = (typeof fluency === 'number') ? fluency : 0;
    const e = (typeof expression === 'number') ? expression : 0;
    total = Math.round(accuracy * 0.32 + coverage * 0.28 + f * 0.18 + e * 0.12 + filler.score * 0.10);
  } else {
    // No audio captured — fluency/expression are unmeasurable. Use null
    // so the UI can render "—" instead of a misleading red 0. Weight
    // rebalances to accuracy+coverage+filler (text-only dimensions).
    sub = { accuracy, coverage, fluency: null, expression: null, filler: filler.score };
    total = Math.round(accuracy * 0.45 + coverage * 0.40 + filler.score * 0.15);
  }

  // Build word-level error list (sub + del targets) for the "single word retry" buttons.
  // Convention (see _alignTokens comment): a = target, b = user.
  //   sub: target had `a`, user said `b` instead → student should retry `a`
  //   del: target had `a`, user didn't say anything → student should retry `a`
  // Earlier (pre-2026-06-15) this had `expected: o.b` which is the USER token,
  // not the target — so the retry list showed characters the student *said*
  // rather than the ones they *missed*. Routing them to the wrong word.
  const errorWords = [];
  for (const o of align.ops) {
    if (o.op === 'sub') errorWords.push({ kind: 'sub', expected: o.a, actual: o.b });
    else if (o.op === 'del') errorWords.push({ kind: 'miss', expected: o.a, actual: null });
  }
  // wrongChars = set of TARGET chars the student got wrong or missed.
  // Used to render the "single word retry" buttons.
  const wrongChars = [...new Set(errorWords.map(w => w.expected))];

  return {
    total, sub, align, errorWords, wrongChars,
    fluencyMeta: { charCount, duration: dur, longPauses, cps: dur ? +(charCount / dur).toFixed(2) : 0 }
  };
}

function scorePassage(transcript, opts) {
  // Outer try/catch + .catch + Promise.race watchdog — guarantees the user
  // always lands on the result page, even if audio decode, transcribe, or
  // scoring throws. Without this, an exception inside _analyzeAudioFeatures
  // or any of the 4 sub-renderers would strand the user on '⏳ 處理中…'
  // forever (the previous implementation had no .catch on the inner promise).
  opts = opts || {};
  const p = state.currentPassage;
  __debug.log('scorePassage.entry', { transcriptLen: (transcript || '').length, engine: opts.engine, noSpeech: !!opts.noSpeech, errorMsg: opts.errorMsg, hasAudioBlob: !!opts.audioBlob });
  if (!p) {
    // No passage context — should never happen, but stay safe.
    __debug.warn('scorePassage.noPassage');
    showToast('❌ 錯誤：搵唔到當前文章');
    return;
  }
  const target = p.text || '';
  const isCustom = (opts.engine === 'custom' && opts.customScore);

  // 5-second watchdog: if anything hangs in the scoring pipeline beyond
  // this, force-navigate to a fallback result page with a 0 score so the
  // user is never stranded.
  let watchdogFired = false;
  const watchdog = setTimeout(() => {
    watchdogFired = true;
    __debug.warn('scorePassage.watchdog5s', { errorMsg: opts.errorMsg });
    console.warn('[score] watchdog fired after 5s — forcing fallback result');
    _renderFallbackResult(p, transcript, opts, opts.errorMsg || '⏰ 處理超時，已自動跳到結果頁。');
  }, 5000);

  // Helper: navigate to result with whatever sub-render data we have.
  function _renderFallbackResult(p, transcript, opts, reason) {
    goTo('result');
    document.getElementById('resultWord').textContent = p.title;
    const total = 0;
    document.getElementById('resultScore').textContent = total + '/100';
    const tier = _tierFromScore(total);
    document.getElementById('resultScore').style.color = tier.color;
    document.getElementById('resultTier').textContent = `${tier.emoji} ${tier.label}獎`;
    document.getElementById('resultFeedback').textContent = reason || '請再試一次。';
    // Empty sub-scores: accuracy/coverage=0, fluency/expression=null (no data)
    // Empty sub-scores: accuracy/coverage=0, fluency/expression=null (no data),
    // filler=100 (no ins tokens to flag = perfect filler control)
    const emptySub = { accuracy: 0, coverage: 0, fluency: null, expression: null, filler: 100 };
    try { _renderSubScores(emptySub); } catch(e) { console.warn(e); }
    try { _renderDiffHighlight(target, { ops: [] }, transcript || ''); } catch(e) { console.warn(e); }
    try { _renderFluencyPanel({ charCount: 0, duration: 0, longPauses: 0, cps: 0 }, { valid: false }); } catch(e) { console.warn(e); }
    try { _renderWordRetryList([], p); } catch(e) { console.warn(e); }
    document.getElementById('resultAI').innerHTML = `
      <div data-you-read style="margin-bottom:6px;"><b>你讀：</b>${_e(transcript || '（無收到語音）')}</div>
      <div style="margin-bottom:6px;"><b>文章：</b>${_e(target)}</div>
      ${transcript ? '' : `
        <div style="background:#fef3c7;border:2px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:10px;text-align:left;">
          <div style="font-size:1.0em;color:#92400e;font-weight:bold;margin-bottom:6px;">⚠️ 語音辨識失敗</div>
          <div style="font-size:0.85em;color:#78350f;line-height:1.4;">
            Chrome 內部嘅粵語辨識引擎喺你部機 / Chrome 版本上面冇回應 (常見於 macOS Chrome + zh-HK)。
            請喺下面輸入你實際讀咗咩，sub-score 同 diff 會即時更新。
            <br>💡 <b>長遠建議</b>：去 Settings 揀 Whisper 引擎（需下載 40MB 模型）可避免此問題。
          </div>
        </div>
      `}
      <div style="margin-bottom:10px;">
        <label style="font-size:0.85em;color:#6b21a8;font-weight:bold;display:block;margin-bottom:4px;">
          ✏️ 輸入你讀咗咩（即時重新計分）：
        </label>
        <textarea id="transcriptEdit" rows="3" style="width:100%;padding:8px;border:2px solid #c4b5fd;border-radius:8px;font-family:inherit;font-size:0.95em;box-sizing:border-box;resize:vertical;${transcript ? '' : 'box-shadow:0 0 0 3px rgba(196,181,253,0.3);'}"
          placeholder="如果語音辨識失敗或者你想重新輸入，喺呢度打你實際讀出嚟嘅字，sub-score 同 diff 會即時更新。"
          oninput="App._rerenderWithTranscript(this.value)"
          ${transcript ? '' : 'autofocus'}
        >${_e(transcript || '')}</textarea>
      </div>
      <div data-engine-line style="font-size:0.85em;color:#7c3aed;">引擎：${_e(opts.engine || state.asrEngine)}｜原因：${_e(reason || 'engine error')}</div>`;
    // Save the score context so the textarea's oninput handler can re-render
    // sub-scores as the user types. Fallback path has no features (audioBlob
    // was empty or pipeline failed), so the helper handles features.valid=false
    // by skipping the fluency panel re-render.
    _lastScoreContext = {
      target, passage: p, transcript, features: { valid: false },
      audioBlob: opts.audioBlob || null, passageType: p.type
    };
  }

  // Inner pipeline
  _analyzeAudioFeatures(opts.audioBlob, (transcript || '').length).then(features => {
    if (watchdogFired) return;  // watchdog already navigated; don't double-render
    clearTimeout(watchdog);
    try {
      let scoreResult, feedback, scoringMethod, audioNote = '';

      if (isCustom) {
        // Custom engine: respect its score, but still produce sub-scores for diagnostics
        const custom = opts.customScore;
        scoreResult = _computePassageScore(target, transcript, features, p.type);
        // Override total with custom score, but keep sub-scores as informational
        scoreResult.total = custom.score;
        feedback = custom.score >= 85 ? '做得好！' : custom.score >= 60 ? '唔錯！繼續努力～' : '再嚟多次！';
        scoringMethod = 'custom-audio';
      } else {
        scoreResult = _computePassageScore(target, transcript, features, p.type);
        const t = scoreResult.total;
        feedback = t >= 85 ? '做得好！朗讀好流暢！' : t >= 60 ? '唔錯！繼續努力～' : '再試一次，你可以嘅！';
        scoringMethod = 'passage-4dim';
      }

      if (!features.valid && !isCustom) {
        audioNote = '（冇錄音數據，流暢度同感情用預設值）';
      }

      _recordPassageAttempt(p.id, p.title, scoreResult.total, transcript, target);

      goTo('result');
      const tier = _tierFromScore(scoreResult.total);

      document.getElementById('resultWord').textContent = p.title;
      document.getElementById('resultScore').textContent = scoreResult.total + '/100';
      document.getElementById('resultScore').style.color = tier.color;
      document.getElementById('resultTier').textContent = `${tier.emoji} ${tier.label}獎${audioNote}`;
      document.getElementById('resultFeedback').textContent = feedback;

      _renderSubScores(scoreResult.sub);
      _renderDiffHighlight(target, scoreResult.align, transcript);
      _renderFluencyPanel(scoreResult.fluencyMeta, features);
      _renderWordRetryList(scoreResult.wrongChars, p);

      // Stash the score context so the transcript-edit textbox below can
      // live-rerender without re-recording. The audio features are kept
      // verbatim so fluency/expression stay stable across edits (only
      // accuracy/coverage/filler will move based on the new transcript).
      _lastScoreContext = {
        target, passage: p, transcript, features, scoreResult,
        audioBlob: opts.audioBlob || null, passageType: p.type
      };

      document.getElementById('resultAI').innerHTML = `
        <div data-you-read style="margin-bottom:6px;"><b>你讀：</b>${_e(transcript || '（自訂模式）')}</div>
        <div style="margin-bottom:6px;"><b>文章：</b>${_e(target)}</div>
        <div style="margin-bottom:10px;">
          <label style="font-size:0.85em;color:#6b21a8;font-weight:bold;display:block;margin-bottom:4px;">
            ✏️ 編輯你讀嘅內容（即時重新計分）：
          </label>
          <textarea id="transcriptEdit" rows="3" style="width:100%;padding:8px;border:1px solid #c4b5fd;border-radius:8px;font-family:inherit;font-size:0.95em;box-sizing:border-box;resize:vertical;${transcript ? '' : 'border:2px solid #c4b5fd;box-shadow:0 0 0 3px rgba(196,181,253,0.3);'}"
            placeholder="如果語音辨識結果唔啱，喺呢度改你實際讀出嚟嘅字，sub-score 同 diff 會即時更新。"
            oninput="App._rerenderWithTranscript(this.value)"
            ${transcript ? '' : 'autofocus'}
          >${_e(transcript || '')}</textarea>
        </div>
        <div data-engine-line style="font-size:0.85em;color:#7c3aed;">引擎：${_e(opts.engine || state.asrEngine)}｜方法：${_e(scoringMethod)}</div>`;

      __debug.log('scorePassage.rendered', { total: scoreResult.total, scoringMethod, subKeys: Object.keys(scoreResult.sub || {}) });
      if (scoreResult.total >= SCORING.TIER_GOLD) showConfetti(15);
    } catch (e) {
      __debug.error('scorePassage.render.fail', e);
      console.error('[score] render failed:', e);
      showToast('❌ 評分出錯，已跳到結果頁。');
      _renderFallbackResult(p, transcript, opts, '評分錯誤：' + e.message);
    }
  }).catch(e => {
    if (watchdogFired) return;
    clearTimeout(watchdog);
    console.error('[score] pipeline failed:', e);
    showToast('❌ 處理失敗，已跳到結果頁。');
    _renderFallbackResult(p, transcript, opts, '引擎錯誤：' + e.message);
  });
}

// Live-rerender result page after the user edits the transcript textbox.
// Re-runs _computePassageScore with the new transcript, keeping the same
// audio features (so fluency/expression don't change unless the new
// transcript alters their inputs), and updates sub-scores + diff +
// fluency panel + word retry list. Does NOT call _recordPassageAttempt
// again — the original attempt stays in history; the edit is just a
// visual recalibration so the student can see "if I had actually said
// that, my score would be X". This makes the system useful even when
// the Web Speech API on the student's browser failed to transcribe
// (e.g. macOS Chrome zh-HK backend unstable), since they can type what
// they actually said and immediately see the score.
// Skip the slow engine transcribe (e.g. Whisper first-time model
// download) and go directly to a transcript-only result page. The user
// invoked this from the progress banner's "⏭ 跳過等侯" button when
// they got tired of waiting for the CDN/model load. The flag is read
// by the onstop transcribe Promise.race's onProgress callback to bail.
function _skipTranscribe() {
  _transcribeSkipRequested = true;
  showToast('⏭ 已跳過引擎等侯，去結果頁');
}

function _rerenderWithTranscript(editedTranscript) {
  const ctx = _lastScoreContext;
  if (!ctx) return;
  const cleanTranscript = (editedTranscript || '').trim();
  const scoreResult = _computePassageScore(
    ctx.target, cleanTranscript, ctx.features, ctx.passageType
  );
  // Update the main total + tier display
  document.getElementById('resultScore').textContent = scoreResult.total + '/100';
  const tier = _tierFromScore(scoreResult.total);
  document.getElementById('resultScore').style.color = tier.color;
  // Re-render sub-scores, diff highlight, word retry list
  _renderSubScores(scoreResult.sub);
  _renderDiffHighlight(ctx.target, scoreResult.align, cleanTranscript);
  _renderWordRetryList(scoreResult.wrongChars, ctx.passage);
  // Fluency panel: only re-render if we have features (audio-derived dims)
  if (ctx.features && ctx.features.valid) {
    _renderFluencyPanel(scoreResult.fluencyMeta, ctx.features);
  }
  // Update the AI box transcript line so the "你讀" line stays in sync
  const aiEl = document.getElementById('resultAI');
  if (aiEl) {
    const engineLine = aiEl.querySelector('[data-engine-line]');
    // Leave engine/method line untouched; just refresh the "你讀" line
    const youReadLine = aiEl.querySelector('[data-you-read]');
    if (youReadLine) {
      youReadLine.innerHTML = `<b>你讀：</b>${_e(cleanTranscript || '（未輸入）')}`;
    }
  }
}

function _renderDiffHighlight(target, align, transcript) {
  const el = document.getElementById('resultDiff');
  if (!el) return;
  // Render alignment as colored spans, with target punctuation preserved.
  // Walk through target char-by-char; for each char, find the alignment op covering it.
  const tokens = _tokenize(target);  // includes Chinese chars only
  const targetTokenIndex = [];  // map raw-target-char-index → token-index (or -1 for punct)
  let ti = 0;
  for (let i = 0; i < target.length; i++) {
    if (_tokenize(target[i]).length > 0) { targetTokenIndex.push(ti); ti++; }
    else targetTokenIndex.push(-1);
  }
  // Walk ops: build a map tokenIndex → op
  const opByToken = {};
  let opIdx = 0;
  for (const o of align.ops) {
    // Each op consumes 1 target token (or 0 for ins)
    if (o.op !== 'ins') {
      // opIdx is the position in targetTokens sequence; the Nth op that isn't ins corresponds to the Nth targetToken
      const tIdx = Object.keys(opByToken).length === 0
        ? 0
        : 0;  // we'll re-derive by walking ops in order
    }
  }
  // Simpler: rebuild mapping by walking ops in order and targetTokens in parallel
  opByToken.length = 0;
  const tTokenMap = {};  // token-index → op
  let tokenCounter = 0;
  for (const o of align.ops) {
    if (o.op === 'ins') continue;  // ins is purely on user side, not in target
    tTokenMap[tokenCounter] = o;
    tokenCounter++;
  }

  // Now render target char-by-char
  let html = '';
  let renderedTokens = 0;
  for (let i = 0; i < target.length; i++) {
    const ch = target[i];
    const tokenIdx = targetTokenIndex[i];
    if (tokenIdx < 0) {
      // punctuation / whitespace — render plain
      html += _e(ch);
    } else {
      const op = tTokenMap[tokenIdx];
      if (!op) { html += _e(ch); continue; }
      if (op.op === 'match') {
        html += `<span style="color:#16a34a;background:#dcfce7;padding:1px 3px;border-radius:4px;margin:0 1px;">${_e(ch)}</span>`;
      } else if (op.op === 'sub') {
        html += `<span style="color:#dc2626;background:#fee2e2;padding:1px 3px;border-radius:4px;margin:0 1px;text-decoration:line-through;" title="你讀咗「${_e(op.a)}」">${_e(ch)}</span>`;
      } else if (op.op === 'del') {
        html += `<span style="color:#6b7280;background:#f3f4f6;padding:1px 3px;border-radius:4px;margin:0 1px;border-bottom:2px dotted #9ca3af;" title="漏咗讀">${_e(ch)}</span>`;
      } else {
        html += _e(ch);
      }
      renderedTokens++;
    }
  }
  // Append inserted tokens (extra words the student said that aren't in the passage)
  const extras = align.ops.filter(o => o.op === 'ins');
  if (extras.length) {
    html += `<div style="margin-top:8px;font-size:0.85em;color:#92400e;">多咗讀：`;
    for (const o of extras) {
      html += `<span style="background:#fef3c7;padding:1px 4px;border-radius:4px;margin:0 2px;">${_e(o.b)}</span>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

function _renderFluencyPanel(meta, features) {

  const cpsColor = cps >= 1.5 && cps <= 4 ? '#16a34a' : cps < 1.5 ? '#0ea5e9' : '#dc2626';
  const pauseLabel = meta.longPauses === 0 ? '冇長停頓' : `有 ${meta.longPauses} 個長停頓（≥1秒）`;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">錄音長度</div><div style="font-weight:bold;font-size:1.1em;">${meta.duration.toFixed(1)} 秒</div></div>
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">朗讀速度</div><div style="font-weight:bold;font-size:1.1em;color:${cpsColor};">${cps} 字/秒 <span style="font-size:0.8em;">(${cpsLabel})</span></div></div>
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">停頓</div><div style="font-weight:bold;font-size:1.1em;">${pauseLabel}</div></div>

// ================== WORD REPRACTICE ==================
let _repracticeWord = null;
let _repracticeContext = null;
let _repracticeRecorder = null;
let _repracticeChunks = [];
let _repracticeRecognition = null;

function _startWordRepractice(word) {
  if (!word || !state.currentPassage) return;
  _repracticeWord = word;
  const p = state.currentPassage;
  // Find a 6-char context window around this word in the passage
  const idx = p.text.indexOf(word);
  let ctx = '';
  if (idx >= 0) {
    const start = Math.max(0, idx - 4);
    const end = Math.min(p.text.length, idx + word.length + 4);
    ctx = (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '');
  }
  _repracticeContext = ctx;
  document.getElementById('wordRepracticeWord').textContent = word;
  document.getElementById('wordRepracticeContext').textContent = ctx;
  document.getElementById('wordRepracticeStatus').innerHTML = '準備好就撳「🎤 讀一次」';
  document.getElementById('wordRepracticeResult').innerHTML = '';
  goTo('wordRepractice');
  // TTS the word once on entry for ear reference
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'zh-HK';
    u.rate = 0.7;
    speechSynthesis.speak(u);
  }
}

function _repracticeListen() {
  if (!('speechSynthesis' in window) || !_repracticeWord) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(_repracticeWord);
  u.lang = 'zh-HK';
  u.rate = 0.7;
  speechSynthesis.speak(u);
}

function _repracticeRecord() {
  if (!_repracticeWord) return;
  const status = document.getElementById('wordRepracticeStatus');
  const recBtn = document.getElementById('wordRepracticeRec');
  recBtn.disabled = true;
  recBtn.textContent = '⏺ 錄音中…';
  recBtn.style.background = '#999';

  if (state.asrEngine === 'webspeech' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    _repracticeRecognition = new SpeechRec();
    _repracticeRecognition.lang = 'zh-HK';
    _repracticeRecognition.continuous = false;
    _repracticeRecognition.interimResults = false;
    _repracticeRecognition.maxAlternatives = 3;
    try { _repracticeRecognition.start(); } catch(e) {
      status.innerHTML = '❌ 無法啟動錄音：' + e.message;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
      return;
    }
    _repracticeRecognition.onresult = (event) => {
      const alts = Array.from(event.results[0]).map(a => a.transcript.trim());
      _finishWordRepractice(alts, null);
    };
    _repracticeRecognition.onerror = (event) => {
      status.innerHTML = '❌ 錄音出錯：' + event.error;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    };
    _repracticeRecognition.onend = () => {
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    };
  } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      _repracticeRecorder = new MediaRecorder(stream);
      _repracticeChunks = [];
      _repracticeRecorder.ondataavailable = (e) => { if (e.data.size > 0) _repracticeChunks.push(e.data); };
      _repracticeRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(_repracticeChunks, { type: 'audio/webm' });
        _repracticeRecorder = null;
        // For non-webspeech engines we still get a blob; we can't transcribe without the engine.
        // Fall back to "recorded" confirmation only.
        _finishWordRepractice([], blob);
      };
      _repracticeRecorder.start();
      // 3-second auto-stop for single-word practice
      setTimeout(() => {
        if (_repracticeRecorder && _repracticeRecorder.state === 'recording') _repracticeRecorder.stop();
      }, 3000);
    }).catch(err => {
      status.innerHTML = '❌ 麥克風權限被拒：' + err.message;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    });
  } else {
    status.innerHTML = '❌ 此瀏覽器不支援錄音';
    recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
  }
}

function _finishWordRepractice(alternatives, blob) {
  const status = document.getElementById('wordRepracticeStatus');
  const resultEl = document.getElementById('wordRepracticeResult');
  const target = _repracticeWord;
  const targetClean = _normText(target);
  // Check if any alternative contains the target (allows "明月光" vs "明月  光")
  let matched = false, closest = null;
  for (const alt of alternatives) {
    if (_normText(alt).includes(targetClean)) { matched = true; break; }
    // Track closest for feedback
    if (!closest || Math.abs(_normText(alt).length - targetClean.length) < Math.abs(_normText(closest).length - targetClean.length)) {
      closest = alt;
    }
  }
  if (alternatives.length === 0 && blob) {
    // Non-webspeech path: we have audio but no transcript
    status.innerHTML = '✅ 已錄音（需用 Web Speech 先比對）';
    resultEl.innerHTML = `<div style="background:#fef3c7;padding:10px;border-radius:10px;">錄咗音但冇 transcript 比對。建議喺 Engine Settings 揀 Web Speech 引擎再試。</div>`;
    return;
  }
  if (matched) {
    status.innerHTML = '✅ 讀啱咗！';
    resultEl.innerHTML = `<div style="background:#dcfce7;padding:12px;border-radius:10px;color:#16a34a;font-weight:bold;">🎉 呢個字過咗！可以揀下一個。</div>`;
  } else {
    status.innerHTML = `你讀咗：${_e(closest || '（無）')}`;
    resultEl.innerHTML = `<div style="background:#fee2e2;padding:12px;border-radius:10px;color:#dc2626;">
      ❌ 仲未啱。參考：
      <ol style="margin:6px 0 0 16px;padding:0;">
        <li>撳「🔊 聽示範」再聽一次</li>
        <li>大聲跟住讀</li>
        <li>再撳「🎤 讀一次」錄多一次</li>
      </ol>
    </div>`;
  }
}

async function init() {
  // Load passages: try localStorage first, then inline defaults
  const savedPassages = localStorage.getItem('yuePassages');
  if (savedPassages) {
    try { state.passages = JSON.parse(savedPassages); } catch(e) { state.passages = _DEFAULT_PASSAGES; }
  } else {
    state.passages = _DEFAULT_PASSAGES;
  }

  const savedTypes = localStorage.getItem('yueTypes');
  if (savedTypes) {
    try { state.types = JSON.parse(savedTypes); } catch(e) { state.types = _DEFAULT_TYPES; }
  } else {
    state.types = _DEFAULT_TYPES;
  }

  // Apply enabled overrides
  const savedSettings = localStorage.getItem('yueAdminSettings');
  if (savedSettings) {
    try {
      const overrides = JSON.parse(savedSettings);
      state.types.forEach(t => { if (overrides[t.id] !== undefined) t.enabled = overrides[t.id]; });
    } catch(e) {}
  }

  // Load students + progress
  try {
    const sData = JSON.parse(localStorage.getItem('yueStudents') || '{}');
    state.students = Array.isArray(sData.students) ? sData.students : [];
  } catch(e) { state.students = []; }
  if (state.students.length === 0) {
    state.students = [{
      id: 's_demo',
      name: '示範同學',
      avatar: '🌟',
      color: '#f59e0b',
      createdAt: new Date().toISOString()
    }];
    _persistStudents();
  }
  // _migrateIfNeeded() both bumps the schema-version stamp AND normalizes
  // any stale progress entries that pre-date the current shape.
  _migrateIfNeeded();
  // Defensive fallback: if migration was skipped (already at current version)
  // or partially loaded, sanitize each student entry on read.
  for (const sid of Object.keys(state.progress)) {
    state.progress[sid] = _sanitizeProgress(state.progress[sid]);
  }

  setTimeout(() => { try { _seedDemoProgress(); } catch(e) { console.warn('[seed]', e); } }, 100);

  const savedEngine = localStorage.getItem('yueAsrEngine');
  if (savedEngine && _ASR_ENGINES[savedEngine]) {
    // Migration: if the user had 'webspeech' saved from before 32c552d's
    // default-to-whisper change, silently upgrade them. Web Speech API
    // has a known failure mode on macOS Chrome (zh-HK backend unstable,
    // mic mutex blocks parallel MediaRecorder) that produces empty
    // transcripts and zero audio features. Whisper is a real Cantonese
    // ASR with internal MediaRecorder that doesn't hit these issues.
    // Users can still switch back in Settings if they prefer Web Speech.
    if (savedEngine === 'webspeech' && _ASR_ENGINES.whisper.isAvailable()) {
      state.asrEngine = 'whisper';
      localStorage.removeItem('yueAsrEngine');
      setTimeout(() => showToast('🔄 已升級到 Whisper 引擎（粵語支援更穩定）'), 1500);
    } else {
      state.asrEngine = savedEngine;
    }
  }

  // Recording is unlimited; legacy yueRecordingTimeout no longer used.
  state.recordingTimeout = null;

  state.mode = 'student';
  const lastStudent = localStorage.getItem('yueLastStudentId');
  if (lastStudent && state.students.find(s => s.id === lastStudent)) {
    state.currentStudentId = lastStudent;
  }

  _renderStudentGrid();
  updateProgress();

  // Mount the debug panel (no-op if debug mode is off). Done last so the
  // panel can capture any errors that happened earlier in init.
  __debug.log('init.done', {
    build: window.__BUILD_ID,
    asrEngine: state.asrEngine,
    hasStudents: state.students.length,
    hasPassages: state.passages.length,
    progressKeys: Object.keys(state.progress).length
  });
  // Surface the build ID in the page footer so users can verify they're on
  // the latest deploy (helps debug "did my browser cache the old file?").
  const footerEl = document.createElement('div');
  footerEl.id = '__buildStamp';
  footerEl.style.cssText = 'position:fixed;bottom:2px;left:6px;font-family:ui-monospace,monospace;font-size:9px;color:rgba(255,255,255,0.35);z-index:99998;pointer-events:none;user-select:none;';
  footerEl.textContent = window.__BUILD_ID || 'build-unknown';
  document.body.appendChild(footerEl);
  if (typeof __debugRenderPanel === 'function') {
    try { __debugRenderPanel(); } catch (e) { console.warn('debug panel mount failed', e); }
  }

  // Multi-tab sync: when another tab writes to localStorage, refresh our
  // in-memory state and re-render the visible dashboard. This is the
  // use case where a teacher has the dashboard tab open and the student
  // completes a reading on the iPad (or a second dashboard tab is open).
  // Without this, the teacher sees stale numbers until a manual reload.
  // We re-read yueStudents / yueProgress / yueAsrEngine on every storage
  // event and re-render the current page if it's teacher/dashboard or
  // myProgress (the two surfaces that depend on global state).
  window.addEventListener('storage', (e) => {
    if (!e.key) return;  // localStorage.clear() — re-render everything
    if (e.key === 'yueStudents' || e.key === 'yueSchemaVersion') {
      try {
        const sData = JSON.parse(localStorage.getItem('yueStudents') || '{}');
        if (Array.isArray(sData.students)) state.students = sData.students;
      } catch(e) { /* ignore */ }
      _renderStudentGrid();
    }
    if (e.key === 'yueProgress' || e.key === 'yueSchemaVersion') {
      try {
        const raw = JSON.parse(localStorage.getItem('yueProgress') || '{}');
        const cleaned = {};
        for (const sid of Object.keys(raw)) cleaned[sid] = _sanitizeProgress(raw[sid]);
        state.progress = cleaned;
      } catch(e) { /* ignore */ }
    }
    if (e.key === 'yueAsrEngine' && !e.newValue) {
      // External clear — fall back to default (whisper, since webspeech
      // has known zHK backend issues on macOS Chrome)
      state.asrEngine = 'whisper';
    } else if (e.key === 'yueAsrEngine' && e.newValue && _ASR_ENGINES[e.newValue]) {
      state.asrEngine = e.newValue;
    }
    // Re-render whichever page the user is currently on
    const activePage = document.querySelector('.page.active');
    if (!activePage) return;
    const id = activePage.id;
    if (id === 'teacher') renderDashboard();
    else if (id === 'myProgress') showMyProgress();
    else if (id === 'hub') updateHubStatus();
    else if (id === 'home') _renderStudentGrid();
  });
}

const _TEACHER_PASS_KEY = 'yueTeacherPassHash';

async function _hashTeacherPass(pass) {
  const data = new TextEncoder().encode(pass);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function enterTeacherMode() {
  // First-time setup: ask teacher to set a password (min 6 chars)
  let stored = localStorage.getItem(_TEACHER_PASS_KEY);
  if (!stored) {
    const pass = prompt('首次進入老師模式。請設定老師密碼（至少 6 個字元）：');
    if (!pass) return;
    if (pass.length < 6) { alert('密碼至少 6 個字元'); return; }
    const confirm = prompt('再輸入一次確認：');
    if (confirm !== pass) { alert('兩次輸入唔一致'); return; }
    const hash = await _hashTeacherPass(pass);
    localStorage.setItem(_TEACHER_PASS_KEY, hash);
    showToast('✅ 老師密碼已設定');
  } else {
    // Existing: ask for password
    const pass = prompt('請輸入老師密碼：');
    if (!pass) return;
    const hash = await _hashTeacherPass(pass);
    if (hash !== stored) { alert('❌ 密碼唔啱'); return; }
  }
  state.mode = 'teacher';
  goTo('teacher');
  tchSwitchTab('dashboard');
  showToast('🔧 老師模式');
}

function exitTeacherMode() {
  state.mode = 'student';
  goTo('home');
  showToast('👋 已退出老師模式');
}

// Allow teacher to reset their password from the settings tab
async function resetTeacherPassword() {
  if (!confirm('確定重設老師密碼？')) return;
  const pass = prompt('新密碼（至少 6 個字元）：');
  if (!pass) return;
  if (pass.length < 6) { alert('密碼至少 6 個字元'); return; }
  const confirm = prompt('再輸入一次確認：');
  if (confirm !== pass) { alert('兩次輸入唔一致'); return; }
  const hash = await _hashTeacherPass(pass);
  localStorage.setItem(_TEACHER_PASS_KEY, hash);
  showToast('✅ 老師密碼已更新');
}

function tchSwitchTab(tab) {
  const tabs = ['dashboard', 'students', 'edit', 'settings'];
  tabs.forEach(t => {
    const btn = document.getElementById('tchTab' + t.charAt(0).toUpperCase() + t.slice(1) + 'Btn');
    const content = document.getElementById('tchTab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.style.background = (t === tab) ? '#7c3aed' : '#444';
    if (content) content.style.display = (t === tab) ? 'block' : 'none';
  });
  if (tab === 'dashboard') renderTeacherDashboard();
  if (tab === 'students') renderTeacherStudents();
  if (tab === 'edit') renderTeacherEdit();
  if (tab === 'settings') {
    renderTeacherSettings();
    if (typeof _updateDebugToggleUI === 'function') _updateDebugToggleUI();

let _editingStudent = null; // { studentId } | null

function addNewStudent(opts) {
  opts = opts || {};
  _editingStudent = { studentId: null };
  document.getElementById('studentModalTitle').textContent = '👨‍🎓 新增學生';
  document.getElementById('sm_name').value = opts.seed ? opts.seed.name : '';

  _renderEmojiPicker(opts.seed ? opts.seed.avatar : '🌟');
  document.getElementById('studentModal').style.display = 'block';
}

function editStudent(studentId) {
  const s = state.students.find(x => x.id === studentId);
  if (!s) return;
  _editingStudent = { studentId };
  document.getElementById('studentModalTitle').textContent = '✏️ 編輯學生';
  document.getElementById('sm_name').value = s.name || '';
  document.getElementById('sm_color').value = s.color || '#f59e0b';
  _renderEmojiPicker(s.avatar || '🌟');
  document.getElementById('studentModal').style.display = 'block';

function _renderEmojiPicker(selected) {
  const picker = document.getElementById('sm_emoji_picker');
  picker.innerHTML = _AVATAR_EMOJIS.map(em =>
    `<button type="button" onclick="App.selectEmoji(this, '${em}')" data-emoji="${em}"
      style="background:${em === selected ? '#f59e0b' : '#444'};font-size:1.8em;padding:6px;min-height:48px;min-width:48px;border-radius:8px;cursor:pointer;">${em}</button>`
  ).join('');
}

let _selectedEmoji = '🌟';
function selectEmoji(btn, em) {
  _selectedEmoji = em;
  document.querySelectorAll('#sm_emoji_picker button').forEach(b => {
    b.style.background = b.dataset.emoji === em ? '#f59e0b' : '#444';
  });
}

function saveStudentFromModal() {
  const name = document.getElementById('sm_name').value.trim();
  if (!name) { alert('請填寫姓名'); return; }
  const color = document.getElementById('sm_color').value;
  const avatar = _selectedEmoji;
  if (_editingStudent.studentId === null) {
    const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.students.push({ id, name, color, avatar, createdAt: new Date().toISOString() });
  } else {
    const s = state.students.find(x => x.id === _editingStudent.studentId);
    if (s) { s.name = name; s.color = color; s.avatar = avatar; }
  }
  _persistStudents();
  closeStudentModal();
  renderStudentList();
  _renderStudentGrid();
  showToast('✅ 學生已儲存');
}

function closeStudentModal() {
  document.getElementById('studentModal').style.display = 'none';
  _editingStudent = null;
  _selectedEmoji = '🌟';
}

function deleteStudent(studentId) {
  const s = state.students.find(x => x.id === studentId);
  if (!s) return;
  if (s.id === 's_demo') {
    showToast('⚠️ 預設學生「示範同學」刪唔到（會自動恢復）');
    return;
  }
  showConfirm(`確定刪除「${s.name}」？所有練習記錄都會一齊刪除。`, () => {
    state.students = state.students.filter(x => x.id !== studentId);

    _persistStudents();

    renderStudentList();
    _renderLoginMode();
    showToast('🗑 學生已刪除');
  });
