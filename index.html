// ================== SAMPLE DATA SEED ==================
const _DEMO_SEED_KEY = 'yueSeededDemo_v2';
const _DEMO_SEED_VERSION = 'v2.0';

function _seedDemoProgress() {
  const seededAt = localStorage.getItem(_DEMO_SEED_KEY);
  if (seededAt === _DEMO_SEED_VERSION) return;

  const hasRealProgress = Object.keys(state.progress).length > 0;
  if (hasRealProgress) {
    localStorage.setItem(_DEMO_SEED_KEY, _DEMO_SEED_VERSION);
    return;
  }

  if (state.students.length === 0 || state.passages.length === 0) {
    return;
  }

  const now = Date.now();
  const day = 86400000;
  if (state.students.length === 1 && state.students[0].id === 's_demo') {
    const extras = [
      { id: 's_student1', name: '學生1', avatar: '🌸', color: '#ec4899',
        createdAt: new Date(now - 32*day).toISOString() },
      { id: 's_student2', name: '學生2', avatar: '🚀', color: '#3b82f6',
        createdAt: new Date(now - 28*day).toISOString() },
      { id: 's_student3', name: '學生3', avatar: '🦋', color: '#a855f7',
        createdAt: new Date(now - 21*day).toISOString() },
      { id: 's_student4', name: '學生4', avatar: '🐱', color: '#10b981',
        createdAt: new Date(now - 18*day).toISOString() },
      { id: 's_student5', name: '學生5', avatar: '🦉', color: '#f59e0b',
        createdAt: new Date(now - 14*day).toISOString() },
    ];
    state.students = [...state.students, ...extras];
    _persistStudents();
  }

  const profileById = {
    's_demo':     { avgBase: 68, variance: 22, attempts: 18, mastery: 0.55, recentRatio: 0.55, recentStreak: 2 },
    's_student1': { avgBase: 88, variance: 8,  attempts: 24, mastery: 0.85, recentRatio: 0.70, recentStreak: 5 },
    's_student2': { avgBase: 48, variance: 24, attempts: 12, mastery: 0.40, recentRatio: 0.12, lowEngagement: true },
    's_student3': { avgBase: 74, variance: 14, attempts: 20, mastery: 0.70, recentRatio: 0.60, recentStreak: 3 },
    's_student4': { avgBase: 62, variance: 16, attempts: 16, mastery: 0.60, recentRatio: 0.50, recentStreak: 1 },
    's_student5': { avgBase: 78, variance: 12, attempts: 22, mastery: 0.75, recentRatio: 0.65, recentStreak: 4 },
  };

  state.students.forEach((s) => {
    const prof = profileById[s.id] || { avgBase: 65, variance: 18, attempts: 14, mastery: 0.55, recentRatio: 0.50 };
    const prog = { byPassage: {}, records: [], totalAttempts: 0 };

    // Which passages this student will touch
    const targetPassages = [];
    state.passages.forEach(p => {
      if (Math.random() < prof.mastery) targetPassages.push(p);
    });
    if (targetPassages.length < 2 && state.passages.length >= 2) {
      for (let i = 0; i < 2; i++) targetPassages.push(state.passages[i]);
    }

    if (prof.lowEngagement) {
      prof.attempts = Math.max(5, Math.floor(prof.attempts * 0.6));
    }

    // Force recentStreak
    if (prof.recentStreak) {
      for (let d = 0; d < prof.recentStreak; d++) {
        const ts = now - d * day - Math.floor(Math.random() * day * 0.5);
        const psg = targetPassages[Math.floor(Math.random() * targetPassages.length)];
        const learningBoost = Math.max(0, (14 - d) * 0.6);
        const jitter = (Math.random() - 0.5) * prof.variance;
        const score = Math.max(20, Math.min(99, Math.round(prof.avgBase + learningBoost + jitter)));
        const at = new Date(ts).toISOString();
        prog.records.push({ passageId: psg.id, passageTitle: psg.title, score, at });
        if (!prog.byPassage[psg.id]) prog.byPassage[psg.id] = { bestScore: 0, attempts: 0, lastTry: null, history: [] };
        if (score > prog.byPassage[psg.id].bestScore) prog.byPassage[psg.id].bestScore = score;
        prog.byPassage[psg.id].attempts += 1;
        prog.byPassage[psg.id].lastTry = at;
      }
    }

    for (let i = 0; i < prof.attempts; i++) {
      let daysAgo;
      if (Math.random() < prof.recentRatio) {
        daysAgo = Math.floor(Math.random() * 8);
      } else {
        daysAgo = 8 + Math.floor(Math.random() * 7);
      }
      const ts = now - daysAgo * day - Math.floor(Math.random() * day);
      const psg = targetPassages[Math.floor(Math.random() * targetPassages.length)];
      const learningBoost = Math.max(0, (14 - daysAgo) * 0.6);
      const jitter = (Math.random() - 0.5) * prof.variance;
      const score = Math.max(20, Math.min(99, Math.round(prof.avgBase + learningBoost + jitter)));
      const at = new Date(ts).toISOString();
      prog.records.push({ passageId: psg.id, passageTitle: psg.title, score, at });
      prog.totalAttempts += 1;
      if (!prog.lastSession || at > prog.lastSession) prog.lastSession = at;
      const transcript = '（示範朗讀）';
      if (!prog.byPassage[psg.id]) prog.byPassage[psg.id] = { bestScore: 0, attempts: 0, lastTry: null, history: [] };
      if (score > prog.byPassage[psg.id].bestScore) prog.byPassage[psg.id].bestScore = score;
      prog.byPassage[psg.id].attempts += 1;
      prog.byPassage[psg.id].lastTry = at;
      prog.byPassage[psg.id].history.push({ score, transcript, at });
      if (prog.byPassage[psg.id].history.length > 20) prog.byPassage[psg.id].history = prog.byPassage[psg.id].history.slice(-20);
    }

    prog.records.sort((a, b) => new Date(a.at) - new Date(b.at));
    state.progress[s.id] = prog;
  });

  _persistProgress();
  localStorage.setItem(_DEMO_SEED_KEY, _DEMO_SEED_VERSION);
}

      <div style="flex:1;">

        <div style="font-size:0.85em;margin-top:6px;">
          <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;margin-right:6px;">${engine.costEmoji} 成本</span>
          <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;">${engine.privacyEmoji} 私隱</span>
          ${available ? '<span style="background:rgba(34,197,94,0.3);padding:2px 8px;border-radius:10px;margin-left:6px;">✅ 可用</span>' : '<span style="background:rgba(239,68,68,0.3);padding:2px 8px;border-radius:10px;margin-left:6px;">❌ 不可用</span>'}
        </div>
      </div>
    </label>`;
  }).join('');

  // Render stats
  const stats = _getAsrStats();
  const statsEl = document.getElementById('asrStats');
  if (statsEl) {
    if (Object.keys(stats).length === 0) {
      statsEl.innerHTML = '<em>尚無評估記錄</em>';
    } else {
      statsEl.innerHTML = Object.entries(stats).map(([engine, count]) =>
        `<div>${_ASR_ENGINES[engine] ? _ASR_ENGINES[engine].name : engine}：${count} 次</div>`
      ).join('');
    }
  }

  // Show whisper cache status if relevant
  checkWhisperCache();
}

function _getAsrStats() {
  const stats = {};
  Object.values(state.progress).forEach(p => {
    (p.records || []).forEach(r => {
      const e = r.engine || 'webspeech';
      stats[e] = (stats[e] || 0) + 1;
    });
  });
  return stats;
}

// Filler-word rollup across all students' reading records. Returns
// { totalFiller, totalIns, ratio, topFillers: {呀: 23, 啦: 11, ...} }
// Excludes records that pre-date the filler feature (no fillerCount field).
function _getFillerStats() {
  const totals = { totalFiller: 0, totalIns: 0, topFillers: {} };
  Object.values(state.progress).forEach(p => {
    (p.records || []).forEach(r => {
      if (typeof r.fillerCount !== 'number' || typeof r.fillerIns !== 'number') return;
      totals.totalFiller += r.fillerCount;
      totals.totalIns += r.fillerIns;
      // Also tally the specific fillers if we stored them
      if (Array.isArray(r.fillerWords)) {
        r.fillerWords.forEach(w => {
          totals.topFillers[w] = (totals.topFillers[w] || 0) + 1;
        });
      }
    });
  });
  totals.ratio = totals.totalIns > 0 ? (totals.totalFiller / totals.totalIns) : 0;
  return totals;
}

// ================== WHISPER CACHE MANAGEMENT ==================
async function preloadWhisper() {
  const statusEl = document.getElementById('whisperCacheContent');
  const preloadBtn = document.getElementById('whisperPreloadBtn');
  if (statusEl) statusEl.innerHTML = '⏳ 開始下載…';
  // Provide a cancel affordance: swap the preload button to a stop button
  // while the download is in flight. (lib.pipeline() doesn't natively
  // support AbortController, so we race a manual cancel promise against
  // the pipeline promise. Aborting before pipeline is built will resolve
  // the race to "cancelled"; aborting mid-download can leave the partial
  // pipeline in memory but the next preload call will re-use the
  // Cache Storage layer.)
  let cancelled = false;
  let cancelBtn = null;
  if (preloadBtn) {
    const originalText = preloadBtn.textContent;
    preloadBtn.textContent = '⏹ 取消下載';
    preloadBtn.style.background = '#dc2626';
    cancelBtn = preloadBtn;
    cancelBtn.onclick = (e) => { e.preventDefault(); cancelled = true; };
  }
  const cancelPromise = new Promise((resolve) => {
    if (cancelBtn) cancelBtn.addEventListener('click', () => resolve('cancelled'), { once: true });
    // Auto-fallback: if no click within 5 minutes, give up.
    setTimeout(() => resolve('timeout'), 5 * 60 * 1000);
  });
  try {
    await Promise.race([
      _ASR_ENGINES.whisper._ensurePipeline((p) => {
        if (statusEl) statusEl.innerHTML = p.message || '⏳ 處理中…';
      }),
      cancelPromise.then(r => { if (r === 'cancelled') throw new Error('USER_CANCELLED'); })
    ]);
    if (cancelled) {
      if (statusEl) statusEl.innerHTML = '⏸ 下載已取消。';
      showToast('⏸ Whisper 下載已取消');
    } else {
      if (statusEl) statusEl.innerHTML = '✅ 模型已下載並 cache。';
      showToast('✅ Whisper 已預載！');
    }
  } catch (e) {
    if (statusEl) statusEl.innerHTML = '❌ 下載失敗：' + (e.message || '').replace('USER_CANCELLED', '已取消');
    showToast('❌ 預載失敗');
  } finally {
    if (preloadBtn) {
      preloadBtn.textContent = '⬇️ 預先下載';
      preloadBtn.style.background = '#0ea5e9';
      preloadBtn.onclick = () => App.preloadWhisper();
    }
  }
}

async function checkWhisperCache() {
  const container = document.getElementById('whisperCacheStatus');
  const content = document.getElementById('whisperCacheContent');
  if (!container || !content) return;
  // Show the cache section when system tab is rendered AND whisper was used
  if (state.asrEngine === 'whisper' || _ASR_ENGINES.whisper._pipeline) {
    container.style.display = 'block';
    if (_ASR_ENGINES.whisper._pipeline) {
      content.innerHTML = '✅ 模型已載入到記憶體。重新整理後會自動從 cache 恢復。';
    } else {
      // Check if there's likely a cached model via Cache Storage
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          const hfCache = keys.find(k => k.includes('huggingface') || k.includes('transformers'));
          if (hfCache) {
            content.innerHTML = '✅ 模型已 cache（離線可用）。點下方按鈕預載到記憶體。';
          } else {
            content.innerHTML = '⚠️ 模型未下載。點下方按鈕開始下載（約 40MB，需網絡）。';
          }
        } else {
          content.innerHTML = '⚠️ 尚未下載。';
        }
      } catch (e) {
        content.innerHTML = '⚠️ 狀態不明：' + e.message;
      }
    }
  } else {
    container.style.display = 'none';
  }
}

async function clearWhisperCache() {
  showConfirm('清除 Whisper 模型 cache？清除後需要重新下載。', async () => {
    try {
      // Clear transformers.js in-memory pipeline
      _ASR_ENGINES.whisper._pipeline = null;
      _ASR_ENGINES.whisper._pipelineLoading = null;
      // Clear Cache Storage entries that look like HF model files
      if ('caches' in window) {
        const keys = await caches.keys();
        for (const key of keys) {
          if (key.includes('huggingface') || key.includes('transformers') || key.includes('onnx')) {
            await caches.delete(key);
          }
        }
      }
      // Clear IndexedDB caches that transformers.js uses
      if ('databases' in indexedDB) {
        try {
          const dbs = await indexedDB.databases();
          for (const db of dbs) {
            if (db.name && (db.name.includes('huggingface') || db.name.includes('transformers') || db.name.includes('onnx'))) {
              indexedDB.deleteDatabase(db.name);
            }
          }
        } catch(e) {}
      }
      showToast('🗑 Whisper cache 已清除');
      checkWhisperCache();
    } catch (e) {
      showToast('❌ 清除失敗：' + e.message);
    }
  });
}

// ================== PROGRESS TRACKING ==================
function _recordPassageAttempt(passageId, passageTitle, score, transcript, target) {
  if (!state.currentStudentId) return;
  const sid = state.currentStudentId;
  if (!state.progress[sid]) {
    state.progress[sid] = { byPassage: {}, records: [], totalAttempts: 0 };
  }
  const p = state.progress[sid];
  if (!p.byPassage[passageId]) {
    p.byPassage[passageId] = { bestScore: 0, attempts: 0, lastTry: null, history: [] };
  }
  const bp = p.byPassage[passageId];
  if (!bp.history) bp.history = [];
  const now = new Date().toISOString();
  bp.attempts += 1;
  bp.lastTry = now;
  if (score > bp.bestScore) bp.bestScore = score;
  bp.history.push({ score, transcript, at: now });
  if (bp.history.length > 20) bp.history = bp.history.slice(-20);
  p.totalAttempts += 1;
  p.lastSession = now;
  // Extract filler analytics from the same alignment the score came from
  // (we re-derive here to keep the storage shape self-contained — the
  // caller already has the score, so re-deriving is cheap at 2 ms).
  const filler = _fillerStats(_alignTokens(_tokenize(_normText(target)), _tokenize(_normText(transcript))).ops);
  p.records.push({
    passageId, passageTitle, score, transcript, at: now,
    fillerCount: filler.count,
    fillerIns: filler.totalIns,
    fillerWords: filler.words.slice(0, 20)  // cap to first 20 for storage
  });
  if (p.records.length > 200) p.records = p.records.slice(-200);
  state.completed.assessment = true;
  updateHubStatus();
  _persistProgress();
}

function _switchStudent(studentId) {
  state.currentStudentId = studentId;
  localStorage.setItem('yueLastStudentId', studentId);
}

      { label: '接觸過', count: touchedCount, color: '#ef4444' },

      ${_renderFunnel(funnelStages)}
    </div>`;
  }

  // ===== 30-day class average line chart =====
  if (totalAttempts > 0) {
    const dailyData = _buildDailyAvg(allScores, 30);
    html += `<div class="card-panel">
      <p style="font-weight:bold;color:#f59e0b;margin-bottom:8px;">📈 過去 30 日全班平均分</p>

      ${_renderWeekHeatmap(weeklyData)}
    </div>`;
  }

  // ===== Class-wide weak passages Top 5 =====
  const passageDifficulty = _computeClassWeakSpots(Object.values(state.progress).flatMap(p => p.records || []));
  if (passageDifficulty.length > 0) {
    const barItems = passageDifficulty.slice(0, 5).map(w => ({

    }));
    html += `<div class="card-panel">

  }

  // ===== Actionable alerts =====
  if (totalAttempts > 0) {
    const alerts = _buildAlerts();
    if (alerts.length > 0) {
      html += `<div style="background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px;margin-bottom:14px;">
        <p style="font-weight:bold;color:#ef4444;margin-bottom:8px;">⚠️ 需要跟進（${alerts.length}）</p>
        ${alerts.map(a => `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08);font-size:0.95em;">${a}</div>`).join('')}
      </div>`;
    }
  }

  // ===== ASR engine pie =====
  const asrStats = _getAsrStats();
  if (Object.keys(asrStats).length > 0) {
    const slices = Object.entries(asrStats).map(([engine, count]) => {
      const e = _ASR_ENGINES[engine] || { name: engine, costEmoji: '⚙️', privacyEmoji: '' };
      const colorMap = { 'webspeech': '#3b82f6', 'whisper': '#22c55e', 'custom': '#f59e0b' };
      return {
        label: e.name,
        value: count,
        color: colorMap[engine] || '#666',

      };
    });
    html += `<div class="card-panel">
      <p style="font-weight:bold;color:#f59e0b;margin-bottom:8px;">🎙 評估引擎使用分佈</p>
      ${_renderPieChart(slices)}
    </div>`;
  }

  // ===== Filler-word rollup =====
  // Class-level signal: across all students, how many ins tokens are
  // common Cantonese/Mandarin fillers (呀/啦/囉/呢/嘅 etc.). High
  // filler ratio is a clinical indicator for reading-disordered
  // classrooms — surfaced here so the teacher can spot a class-wide
  // trend without opening individual student detail pages.
  const fillerRollup = _getFillerStats();
  if (fillerRollup.totalIns > 0) {
    const topFillerEntries = Object.entries(fillerRollup.topFillers)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 6);
    const ratioPct = (fillerRollup.ratio * 100).toFixed(1);
    const ratioColor = fillerRollup.ratio < 0.05 ? '#22c55e' : fillerRollup.ratio < 0.15 ? '#f59e0b' : '#ef4444';
    html += `<div class="card-panel">
      <p style="font-weight:bold;color:#ec4899;margin-bottom:8px;">🤐 口頭禪分析（全班）</p>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
        <div style="font-size:2.2em;font-weight:bold;color:${ratioColor};">${ratioPct}%</div>
        <div style="flex:1;color:rgba(255,255,255,0.7);font-size:0.9em;">全班 ${fillerRollup.totalFiller} 個口頭禪 / ${fillerRollup.totalIns} 個 extra token</div>
      </div>
      ${topFillerEntries.length > 0 ? `<div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${topFillerEntries.map(([word, count]) => `<span style="background:rgba(236,72,153,0.2);color:#f9a8d4;padding:4px 10px;border-radius:8px;font-size:0.9em;">${word} × ${count}</span>`).join('')}
      </div>` : ''}
    </div>`;
  }

  // ===== Per-student cards =====
  // Pre-compute a sort key per student and sort the array. Keeps the .map() template
  // simple and avoids recomputing signals (trend, engagement, struggling) twice.
  const now = new Date();
  const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const studentKeys = state.students.map(s => {
    const p = state.progress[s.id] || {};
    const allScores = p.records || [];
    const filteredScores = filterScores(allScores);
    const attempts = filteredScores.length;
    const allByPassage = p.byPassage || {};
    const mastered = Object.values(allByPassage).filter(w => w.bestScore >= 80).length;
    const struggling = Object.values(allByPassage).filter(w => w.attempts >= 2 && w.bestScore < 60).length;
    // Trend: recent 5 vs prior 5
    let trendDiff = 0;
    if (allScores.length >= 6) {
      const recent = allScores.slice(-5).map(x => x.score);
      const prior = allScores.slice(-10, -5).map(x => x.score);
      if (prior.length > 0) {
        trendDiff = (recent.reduce((a, b) => a + b, 0) / recent.length) - (prior.reduce((a, b) => a + b, 0) / prior.length);
      }
    }
    // Engagement signal: recent-week attempts vs class average
    const recentWeekCount = allScores.filter(x => new Date(x.at) >= sevenDaysAgo).length;
    // No-practice signal
    const lastDate = p.lastSession ? new Date(p.lastSession) : null;
    const daysSince = lastDate ? Math.floor((now - lastDate) / (24 * 60 * 60 * 1000)) : 999;
    // Last 3 attempts
    const last3 = allScores.slice(-3).map(x => x.score);
    const recentStruggling = last3.length >= 3 && last3.every(x => x < 60);
    // Compute sort key per mode
    let key = 0;
    if (_dashSort === 'followup') {
      // Higher = more needs follow-up. Tie-break: name (stable).
      key = (daysSince >= 3 ? 100 : 0)
        + (recentStruggling ? 50 : 0)
        + (recentWeekCount === 0 && allScores.length > 0 ? 80 : 0) // dropped off
        + (recentWeekCount > 0 && recentWeekCount < 3 && allScores.length > recentWeekCount ? 30 : 0) // low engagement
        + (struggling * 20)
        - (mastered * 5);
      // Invert mastered: more mastered = less needs follow-up
      // We multiply by -1 when sorting so highest key comes first
      key = -key; // (will be sorted DESC by sort comparator below)
    } else if (_dashSort === 'progress') {
      key = -trendDiff; // biggest gain first (invert so DESC sort)
    } else if (_dashSort === 'practice') {
      // Fewest attempts first. New students (0 attempts) at top.
      key = attempts;
    } else {
      // 'default' = use the original index in state.students
      key = state.students.indexOf(s);
    }
    return { s, key, attempts, mastered, struggling, daysSince, recentWeekCount, recentStruggling, trendDiff };
  });
  // Sort by key ascending (since we inverted followup/progress already)
  if (_dashSort === 'followup') {
    // key was inverted (most-needs-help = most negative). Sort ascending.
    studentKeys.sort((a, b) => a.key - b.key);
  } else if (_dashSort === 'progress') {
    // key was inverted (biggest gain = most negative). Sort ascending.
    studentKeys.sort((a, b) => a.key - b.key);
  } else if (_dashSort === 'practice') {
    studentKeys.sort((a, b) => a.key - b.key);
  } // default: leave in state.students order
  const sortedStudents = studentKeys.map(x => x.s);

  html += `<p style="font-weight:bold;color:#f59e0b;margin:18px 0 8px;font-size:1.1em;">👨‍🎓 學生進度</p>`;
  html += sortedStudents.map(s => {
    const p = state.progress[s.id] || {};
    const allScores = p.records || [];
    const filteredScores = filterScores(allScores);
    const attempts = filteredScores.length;
    const lastSession = p.lastSession ? new Date(p.lastSession).toLocaleString('zh-HK', { month:'numeric', day:'numeric', hour:'numeric', minute:'numeric' }) : '—';
    const allByPassage = p.byPassage || {};
    const mastered = Object.values(allByPassage).filter(w => w.bestScore >= 80).length;
    const struggling = Object.values(allByPassage).filter(w => w.attempts >= 2 && w.bestScore < 60).length;
    const avg = attempts > 0 ? Math.round(filteredScores.reduce((sum, x) => sum + x.score, 0) / attempts) : 0;
    // Improvement: last 5 vs prior 5
    let trendLabel = '—';
    if (allScores.length >= 6) {
      const recent = allScores.slice(-5).map(x => x.score);
      const prior = allScores.slice(-10, -5).map(x => x.score);
      if (prior.length > 0) {
        const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
        const priorAvg = prior.reduce((a, b) => a + b, 0) / prior.length;
        const diff = Math.round(recentAvg - priorAvg);
        if (diff > 0) trendLabel = `↗ +${diff}`;
        else if (diff < 0) trendLabel = `↘ ${diff}`;
        else trendLabel = '→ ±0';
      }
    }
    const trendColor = trendLabel.startsWith('↗') ? '#22c55e' : trendLabel.startsWith('↘') ? '#ef4444' : 'rgba(255,255,255,0.6)';
    // Streak: consecutive days of practice ending today or yesterday
    const streak = _calcStreak(allScores);
    const streakBadge = streak >= 2
      ? `<span title="連續 ${streak} 日朗讀" style="background:linear-gradient(135deg,rgba(239,68,68,0.3),rgba(245,158,11,0.3));padding:2px 8px;border-radius:12px;font-size:0.85em;font-weight:bold;border:1px solid rgba(239,68,68,0.4);">🔥${streak}</span>`
      : '';
    return `<div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin:10px 0;border-left:6px solid ${_e(s.color || '#f59e0b')};">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">
        <span style="font-size:1.8em;">${s.avatar || '🌟'}</span>
        <span style="font-weight:bold;font-size:1.2em;flex:1;">${_e(s.name)}</span>
        <span style="background:rgba(255,255,255,0.15);padding:2px 10px;border-radius:12px;font-size:0.85em;">${attempts} 次</span>
        ${streakBadge}
        <span style="color:${trendColor};font-size:1em;font-weight:bold;">${trendLabel}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:0.9em;text-align:center;margin-bottom:6px;">
        <div style="background:rgba(34,197,94,0.2);padding:6px;border-radius:8px;">✅ ${mastered}</div>
        <div style="background:rgba(239,68,68,0.2);padding:6px;border-radius:8px;">⚠️ ${struggling}</div>
        <div style="background:rgba(245,158,11,0.2);padding:6px;border-radius:8px;">📊 ${avg}</div>
      </div>
      <div style="margin:6px 0;padding:0 2px;">
        ${_renderSessionDots(allScores, 7)}
      </div>
      <div style="font-size:0.85em;color:rgba(255,255,255,0.6);margin-top:6px;">最後朗讀：${lastSession}</div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button onclick="App.showStudentDetail('${_e(s.id)}')" style="flex:1;background:#0ea5e9;font-size:0.95em;padding:10px;min-height:42px;">📋 詳細</button>
        <button onclick="App.exportStudentReport('${_e(s.id)}')" style="flex:1;background:#f59e0b;font-size:0.95em;padding:10px;min-height:42px;">📄 報告</button>
      </div>
    </div>`;
  }).join('');

  // Top-level PDF export
  if (totalAttempts > 0) {
    html += `<button onclick="App.exportClassReport()" style="margin-top:16px;width:100%;background:#0ea5e9;font-size:1.05em;padding:14px;">📄 匯出全班報告 (PDF)</button>`;
  }

  // Dev/demo helper — re-seed sample data (for teacher demo / preview)
  // Shown only if demo data has been seeded; lets teacher refresh sample data
  if (localStorage.getItem(_DEMO_SEED_KEY) === _DEMO_SEED_VERSION) {
    html += `<div style="text-align:center;margin-top:14px;padding-top:12px;border-top:1px dashed rgba(255,255,255,0.15);">
      <button onclick="App._reseedDemoProgress()" style="background:transparent;color:rgba(255,255,255,0.5);font-size:0.85em;padding:6px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;">🧪 重設示範資料</button>
    </div>`;
  }

  container.innerHTML = html;
}

// Build actionable alerts (3-day no reading, struggling streak, etc.)
function _buildAlerts() {
  const alerts = [];
  const now = new Date();
  const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  state.students.forEach(s => {
    const p = state.progress[s.id] || {};
    const records = p.records || [];
    if (records.length === 0) return;
    // Alert 1: 3+ days no reading
    const lastDate = p.lastSession ? new Date(p.lastSession) : null;
    if (lastDate) {
      const daysSince = Math.floor((now - lastDate) / (24 * 60 * 60 * 1000));
      if (daysSince >= 3) {
        alerts.push(`${s.avatar} <b>${s.name}</b>：${daysSince} 日冇朗讀`);
      }
    }
    // Alert 2: last 3 attempts all < 60
    const last3 = records.slice(-3).map(x => x.score);
    if (last3.length >= 3 && last3.every(s => s < 60)) {
      alerts.push(`${s.avatar} <b>${s.name}</b>：最近 3 次都 &lt; 60 分`);
    }
  });
  // Alert 3: low engagement — student reading much less than class avg (last 7 days)
  const weeklyCounts = state.students.map(s => {
    const p = state.progress[s.id] || {};
    const recent = (p.records || []).filter(x => new Date(x.at) >= sevenDaysAgo);
    return { s, recent: recent.length, total: (p.records || []).length };
  });
  const activeThisWeek = weeklyCounts.filter(x => x.recent > 0);
  if (activeThisWeek.length >= 2) {
    const classAvg = activeThisWeek.reduce((sum, x) => sum + x.recent, 0) / activeThisWeek.length;
    if (classAvg >= 2) {
      weeklyCounts.forEach(({ s, recent, total }) => {
        if (recent < classAvg * 0.5 && total > recent) {
          alerts.push(`⚠️ <b>${s.name}</b>：本週只朗讀 ${recent} 次（班平均 ${Math.round(classAvg)} 次）`);
        }
      });
    }
  }
  // Alert 4: passages that 50%+ students score < 50
  const passageFail = {};
  state.students.forEach(s => {
    const p = state.progress[s.id] || {};
    Object.entries(p.byPassage || {}).forEach(([pid, info]) => {
      if (!passageFail[pid]) passageFail[pid] = { fail: 0, total: 0 };
      passageFail[pid].total += 1;
      if (info.bestScore < 50) passageFail[pid].fail += 1;
    });
  });
  Object.entries(passageFail).forEach(([pid, info]) => {
    if (info.total >= 2 && info.fail / info.total >= 0.5) {
      const psg = state.passages.find(p => p.id === pid);
      const title = psg ? psg.title : pid;
      alerts.push(`📌 <b>${_e(title)}</b>：${info.fail}/${info.total} 學生 &lt; 50 分（建議全班重溫）`);
    }
  });
  return alerts.slice(0, 8);
}

// Render a tiny SVG sparkline of scores over time
function _renderSparkline(data, width, height) {
  if (!data || data.length < 2) return '';
  const max = 100, min = 0;
  const stepX = width / (data.length - 1);
  const points = data.map((v, i) => {
    const x = i * stepX;
    const y = height - ((v - min) / (max - min)) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = data[data.length - 1];
  const lastColor = _scoreColor(last);
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:30px;">
    <polyline points="${points}" fill="none" stroke="${lastColor}" stroke-width="2"/>
    <circle cx="${((data.length-1)*stepX).toFixed(1)}" cy="${(height - ((last-min)/(max-min))*height).toFixed(1)}" r="3" fill="${lastColor}"/>
  </svg>`;
}

// Render a row of N colored dots, one per recent reading session.
// Color: green ≥80 (mastered), amber 60-79 (practicing), red <60 (struggling), gray = no data.
// `scores` is the student's full score history; we take the last N.
function _renderSessionDots(scores, n) {
  n = n || 7;
  const recent = (scores || []).slice(-n);
  // Pad with nulls on the LEFT so the rightmost dot is always the most recent
  const padded = [];
  for (let i = 0; i < n - recent.length; i++) padded.push(null);
  for (const s of recent) padded.push(s);
  const dotW = (100 / n).toFixed(2);
  const dots = padded.map((s, i) => {
    if (s === null) {
      return `<span title="未有資料" style="flex:0 0 ${dotW}%;max-width:${dotW}%;height:14px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);margin:0 1px;"></span>`;
    }
    const c = _scoreColor(s.score);
    const ptitle = s.passageTitle || '';
    const date = s.at ? new Date(s.at).toLocaleString('zh-HK', { month:'numeric', day:'numeric' }) : '';
    return `<span title="${ptitle ? ptitle + ' — ' : ''}${s.score}分（${date}）" style="flex:0 0 ${dotW}%;max-width:${dotW}%;height:14px;border-radius:50%;background:${c};box-shadow:0 0 0 1px rgba(0,0,0,0.3) inset;margin:0 1px;"></span>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:6px;font-size:0.8em;color:rgba(255,255,255,0.5);">
    <span style="flex-shrink:0;">近 ${n} 次：</span>
    <span style="flex:1;min-width:0;letter-spacing:0;line-height:1;">${dots}</span>
  </div>`;
}

// Strip heatmap: N days as colored cells. data = array of {date, count}
function _renderStripHeatmap(data, days) {
  days = days || 7;
  data = data || [];
  const cellSize = 28, gap = 4;
  const totalW = days * (cellSize + gap);
  let html = `<svg viewBox="0 0 ${totalW} ${cellSize}" style="width:100%;max-width:320px;height:${cellSize}px;">`;
  for (let i = 0; i < days; i++) {
    const cell = data[i] || { count: 0 };
    const intensity = Math.min(1, cell.count / 5);
    const color = cell.count === 0 ? 'rgba(255,255,255,0.1)'
      : intensity < 0.4 ? 'rgba(34,197,94,0.4)'
      : intensity < 0.8 ? 'rgba(34,197,94,0.7)'
      : '#22c55e';
    const x = i * (cellSize + gap);
    const label = cell.date ? new Date(cell.date).getDate() : '';
    html += `<rect x="${x}" y="0" width="${cellSize}" height="${cellSize}" rx="6" fill="${color}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
    if (label) {
      html += `<text x="${x + cellSize/2}" y="${cellSize - 6}" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)">${label}</text>`;
    }
  }
  html += '</svg>';
  return html;
}

// 4-week × 7-day heatmap (like GitHub contributions)
function _renderWeekHeatmap(weeklyData) {
  // weeklyData = [{day0..day6: count}, ...] up to 4 weeks
  const cellSize = 22, gap = 3;
  const labelW = 28, headerH = 18;
  const w = labelW + 7 * (cellSize + gap);
  const h = headerH + 4 * (cellSize + gap);
  const dayLabels = ['一', '二', '三', '四', '五', '六', '日'];
  let html = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:280px;height:${h}px;">`;
  // Day labels
  dayLabels.forEach((lbl, i) => {
    html += `<text x="0" y="${headerH + i * (cellSize + gap) + cellSize * 0.7}" font-size="10" fill="rgba(255,255,255,0.5)">${lbl}</text>`;
  });
  // Cells
  for (let w = 0; w < 4; w++) {
    for (let d = 0; d < 7; d++) {
      const count = (weeklyData[w] && weeklyData[w][d]) || 0;
      const intensity = Math.min(1, count / 5);
      const color = count === 0 ? 'rgba(255,255,255,0.08)'
        : intensity < 0.4 ? 'rgba(34,197,94,0.35)'
        : intensity < 0.8 ? 'rgba(34,197,94,0.6)'
        : '#22c55e';
      const x = labelW + d * (cellSize + gap);
      const y = headerH + w * (cellSize + gap);
      html += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" rx="4" fill="${color}"/>`;
    }
  }
  html += '</svg>';
  return html;
}

// Horizontal bar chart for weak spots
// If `clickFnName` is provided (string, name of a global function), each row is clickable
// and invokes `clickFnName(encodedLabel)` on click. Used for word → student drill-down.
function _renderBarChart(items, maxValue, clickFnName) {
  // items = [{label, value, count}]
  maxValue = maxValue || 100;
  const rowH = 26, gap = 8, labelW = 70, countW = 60, barAreaW = 160;
  const totalH = items.length * (rowH + gap);
  const totalW = labelW + barAreaW + countW;
  let html = `<svg viewBox="0 0 ${totalW} ${totalH}" style="width:100%;height:${totalH}px;">`;
  items.forEach((item, i) => {
    const y = i * (rowH + gap);
    const pct = (item.value / maxValue) * 100;
    const barColor = item.value < 50 ? '#ef4444' : item.value < 70 ? '#f59e0b' : '#22c55e';
    const rowInner = `
      <text x="0" y="${y + rowH/2 + 4}" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="bold">${item.label}</text>
      <rect x="${labelW}" y="${y + 4}" width="${barAreaW}" height="${rowH - 8}" rx="4" fill="rgba(0,0,0,0.3)"/>
      <rect x="${labelW}" y="${y + 4}" width="${barAreaW * pct / 100}" height="${rowH - 8}" rx="4" fill="${barColor}"/>
      <text x="${labelW + barAreaW * pct / 100 + 4}" y="${y + rowH/2 + 4}" font-size="11" fill="#fff" font-weight="bold">${item.value}${item.suffix || ''}</text>
      ${item.count !== undefined ? `<text x="${labelW + barAreaW + 8}" y="${y + rowH/2 + 4}" font-size="10" fill="rgba(255,255,255,0.5)">${item.count}次</text>` : ''}
    `;
    if (clickFnName) {
      // Escape quotes/backslash/newlines for safe injection into onclick attribute
      const safe = String(item.label).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
      html += `<g onclick="${clickFnName}('${safe}')" style="cursor:pointer;">${rowInner}</g>`;
    } else {
      html += rowInner;
    }
  });
  html += '</svg>';
  return html;
}

// Mastery funnel
function _renderFunnel(stages) {
  // stages = [{label, count, color}]
  const maxCount = Math.max(1, ...stages.map(s => s.count));
  const rowH = 36, gap = 6, totalH = stages.length * (rowH + gap);
  let html = `<svg viewBox="0 0 280 ${totalH}" style="width:100%;height:${totalH}px;">`;
  stages.forEach((stage, i) => {
    const y = i * (rowH + gap);
    const pct = stage.count / maxCount;
    const barW = 240 * pct;
    const barX = (280 - barW) / 2;
    html += `<text x="0" y="${y + rowH/2 + 4}" font-size="12" fill="rgba(255,255,255,0.85)" font-weight="bold">${stage.label}</text>`;
    html += `<rect x="${barX}" y="${y + 4}" width="${barW}" height="${rowH - 8}" rx="6" fill="${stage.color}"/>`;
    html += `<text x="140" y="${y + rowH/2 + 4}" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">${stage.count}</text>`;
    if (i < stages.length - 1) {
      html += `<text x="270" y="${y + rowH/2 + 4}" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">${Math.round(pct*100)}%</text>`;
    }
  });
  html += '</svg>';
  return html;
}

// 30-day line chart of class average
function _renderLineChart(dailyData, options) {
  // dailyData = [{date, avg, count}] length = 30
  options = options || {};
  const width = options.width || 320;
  const height = options.height || 100;
  const padTop = 8, padBot = 18, padLeft = 28, padRight = 8;
  const chartW = width - padLeft - padRight;
  const chartH = height - padTop - padBot;

  if (!dailyData || dailyData.length === 0) {
    return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:${height}px;"><text x="${width/2}" y="${height/2}" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">無資料</text></svg>`;
  }

  // Y-axis grid lines at 0, 50, 100
  const gridLines = [0, 50, 100];
  let html = `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:${height}px;">`;
  gridLines.forEach(v => {
    const y = padTop + chartH - (v / 100) * chartH;
    html += `<line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
    html += `<text x="${padLeft - 4}" y="${y + 3}" text-anchor="end" font-size="9" fill="rgba(255,255,255,0.4)">${v}</text>`;
  });

  const stepX = chartW / Math.max(1, dailyData.length - 1);
  const points = dailyData.map((d, i) => {
    const x = padLeft + i * stepX;
    const y = padTop + chartH - (d.avg / 100) * chartH;
    return { x, y, ...d };
  });
  const polyStr = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  // Area fill
  const areaPath = `M ${points[0].x},${padTop + chartH} L ${polyStr} L ${points[points.length-1].x},${padTop + chartH} Z`;
  html += `<path d="${areaPath}" fill="rgba(124,58,237,0.3)"/>`;
  html += `<polyline points="${polyStr}" fill="none" stroke="#7c3aed" stroke-width="2"/>`;
  // Last point dot
  const last = points[points.length - 1];
  html += `<circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3" fill="#7c3aed"/>`;
  // X labels (start, mid, end)
  const labelIndices = [0, Math.floor(dailyData.length / 2), dailyData.length - 1];
  labelIndices.forEach(i => {
    const d = new Date(dailyData[i].date);
    const label = `${d.getMonth() + 1}/${d.getDate()}`;
    html += `<text x="${points[i].x.toFixed(1)}" y="${height - 4}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.4)">${label}</text>`;
  });
  html += '</svg>';
  return html;
}

// Pie chart for ASR engine distribution
function _renderPieChart(slices) {
  // slices = [{label, value, color, emoji}]
  const total = slices.reduce((s, x) => s + x.value, 0);
  const cx = 80, cy = 80, r = 70;
  let html = `<svg viewBox="0 0 280 160" style="width:100%;height:160px;">`;
  if (total === 0) {
    html += `<text x="80" y="80" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.4)">無資料</text>`;
  } else {
    let angle = -Math.PI / 2;
    slices.forEach(slice => {
      if (slice.value === 0) return;
      const sliceAngle = (slice.value / total) * Math.PI * 2;
      const x1 = cx + r * Math.cos(angle);
      const y1 = cy + r * Math.sin(angle);
      const x2 = cx + r * Math.cos(angle + sliceAngle);
      const y2 = cy + r * Math.sin(angle + sliceAngle);
      const largeArc = sliceAngle > Math.PI ? 1 : 0;
      const path = `M ${cx},${cy} L ${x1},${y1} A ${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`;
      html += `<path d="${path}" fill="${slice.color}" stroke="#1a1a2e" stroke-width="2"/>`;
      angle += sliceAngle;
    });
  }
  // Legend
  let legendY = 16;
  slices.forEach(slice => {
    const pct = total > 0 ? Math.round(slice.value / total * 100) : 0;
    html += `<rect x="170" y="${legendY - 8}" width="12" height="12" rx="2" fill="${slice.color}"/>`;
    html += `<text x="186" y="${legendY + 2}" font-size="11" fill="rgba(255,255,255,0.9)">${slice.emoji} ${slice.label}</text>`;
    html += `<text x="276" y="${legendY + 2}" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.6)">${slice.value} (${pct}%)</text>`;
    legendY += 20;
  });
  html += '</svg>';
  return html;
}

// Build last N days of attempt counts (for strip heatmap)
function _buildDailyCounts(scores, days) {
  days = days || 7;
  const result = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
    const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);
    const count = scores.filter(s => {
      const t = new Date(s.at);
      return t >= dayStart && t < dayEnd;
    }).length;
    result.push({ date: dayStart.toISOString(), count });
  }
  return result;
}

// Build 4-week heatmap data: array of 4 weeks, each = [7 days count]
function _buildWeeklyHeatmap(scores) {
  const result = [[], [], [], []];
  const now = new Date();
  for (let w = 0; w < 4; w++) {
    for (let d = 0; d < 7; d++) {
      const daysAgo = (3 - w) * 7 + (6 - d);
      const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysAgo);
      const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);
      const count = scores.filter(s => {
        const t = new Date(s.at);
        return t >= dayStart && t < dayEnd;
      }).length;
      result[w][d] = count;
    }
  }
  return result;
}

// Build daily avg for N days (for line chart)
function _buildDailyAvg(scores, days) {
  days = days || 30;
  const result = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
    const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const dayEnd = new Date(dayStart.getTime() + 24 * 60 * 60 * 1000);
    const dayScores = scores.filter(s => {
      const t = new Date(s.at);
      return t >= dayStart && t < dayEnd;
    });
    result.push({
      date: dayStart.toISOString(),
      avg: dayScores.length > 0 ? Math.round(dayScores.reduce((sum, x) => sum + x.score, 0) / dayScores.length) : 0,
      count: dayScores.length
    });
  }
  return result;
}

// Calculate consecutive-day streak from scores.
// Uses local-midnight YYYY-MM-DD keys (timezone-safe: a score at 23:00
// in HK and a score at 01:00 the next day both bucket into the correct
// local day, not UTC day). This fixes the previous `toDateString()` bug
// where DST or TZ shifts could miscount streaks.
function _calcStreak(scores) {
  if (!scores || scores.length === 0) return 0;
  const dayKey = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  const dates = new Set(scores.map(s => dayKey(new Date(s.at))));
  let streak = 0;
  const today = new Date();
  // Allow today OR yesterday to be the streak start (don't break streak if not practiced today)
  let checkDate = new Date(today);
  if (!dates.has(dayKey(checkDate))) {
    checkDate = new Date(today.getTime() - 24 * 60 * 60 * 1000);
    if (!dates.has(dayKey(checkDate))) return 0;
  }
  while (dates.has(dayKey(checkDate))) {
    streak++;
    checkDate = new Date(checkDate.getTime() - 24 * 60 * 60 * 1000);
  }
  return streak;
}

// Compute class-wide weak passages (lowest avg score across all students)
function _computeClassWeakSpots(scores) {
  if (!Array.isArray(scores) || scores.length === 0) return [];
  const byPassage = {};
  scores.forEach(s => {
    const key = s.passageTitle || s.passageId || '未知';
    if (!byPassage[key]) byPassage[key] = { sum: 0, count: 0 };
    byPassage[key].sum += s.score;
    byPassage[key].count += 1;
  });
  return Object.entries(byPassage)
    .filter(([_, info]) => info.count >= 1)
    .map(([title, info]) => ({ word: title, avg: Math.round(info.sum / info.count), count: info.count }))
    .sort((a, b) => a.avg - b.avg);
}

function importStudentsJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.students || !Array.isArray(data.students)) {
        throw new Error('JSON 格式錯誤');
      }
      // Check for potential data loss: existing students with newer lastSession
      const newerLocal = [];
      (data.students || []).forEach(imp => {
        const local = state.students.find(s => s.id === imp.id);
        if (local) {
          const localTs = state.progress[imp.id]?.lastSession || '';
          const impTs = data.progress?.[imp.id]?.lastSession || '';
          if (localTs && impTs && localTs > impTs) {
            newerLocal.push(local.name);
          }
        }
      });
      const conflictNote = newerLocal.length > 0
        ? `\n\n⚠️ 以下學生喺本地有新啲嘅記錄（${newerLocal.slice(0, 3).join('、')}${newerLocal.length > 3 ? '...' : ''}），匯入會保留本地版本。`
        : '';
      showConfirm(`將匯入 ${data.students.length} 個學生（同 ${Object.keys(data.progress || {}).length} 個進度記錄）。現有資料會被合併。${conflictNote}`, () => {
        // Merge: by id, newer lastSession wins (keep local if it has newer data)
        const existingById = {};
        state.students.forEach(s => existingById[s.id] = s);
        (data.students || []).forEach(imp => {
          const local = state.students.find(s => s.id === imp.id);
          if (!local) {
            existingById[imp.id] = imp;
          } else {
            // Keep whichever record was updated more recently
            const localTs = state.progress[imp.id]?.lastSession || '';
            const impTs = data.progress?.[imp.id]?.lastSession || '';
            if (!localTs || (impTs && impTs > localTs)) {
              existingById[imp.id] = imp;
            }
            // else keep local (already present in existingById)
          }
        });
        state.students = Object.values(existingById);
        // Progress merge: same newer-wins strategy per student
        if (data.progress) {
          Object.entries(data.progress).forEach(([sid, impProg]) => {
            const localProg = state.progress[sid];
            const localTs = localProg?.lastSession || '';
            const impTs = impProg?.lastSession || '';
            if (!localTs || (impTs && impTs > localTs)) {
              state.progress[sid] = impProg;
            }
            // else keep local progress
          });
        }
        _persistStudents();
        _persistProgress();
        renderStudentList();
        _renderLoginMode();
        renderDashboard();
        showToast('⬆️ 匯入成功！');
      });
    } catch(err) {
      alert('匯入失敗：' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

        <div style="font-weight:bold;font-size:1.1em;margin-bottom:2px;">${_e(p.title)} <span style="font-size:0.85em;color:#f59e0b;">${stars}</span></div>
        <div style="font-size:0.85em;color:rgba(255,255,255,0.6);">${type ? _e(type.icon + ' ' + type.label) : p.type} • ${_e(p.author || '')}</div>
        <div style="font-size:0.8em;color:rgba(255,255,255,0.4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${_e(p.text)}</div>
      </div>
      <button onclick="App.editPassage('${_e(p.id)}')" style="background:#0ea5e9;min-height:36px;padding:6px 12px;font-size:0.9em;">✏️</button>
      <button onclick="App.deletePassage('${_e(p.id)}')" style="background:#dc2626;min-height:36px;padding:6px 12px;font-size:0.9em;">🗑</button>
    </div>`;
  }).join('');
}

function addNewPassage() {
  _editingPassageId = null;
  openPassageModal({});
}

function editPassage(passageId) {
  const psg = state.passages.find(p => p.id === passageId);
  if (!psg) return;
  _editingPassageId = passageId;
  openPassageModal(psg);
}

function openPassageModal(psg) {
  const modal = document.getElementById('passageModal');
  if (!modal) return;
  document.getElementById('pm_title').value = psg.title || '';
  document.getElementById('pm_author').value = psg.author || '';
  document.getElementById('pm_type').value = psg.type || 'prose';
  document.getElementById('pm_difficulty').value = psg.difficulty || 1;
  document.getElementById('pm_text').value = psg.text || '';
  document.getElementById('passageModalTitle').textContent = _editingPassageId ? '✏️ 編輯文章' : '✏️ 新增文章';
  modal.style.display = 'block';
}

function closePassageModal() {
  document.getElementById('passageModal').style.display = 'none';
  _editingPassageId = null;
}

function savePassageFromModal() {
  const title = document.getElementById('pm_title').value.trim();
  const text = document.getElementById('pm_text').value.trim();
  if (!title || !text) {
    alert('請填寫標題和文章內容');
    return;
  }
  const newPassage = {
    id: _editingPassageId || ('p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
    title,
    author: document.getElementById('pm_author').value.trim(),
    type: document.getElementById('pm_type').value,
    difficulty: parseInt(document.getElementById('pm_difficulty').value) || 1,
    text
  };
  if (_editingPassageId) {
    const idx = state.passages.findIndex(p => p.id === _editingPassageId);
    if (idx >= 0) state.passages[idx] = newPassage;
  } else {
    state.passages.push(newPassage);
  }
  _persistPassages();
  closePassageModal();
  renderPassageList();
  renderAdminTypeList();
  showToast('✅ 文章已儲存');
}

function deletePassage(passageId) {
  const psg = state.passages.find(p => p.id === passageId);
  if (!psg) return;
  showConfirm(`確定刪除文章「${psg.title}」？`, () => {
    state.passages = state.passages.filter(p => p.id !== passageId);
    _persistPassages();
    renderPassageList();
    renderAdminTypeList();
    showToast('🗑 文章已刪除');
  });
}

function _persistPassages() {
  localStorage.setItem('yuePassages', JSON.stringify(state.passages));
}

// ================== IMPORT / EXPORT ==================
function exportPassagesJson() {
  const data = {
    _comment: '朗讀評分 — 文章資料庫',
    _exported_at: new Date().toISOString(),
    types: state.types,
    passages: state.passages
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'passages_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('⬇️ 已下載 JSON');
}

function importPassagesJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.passages || !Array.isArray(data.passages)) {
        throw new Error('JSON 格式錯誤：缺少 passages 陣列');
      }
      showConfirm(`將匯入 ${data.passages.length} 篇文章。現有資料會被取代，確定？`, () => {
        if (data.types) {
          state.types = data.types;
          state.types.forEach(t => { t.enabled = t.enabled !== false; });
          localStorage.setItem('yueTypes', JSON.stringify(state.types));
        }
        state.passages = data.passages;
        _persistPassages();
        renderAdminTypeList();
        renderPassageList();
        showToast('⬆️ 匯入成功！');
      });
    } catch(err) {
      alert('匯入失敗：' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function resetToDefaultPassages() {
  showConfirm('重設後將清除所有自訂文章，回到 data/passages.json 預設內容。確定？', async () => {
    try {
      const resp = await fetch('data/passages.json');
      const data = await resp.json();
      state.types = data.types || [];
      state.passages = data.passages || [];
      localStorage.removeItem('yueTypes');
      localStorage.removeItem('yuePassages');
      localStorage.removeItem('yueAdminSettings');
      renderAdminTypeList();
      renderPassageList();
      showToast('🔄 已重設為預設值');
    } catch(e) {
      showToast('❌ 重設失敗：網絡問題，請確保已連線');
    }
  });
}

// ================== DEBUG TOGGLE (UI) ==================
// Called from the Settings tab 🐛 button. Persists to localStorage
// (same key the URL param uses) so the user can disable debug mode
// without the ?debug=1 URL.
function toggleDebugMode() {
  const newVal = !__debug.enabled();
  __debug.setEnabled(newVal);
  __debug.log('toggleDebugMode', { enabled: newVal });
  if (newVal) {
    __debugRenderPanel();
    showToast('🐛 Debug 模式已開啟 — 右下角 panel');
  } else {
    const panel = document.getElementById('__debugPanel');
    if (panel) panel.remove();
    showToast('🐛 Debug 模式已關閉');
  }
  _updateDebugToggleUI();
}

function _updateDebugToggleUI() {
  const btn = document.getElementById('debugToggleBtn');
  const badge = document.getElementById('debugModeBadge');
  if (!btn || !badge) return;
  if (__debug.enabled()) {
    btn.textContent = '🔴 關閉 Debug';
    btn.style.background = '#22c55e';
    badge.textContent = '(開啟中)';
    badge.style.color = '#22c55e';
  } else {
    btn.textContent = '🐛 開啟 Debug';
    btn.style.background = '#ef4444';
    badge.textContent = '(關閉)';
    badge.style.color = '#9ca3af';
  }
}
