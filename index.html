<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Aggressive no-cache: force browser to re-fetch on every load.
     Without this, Chrome + GitHub Pages CDN cache the file for ~10min,
     and the browser disk cache can hold it much longer. We deploy fixes
     in tight loops and need users to always see the latest version
     (build stamp visible bottom-left confirms which build is live). -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>朗讀評分 — 散文・詩詞</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
<!-- Transformers.js for on-device Whisper ASR (lazy loaded) -->
<script type="module">
  // Just expose the CDN URL as a hint. Actual dynamic import happens on first use.
  window.TRANSFORMERS_CDN = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.5';
</script>
<script>
  // Build stamp — bumped each deploy. Defined here (NOT in the module
  // script above) because module scripts are deferred and would run AFTER
  // the main script's init(), leaving window.__BUILD_ID undefined when
  // init() tries to inject it into the trace.
  // Format: <commit-short-sha> @ <iso-date> (<short-summary>)
  window.__BUILD_ID = 'skip-grace-5s @ 2026-06-18';
</script>
<style>
:root { --purple:#7c3aed; --gold:#f59e0b; --green:#22c55e; --red:#ef4444; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Microsoft JhengHei',sans-serif; background:#1a1a2e; color:#fff; font-size:18px; min-height:100vh; }
.page { display:none; min-height:100vh; padding:20px; }
.page.active { display:block; }
.home-card, .hub-card, .vocab-card, .result-card { background:#fff; color:#1a1a2e; border:4px solid #f59e0b; border-radius:24px; padding:24px; margin:20px auto; max-width:700px; }
h1,h2 { font-size:2.2em; color:#f59e0b; text-align:center; margin-bottom:20px; }
input, button { font-size:1.4em; padding:18px 32px; border-radius:16px; border:none; min-height:70px; }
button { background:#7c3aed; color:#fff; cursor:pointer; touch-action:manipulation; }
button:active { transform:scale(0.95); }
.vocab-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; max-width:900px; margin:0 auto; }
.vocab-card { text-align:center; cursor:pointer; transition:transform .2s; }
.vocab-card:hover { transform:scale(1.03); }
.vocab-char { font-size:2.8em; font-weight:bold; color:#7c3aed; }
.vocab-pinyin { color:#666; margin:8px 0; }
.record-btn { background:#22c55e; font-size:1.6em; width:100%; margin-top:16px; }
.score { font-size:2.5em; font-weight:bold; color:#22c55e; }
.hub-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:800px; margin:0 auto; }
.hub-card { background:rgba(255,255,255,0.1); border:3px solid rgba(255,255,255,0.3); color:#fff; text-align:center; cursor:pointer; }
.hub-icon { font-size:3em; margin-bottom:12px; }
.progress { position:fixed; top:0; left:0; width:100%; background:#111; padding:8px; z-index:100; }
.progress-dots { display:flex; justify-content:center; gap:12px; }
.progress-dot { width:28px; height:28px; border-radius:50%; background:#444; display:flex; align-items:center; justify-content:center; font-size:0.9em; }
.progress-dot.done { background:#22c55e; }
.progress-dot.current { background:#f59e0b; animation:pulse 1.5s infinite; }
@keyframes pulse { 50%{transform:scale(1.2);} }
#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:14px 28px; border-radius:12px; z-index:9999; display:none; pointer-events:none; }
.student-avatar-card {
  background:#fff;
  color:#1a1a2e;
  border:4px solid #f59e0b;
  border-radius:20px;
  padding:20px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform .2s;
  touch-action:manipulation;
  min-height:120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.student-avatar-card:hover { transform:scale(1.05); }
.student-avatar-card:active { transform:scale(0.95); }
.student-emoji { font-size:3em;display:block;margin-bottom:6px; }

/* ===== Responsive: phone portrait / small iPad ===== */
@media (max-width: 600px) {
  body { font-size:16px; }
  .page { padding:12px; padding-top:48px; }  /* leave room for fixed progress bar */
  /* Shrink the home card top margin so PIN keypad fits — kept for reference only (PIN mode removed 2026-06-13) */
  .home-card[style*="margin-top:60px"] { margin-top:20px !important; }
  h1, h2 { font-size:1.6em; }
  .home-card, .hub-card, .vocab-card, .result-card { padding:16px; margin:12px auto; border-width:3px; }
  /* Hub: stack 3 cards vertically on phone */
  .hub-grid { grid-template-columns:1fr; gap:12px; }
  .hub-icon { font-size:2.4em; }
  /* Vocab grid: still auto-fit but allow smaller min so single-column on phone */
  .vocab-grid { grid-template-columns:1fr; gap:12px; }
  /* Teacher summary 4-col → 2-col on phone */
  .page > div[style*="grid-template-columns:repeat(4,1fr)"] { grid-template-columns:repeat(2,1fr) !important; }
  /* Touch target enforcement */
  button, input { min-height:60px; font-size:1.2em; }
  /* Student avatar grid: 2 columns on phone */
  #studentAvatarGrid { grid-template-columns:repeat(2,1fr) !important; gap:12px !important; }
  .student-avatar-card { min-height:100px !important; padding:14px 8px !important; }
}
@media (max-width: 380px) {
  /* Very narrow phone: tighter grid */
  .student-avatar-card { min-height:90px !important; padding:10px 6px !important; }
}

/* P2.2 utility classes — extracted from inline styles.
   Replaces repeated inline patterns to keep render functions readable
   and to centralize visual tokens. Specificity kept low so the
   per-element inline tweaks still win when needed. */
.card-panel { background:rgba(255,255,255,0.05); border-radius:12px; padding:14px; margin-bottom:14px; }
.text-muted { color:rgba(255,255,255,0.7); font-size:0.9em; }
.text-xs    { font-size:0.85em; color:rgba(255,255,255,0.6); }
.row-flex   { display:flex; align-items:center; gap:14px; }
.bg-soft    { background:rgba(255,255,255,0.05); }
.radius-12  { border-radius:12px; }
/* Recording status progress bars — visual feedback for the 3 stages of
   a recording session: 🔴 錄音中 (active mic), ⏹ 完成 (transition),
   ⏳ 處理中… (post-recording scoring). The bars use CSS animations
   so the user always sees motion, even when the underlying promise
   is stuck (e.g. Chrome mic mutex blocking parallel MediaRecorder).
   The animations are GPU-composited (transform: translateX) so they
   run smoothly even on low-end devices. */
@keyframes recbar-recording {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
@keyframes recbar-processing {
  0%   { transform: translateX(-100%); width: 30%; }
  50%  { width: 60%; }
  100% { transform: translateX(220%); width: 30%; }
}
@keyframes recbar-pulse {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; }
}
.recbar {
  position: relative;
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.recbar-recording {
  background: linear-gradient(90deg,
    rgba(239,68,68,0) 0%,
    rgba(239,68,68,0.95) 50%,
    rgba(239,68,68,0) 100%);
  height: 100%;
  width: 50%;
  animation: recbar-recording 1.6s ease-in-out infinite,
             recbar-pulse 1.0s ease-in-out infinite;
}
.recbar-processing {
  background: linear-gradient(90deg,
    rgba(14,165,233,0) 0%,
    rgba(14,165,233,0.95) 50%,
    rgba(14,165,233,0) 100%);
  height: 100%;
  animation: recbar-processing 2.0s ease-in-out infinite;
}
.recbar-whisper {
  background: linear-gradient(90deg,
    rgba(124,58,237,0) 0%,
    rgba(124,58,237,0.95) 50%,
    rgba(124,58,237,0) 100%);
  height: 100%;
  animation: recbar-processing 2.5s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="progress"><div class="progress-dots" id="progressDots"></div></div>

<!-- HOME / LOGIN — student grid (no auth needed for SEN use case) -->
<div id="home" class="page active">
  <div style="text-align:center;max-width:700px;margin:40px auto;padding:0 20px;">
    <h1 style="font-size:2.2em;color:#f59e0b;margin-bottom:8px;">朗讀評分</h1>
    <p style="font-size:1.2em;color:rgba(255,255,255,0.8);margin-bottom:32px;">散文・詩詞朗讀評估</p>

    <!-- Student avatar grid -->
    <p style="font-size:1.1em;color:rgba(255,255,255,0.7);margin-bottom:20px;">撳你嘅相卡嚟開始朗讀</p>
    <div id="studentAvatarGrid" style="display:grid;gap:16px;max-width:560px;margin:0 auto;"><div style="grid-column:1/-1;text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:1.2em;">⏳ 載入中…</div></div>
    <div id="loginError" style="color:#ef4444;font-size:1.1em;min-height:24px;margin-top:16px;"></div>

    <!-- Confirmation modal -->
    <div id="confirmCard" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9000;align-items:center;justify-content:center;">
      <div style="background:#1a1a2e;border:4px solid #f59e0b;border-radius:24px;padding:32px;max-width:340px;width:90%;text-align:center;">
        <div id="confirmCardEmoji" style="font-size:5em;margin-bottom:12px;"></div>
        <div id="confirmCardName" style="font-size:2em;font-weight:bold;color:#f59e0b;margin-bottom:8px;"></div>
        <div style="color:rgba(255,255,255,0.7);font-size:1.1em;margin-bottom:28px;">係你嗎？</div>
        <button id="confirmCardYes" style="width:100%;background:#22c55e;font-size:1.3em;padding:16px;border-radius:16px;min-height:64px;">係，開始 ✅</button>
        <button onclick="App.cancelCardLogin()" style="margin-top:12px;background:#444;color:#fff;font-size:1.1em;padding:12px;border-radius:14px;width:100%;min-height:52px;">唔係，取消</button>
      </div>
    </div>

    <!-- Teacher entry — small, unobtrusive, at bottom -->
    <div style="margin-top:48px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.15);">
      <button onclick="App.enterTeacherMode()" style="background:transparent;color:rgba(255,255,255,0.45);font-size:0.9em;padding:10px 20px;min-height:44px;border:1px solid rgba(255,255,255,0.2);border-radius:10px;">🔧 老師模式</button>
    </div>

    <div id="engineStatusHome" style="margin-top:16px;font-size:0.85em;color:rgba(255,255,255,0.4);"></div>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="page">
  <div style="max-width:800px;margin:40px auto;text-align:center;">
    <div id="hubGreeting" style="font-size:2em;margin-bottom:30px;">👋 你好，準備好未？</div>
    <div class="hub-grid">
      <div class="hub-card" onclick="App.goTo('assessment');App.startAssessment();">
        <div class="hub-icon">📖</div>
        <div style="font-size:1.5em;font-weight:bold;">朗讀</div>
        <div style="opacity:0.8;">揀文章朗讀評分</div>
        <div id="hubAssessment" style="margin-top:12px;"></div>
      </div>
      <div class="hub-card" onclick="App.showMyProgress();">
        <div class="hub-icon">⭐</div>
        <div style="font-size:1.5em;font-weight:bold;">我的進度</div>
        <div style="opacity:0.8;">睇下我讀過咩</div>
      </div>
    </div>

    <!-- 老師設定面板（預設折疊） -->
    <!-- 老師入口（細字，避免學生混淆） -->
    <div style="margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);text-align:center;">
      <button onclick="App.enterTeacherMode()" style="background:transparent;color:rgba(255,255,255,0.5);font-size:0.9em;padding:8px 16px;min-height:36px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;">🔧 老師模式</button>
    </div>

    <button onclick="App.goTo('home')" style="margin-top:20px;background:#666;">🏠 返回首頁</button>
    <div id="engineIndicator" style="margin-top:14px;font-size:0.85em;color:rgba(255,255,255,0.5);"></div>
  </div>
</div>

<!-- ASSESSMENT PAGE -->
<div id="assessment" class="page">
  <h2>📖 朗讀評估</h2>
  <div id="assessmentContent" style="max-width:700px;margin:0 auto;"></div>
  <button onclick="App.updateHubStatus();App.goTo('hub')" style="margin:30px auto;display:block;background:#666;">🏠 返回中心</button>
</div>

<!-- MY PROGRESS (student-facing) -->
<div id="myProgress" class="page">
  <div id="myProgressContent" style="max-width:800px;margin:40px auto;padding:0 20px;"></div>
</div>

<!-- TEACHER WORKSPACE (isolated from student flow) -->
<div id="teacher" class="page" style="background:linear-gradient(135deg,#1a1a2e,#2d1b4e);min-height:100vh;">
  <div style="max-width:900px;margin:0 auto;padding:20px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <h1 style="color:#f59e0b;font-size:1.8em;margin:0;">🔧 老師工作台</h1>
      <div style="flex:1;"></div>
      <button onclick="App.exitTeacherMode()" style="background:#666;font-size:1em;padding:10px 20px;min-height:44px;border-radius:10px;">🚪 退出</button>
    </div>
    <!-- Tab nav -->
    <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid rgba(255,255,255,0.2);flex-wrap:wrap;">
      <button id="tchTabDashboardBtn" onclick="App.tchSwitchTab('dashboard')" style="flex:1;min-width:120px;background:#7c3aed;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">📊 Dashboard</button>
      <button id="tchTabStudentsBtn" onclick="App.tchSwitchTab('students')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">👨‍🎓 學生</button>
      <button id="tchTabEditBtn" onclick="App.tchSwitchTab('edit')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">📝 文章</button>
      <button id="tchTabSettingsBtn" onclick="App.tchSwitchTab('settings')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">⚙️ 系統</button>
    </div>
    <div id="tchTabDashboard" class="tch-tab-content"></div>
    <div id="tchTabStudents" class="tch-tab-content" style="display:none;"></div>
    <div id="tchTabEdit" class="tch-tab-content" style="display:none;"></div>
    <div id="tchTabSettings" class="tch-tab-content" style="display:none;"></div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="page">
  <div class="result-card" style="text-align:center;">
    <h2>評分結果</h2>
    <div id="resultWord" style="font-size:2.2em;margin:20px 0;color:#7c3aed;"></div>
    <div class="score" id="resultScore"></div>
    <div id="resultTier" style="font-size:1.1em;margin:6px 0;color:rgba(0,0,0,0.6);"></div>
    <div id="resultFeedback" style="font-size:1.3em;margin:14px 0;font-weight:bold;"></div>

    <!-- 4 sub-scores grid -->
    <div id="resultSubScores" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;"></div>

    <!-- 逐字 diff highlight -->
    <div style="background:#f3e8ff;padding:14px;border-radius:14px;margin:14px 0;text-align:left;">
      <div style="font-weight:bold;margin-bottom:6px;color:#7c3aed;font-size:0.95em;">📝 逐字對齊 <span style="font-weight:normal;font-size:0.85em;color:rgba(0,0,0,0.6);">（綠=啱 紅=錯 灰=漏咗 黃=多咗）</span></div>
      <div id="resultDiff" style="line-height:1.9;font-size:1.15em;font-family:inherit;"></div>
    </div>

    <!-- 流暢度指標 -->
    <div id="resultFluency" style="background:#fef3c7;padding:12px;border-radius:12px;margin:14px 0;text-align:left;font-size:0.95em;"></div>

    <!-- TTS / Replay buttons -->
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="resultListenBtn" onclick="App._resultListen()" style="flex:1;background:#0ea5e9;font-size:1.05em;padding:12px;">🔊 聽示範</button>
      <button id="resultReplayBtn" onclick="App._resultReplay()" style="flex:1;background:#7c3aed;font-size:1.05em;padding:12px;">▶ 聽自己</button>
    </div>

    <!-- Word retry section: hidden until scoring produces a wrong-word list -->
    <div id="resultWordRetry" style="display:none;background:#fee2e2;padding:12px;border-radius:12px;margin:14px 0;text-align:left;">
      <div style="font-weight:bold;margin-bottom:8px;color:#dc2626;font-size:0.95em;">🔁 錯字重讀（撳字重試）</div>
      <div id="resultWordRetryList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>

    <div id="resultAI" style="background:#f3e8ff;padding:14px;border-radius:14px;margin:14px 0;text-align:left;font-size:0.9em;"></div>

    <div style="display:flex;gap:8px;margin-top:20px;" id="resultActions">
      <button onclick="App.retryCurrentPassage()" style="flex:1;background:#f59e0b;font-size:1.1em;padding:14px;">🔄 再讀一次</button>
      <button onclick="App.showPassageSelector()" style="flex:1;background:#22c55e;font-size:1.1em;padding:14px;">📖 其他文章 →</button>
    </div>
    <button onclick="App.showCertModal()" style="margin-top:12px;background:#7c3aed;width:100%;font-size:1.1em;padding:14px;">🏆 睇我嘅證書</button>
  </div>
</div>

<!-- WORD REPRACTICE: shows when student taps a single wrong word -->
<div id="wordRepractice" class="page">
  <div class="hub-card" style="text-align:center;max-width:560px;">
    <h2>🎯 單字重讀</h2>
    <div id="wordRepracticeWord" style="font-size:3em;color:#dc2626;margin:20px 0;font-weight:bold;"></div>
    <div id="wordRepracticeContext" style="color:rgba(0,0,0,0.7);margin-bottom:16px;font-size:1em;"></div>
    <div id="wordRepracticeStatus" style="min-height:80px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.05);border-radius:14px;padding:14px;margin:14px 0;"></div>
    <div style="display:flex;gap:8px;">
      <button id="wordRepracticeListen" onclick="App._repracticeListen()" style="flex:1;background:#0ea5e9;font-size:1em;padding:12px;">🔊 聽示範</button>
      <button id="wordRepracticeRec" onclick="App._repracticeRecord()" style="flex:1;background:#ef4444;font-size:1em;padding:12px;">🎤 讀一次</button>
    </div>
    <div id="wordRepracticeResult" style="margin-top:14px;"></div>
    <button onclick="App.goTo('result')" style="margin-top:14px;background:#444;width:100%;font-size:1em;padding:12px;">↩ 返去睇結果</button>
  </div>
</div>

<div id="toast"></div>

<!-- Certificate Modal (view only, no print) -->
<div id="certModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10002;overflow:auto;">
  <div id="certContent" style="max-width:600px;margin:30px auto;padding:20px;"></div>
</div>

<!-- Passage Edit Modal -->
<div id="passageModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;overflow:auto;">
  <div style="background:#1a1a2e;border:3px solid #f59e0b;border-radius:20px;max-width:560px;margin:40px auto;padding:24px;color:#fff;">
    <h3 id="passageModalTitle" style="color:#f59e0b;text-align:center;margin-bottom:20px;">✏️ 新增文章</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <label style="font-size:1.1em;">
        標題 <span style="color:#ef4444;">*</span>
        <input id="pm_title" type="text" maxlength="50" style="width:100%;font-size:1.2em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
      </label>
      <label style="font-size:1.1em;">
        作者
        <input id="pm_author" type="text" maxlength="50" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
      </label>
      <div style="display:flex;gap:12px;">
        <label style="font-size:1.1em;flex:1;">
          類型
          <select id="pm_type" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
            <option value="prose">📖 散文</option>
            <option value="poetry">🪷 詩詞</option>
          </select>
        </label>
        <label style="font-size:1.1em;flex:1;">
          難度（星）
          <select id="pm_difficulty" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
            <option value="1">⭐ 易</option>
            <option value="2">⭐⭐ 中</option>
            <option value="3">⭐⭐⭐ 難</option>
          </select>

<script>
// STATE
let state = {
  mode: 'student',  // 'student' | 'teacher'
  currentStudentId: null,
  currentPassage: null,
  completed: { assessment: false },
  autoTTS: true,
  types: [],
  passages: [],

  // Students + progress (loaded from localStorage at init)
  students: [],
  progress: {},       // { [studentId]: progressObj }
  // ASR engine selection (pluggable)
  // Default = 'whisper' (transformers.js local ASR, real Cantonese support,
  // not subject to Chrome macOS Web Speech API + zh-HK backend failure).
  // Users can switch back to 'webspeech' in Settings, but on first use the
  // Whisper model (~40MB) downloads once and is cached.
  asrEngine: 'whisper',  // 'webspeech' | 'whisper' | 'custom'
  // Recording timeout (seconds). null = unlimited; student taps "完成" when done.
  recordingTimeout: null
};

// ================== SECURITY ==================
// Escape HTML special chars — use this for ALL user content injected into innerHTML.
function _e(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ================== SCORING CONSTANTS ==================
// Single source of truth for tier thresholds + history caps. Reused by
// _tierFromScore, _scoreColor, _recordPassageAttempt, renderDashboard.
const SCORING = Object.freeze({
  TIER_GOLD:   90,
  TIER_SILVER: 75,
  TIER_BRONZE: 60,
  HISTORY_CAP_PER_PASSAGE: 20,   // bp.history.length cap
  HISTORY_CAP_PER_STUDENT: 200,  // p.records.length cap
});

// ================== TIER / COLOR HELPERS ==================
// Convert a numeric score to its UI tier (label, color, emoji).
// Replaces the 2 inline ladders in scorePassage() and showCertModal().
function _tierFromScore(total) {
  if (total >= SCORING.TIER_GOLD)   return { label: '金',   color: '#ffd700', emoji: '🥇' };
  if (total >= SCORING.TIER_SILVER) return { label: '銀',   color: '#c0c0c0', emoji: '🥈' };
  if (total >= SCORING.TIER_BRONZE) return { label: '銅',   color: '#cd7f32', emoji: '🥉' };
  return                                    { label: '參與', color: '#7c3aed', emoji: '🌟' };
}

// Status color for sub-scores, dots, sparklines. Replaces 5+ copy-paste ladders.
function _scoreColor(score) {
  return score >= SCORING.TIER_GOLD   ? '#22c55e'
       : score >= SCORING.TIER_BRONZE ? '#f59e0b'
       :                                '#ef4444';
}

// ================== STORAGE SCHEMA ==================
// localStorage keys: yuePassages / yueTypes / yueAdminSettings / yueStudents
// / yueProgress / yueAsrEngine / yueLastStudentId / yueTeacherPassHash /
// yueSeededDemo_v2 / yueAudioBaselines. Bump _SCHEMA_VERSION when shape changes
// and add a migration entry in _migrateIfNeeded().
const _SCHEMA_VERSION = 2;
const _SCHEMA_VERSION_KEY = 'yueSchemaVersion';

// Defensive sanitize a single student's progress object on load.
// Returns a normalized object that downstream code can trust (no missing fields).
function _sanitizeProgress(p) {
  if (!p || typeof p !== 'object') return { byPassage: {}, records: [], totalAttempts: 0 };
  return {
    byPassage: (p.byPassage && typeof p.byPassage === 'object') ? p.byPassage : {},
    records: Array.isArray(p.records) ? p.records : [],
    totalAttempts: Number(p.totalAttempts) || 0,
    lastSession: p.lastSession || null
  };
}

// Run once on init: bring any persisted data up to the current schema version.
function _migrateIfNeeded() {
  const stored = parseInt(localStorage.getItem(_SCHEMA_VERSION_KEY) || '0', 10);
  if (stored >= _SCHEMA_VERSION) return;
  // v1 → v2: progress entries may be missing byPassage/records/totalAttempts.
  // Sanitize on read instead of bulk-rewriting localStorage.
  try {
    const raw = JSON.parse(localStorage.getItem('yueProgress') || '{}');
    const cleaned = {};
    for (const sid of Object.keys(raw || {})) cleaned[sid] = _sanitizeProgress(raw[sid]);
    state.progress = cleaned;
    _persistProgress();
  } catch (e) {
    console.warn('[migrate] progress sanitize failed', e);
    state.progress = {};
  }
  localStorage.setItem(_SCHEMA_VERSION_KEY, String(_SCHEMA_VERSION));
}

// ================== DEBUG OVERLAY ==================
// Enable via:
//   1. URL param:  ?debug=1              (also persists to localStorage)
//   2. localStorage: yueDebug = "1"
//   3. Settings tab → ⚙️ 系統 → 🐛 Debug mode toggle (UI added below)
//
// When enabled, the module:
//   - Captures console.error / console.warn / unhandledrejection / window.error
//   - Records explicit __debug.log/warn/error calls at critical points
//     (recording start/stop, MediaRecorder events, transcribe pipeline,
//     scorePassage, fallback navigation)
//   - Shows a floating bottom-right panel with collapsible history
//   - Adds a 🐛 DEBUG badge next to the engine indicator on the hub
//   - "Copy" button copies the full trace as text for bug reports
//
// Design notes:
//   - Capture starts BEFORE the SPA init runs, so we can catch any
//     load-time errors that would otherwise disappear (e.g. showConfirm
//     missing → App namespace abort pre-2026-06).
//   - Non-serializable values (Error, Blob, HTMLElement) are flattened
//     so JSON.stringify in the copy flow doesn't drop them.
//   - Buffer is capped at 500 entries; oldest are dropped first.
const __debug = (() => {
  let enabled = false;
  try {
    const u = new URL(location.href);
    if (u.searchParams.get('debug') === '1') {
      localStorage.setItem('yueDebug', '1');
      enabled = true;
    } else if (u.searchParams.get('debug') === '0') {
      localStorage.removeItem('yueDebug');
      enabled = false;
    } else {
      enabled = localStorage.getItem('yueDebug') === '1';
    }
  } catch (e) { enabled = false; }
  const buf = [];
  const MAX = 500;
  const startTime = Date.now();
  const sanitize = (v) => {
    if (v == null) return v;
    if (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') return v;
    if (v instanceof Error) {
      return { __type: 'Error', name: v.name, message: v.message, stack: (v.stack || '').split('\n').slice(0, 4).join(' | ') };
    }
    if (v instanceof Blob) {
      return { __type: 'Blob', size: v.size, mimeType: v.type };
    }
    if (v instanceof HTMLElement) {
      return { __type: 'Element', tag: v.tagName, id: v.id, class: v.className };
    }
    if (v instanceof MediaStream || (v && v.getTracks)) {
      return { __type: 'MediaStream', tracks: (v.getTracks ? v.getTracks().length : 0) };
    }
    if (v && v.constructor && v.constructor.name === 'MediaRecorder') {
      return { __type: 'MediaRecorder', state: v.state, mimeType: v.mimeType };
    }
    if (Array.isArray(v)) return v.map(sanitize);
    if (typeof v === 'object') {
      const out = {};
      for (const k of Object.keys(v)) {
        try { out[k] = sanitize(v[k]); } catch (e) { out[k] = '[unreadable]'; }
      }
      return out;
    }
    return String(v);
  };
  // FIX: capture originals BEFORE the override below, so add() can pipe to
  // the real console. Without this, add() references the OVERRIDDEN
  // console.error → console.error calls add() → add() calls console.error
  // → infinite recursion → RangeError: Maximum call stack size exceeded.
  // The recursion bug surfaced in production on 2026-06-17 when the debug
  // panel itself became the source of the hang, after ~55s of bubbling.
  const _origConsoleError = (typeof console !== 'undefined' && console.error) || function() {};
  const _origConsoleWarn = (typeof console !== 'undefined' && console.warn) || function() {};
  const _origConsoleLog = (typeof console !== 'undefined' && console.log) || function() {};
  const add = (level, event, data) => {
    if (!enabled) return;
    const entry = {
      t: +((Date.now() - startTime) / 1000).toFixed(2),
      level,
      event,
      data: data == null ? null : (Array.isArray(data) && data.length === 1 ? sanitize(data[0]) : sanitize(data))
    };
    buf.push(entry);
    if (buf.length > MAX) buf.shift();
    // Pipe to the REAL console (not the overridden one).
    const consoleFn = level === 'error' ? _origConsoleError
                    : level === 'warn'  ? _origConsoleWarn
                    :                      _origConsoleLog;
    try {
      if (Array.isArray(data) && data.length > 1) {
        consoleFn(`[debug ${entry.t}s] ${event}`, ...data);
      } else {
        consoleFn(`[debug ${entry.t}s] ${event}`, data);
      }
    } catch (e) { /* never let a debug log call crash the host app */ }
    // Throttled panel refresh (250ms)
    schedulePanelRefresh();
  };
  let panelRefreshScheduled = false;
  const schedulePanelRefresh = () => {
    if (panelRefreshScheduled) return;
    panelRefreshScheduled = true;
    setTimeout(() => {
      panelRefreshScheduled = false;
      try { __debugRenderPanel(); } catch (e) { /* panel may not be mounted yet */ }
    }, 250);
  };
  if (enabled && typeof window !== 'undefined') {
    console.error = function(...a) {
      try { add('error', 'console.error', a); } catch (e) { /* swallow debug-capture errors */ }
      try { _origConsoleError.apply(console, a); } catch (e) { /* last-ditch swallow */ }
    };
    console.warn = function(...a) {
      try { add('warn', 'console.warn', a); } catch (e) { /* swallow debug-capture errors */ }
      try { _origConsoleWarn.apply(console, a); } catch (e) { /* last-ditch swallow */ }
    };
    window.addEventListener('unhandledrejection', (e) => {
      try { add('error', 'unhandledrejection', e.reason); } catch (err) {}
    });
    window.addEventListener('error', (e) => {
      try { add('error', 'window.error', { message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno }); } catch (err) {}
    });
  }
  return {
    enabled: () => enabled,
    setEnabled(v) {
      enabled = !!v;
      if (enabled) localStorage.setItem('yueDebug', '1');
      else localStorage.removeItem('yueDebug');
      schedulePanelRefresh();
    },
    log: (event, data) => add('log', event, data),
    warn: (event, data) => add('warn', event, data),
    error: (event, data) => add('error', event, data),
    get: () => buf.slice(),
    clear: () => { buf.length = 0; schedulePanelRefresh(); },
    mark: (label) => add('log', `MARK: ${label}`, null)  // for performance.now() alignment
  };
})();

// Render the floating debug panel (bottom-right). Idempotent — call any time
// to re-render with the latest buffer. Hidden if debug mode is off.
function __debugRenderPanel() {
  if (!__debug.enabled()) return;
  let panel = document.getElementById('__debugPanel');
  const entries = __debug.get();
  if (!panel) {
    panel = document.createElement('div');
    panel.id = '__debugPanel';
    panel.style.cssText = 'position:fixed;bottom:10px;right:10px;width:420px;max-height:55vh;background:rgba(10,10,20,0.94);color:#e5e7eb;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;border:2px solid #ef4444;border-radius:8px;z-index:99999;display:flex;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
    document.body.appendChild(panel);
  }
  // Sort newest first
  const sorted = entries.slice().sort((a, b) => b.t - a.t);
  const total = entries.length;
  const errorCount = entries.filter(e => e.level === 'error').length;
  const warnCount = entries.filter(e => e.level === 'warn').length;
  const errorBadge = errorCount > 0 ? `<span style="background:#ef4444;color:#fff;padding:1px 6px;border-radius:10px;font-size:10px;">${errorCount}</span>` : '';
  const warnBadge = warnCount > 0 ? `<span style="background:#f59e0b;color:#fff;padding:1px 6px;border-radius:10px;font-size:10px;margin-left:4px;">${warnCount}</span>` : '';
  const body = panel.querySelector('.__debugBody') || document.createElement('div');
  body.className = '__debugBody';
  body.style.cssText = 'flex:1;overflow-y:auto;padding:6px 10px;';
  if (sorted.length === 0) {
    body.innerHTML = '<div style="color:#9ca3af;padding:8px;">(no events yet — try recording)</div>';
  } else {
    body.innerHTML = sorted.slice(0, 200).map(e => {
      const color = e.level === 'error' ? '#fca5a5' : e.level === 'warn' ? '#fcd34d' : '#86efac';
      const bgTint = e.level === 'error' ? 'rgba(239,68,68,0.08)' : e.level === 'warn' ? 'rgba(245,158,11,0.06)' : 'transparent';
      const dataStr = e.data == null ? '' : JSON.stringify(e.data);
      return `<div style="border-bottom:1px solid rgba(255,255,255,0.06);padding:3px 0;background:${bgTint};">
        <span style="color:#6b7280;">[${e.t}s]</span>
        <span style="color:${color};font-weight:bold;">${e.level.toUpperCase().padEnd(5)}</span>
        <span style="color:#fff;">${_e(e.event)}</span>
        ${dataStr ? `<div style="color:#cbd5e1;padding-left:16px;word-break:break-all;font-size:10px;max-height:60px;overflow:hidden;">${_e(dataStr.substring(0, 400))}${dataStr.length > 400 ? '…' : ''}</div>` : ''}
      </div>`;
    }).join('');
  }
  // Header
  let header = panel.querySelector('.__debugHeader');
  if (!header) {
    header = document.createElement('div');
    header.className = '__debugHeader';
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:linear-gradient(90deg,#7c3aed,#ef4444);color:#fff;cursor:pointer;user-select:none;font-weight:bold;';
    panel.appendChild(header);
    panel.appendChild(body);
  }
  header.innerHTML = `
    <span style="display:flex;align-items:center;gap:6px;">
      🐛 DEBUG ${errorBadge}${warnBadge}
      <span style="font-weight:normal;font-size:10px;opacity:0.8;">(${total})</span>
    </span>
    <span style="display:flex;gap:4px;">
      <button onclick="event.stopPropagation();__debugCopyTrace(this)" style="background:#22c55e;color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;">📋 Copy</button>
      <button onclick="event.stopPropagation();__debugExportLog(this)" style="background:#0ea5e9;color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;">💾 Log</button>
      <button onclick="event.stopPropagation();__debug.clear();__debugRenderPanel()" style="background:#6b7280;color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;">🗑</button>
      <button onclick="event.stopPropagation();document.getElementById('__debugPanel').remove()" style="background:#dc2626;color:#fff;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;">×</button>
    </span>
  `;
  header.onclick = () => { body.style.display = body.style.display === 'none' ? 'block' : 'none'; };
}

function __debugCopyTrace(btn) {
  const entries = __debug.get();
  const text = entries.map(e => `[${e.t}s] ${e.level.toUpperCase().padEnd(5)} ${e.event}` + (e.data != null ? ' ' + JSON.stringify(e.data) : '')).join('\n');
  const done = (ok) => {
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = ok ? '✓ Copied' : '✗ Failed';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => done(true)).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(true); } catch (e) { done(false); }
      document.body.removeChild(ta);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(true); } catch (e) { done(false); }
    document.body.removeChild(ta);
  }
}

function __debugExportLog(btn) {
  const entries = __debug.get();
  const lines = [
    `# yue-debug ${new Date().toISOString()}`,
    `# url: ${location.href}`,
    `# ua: ${navigator.userAgent}`,
    `# asrEngine: ${(typeof _ASR_ENGINES !== 'undefined' && _ASR_ENGINES[state?.asrEngine])?.name || state?.asrEngine || 'unknown'}`,
    ''
  ];
  for (const e of entries) {
    lines.push(`[${e.t}s] ${e.level.toUpperCase().padEnd(5)} ${e.event}` + (e.data != null ? ' ' + JSON.stringify(e.data) : ''));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `yue-debug-${Date.now()}.log`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = '✓ Saved';
    setTimeout(() => { btn.textContent = orig; }, 1200);
  }
}

// ================== ASR ENGINE LAYER ==================
// Each engine implements: { id, name, transcribe(audioBlob?) → Promise<{text, confidence, raw}>, isAvailable() }
// Score is computed uniformly after transcribe (Levenshtein-based) — no per-engine scoring.
const _ASR_ENGINES = {
  webspeech: {
    id: 'webspeech',
    name: 'Web Speech API',
    description: '瀏覽器內建，廣東話支援較弱',
    costEmoji: '🆓',
    privacyEmoji: '🔓',
    isAvailable() { return 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window; },
    transcribe() { return new Promise((resolve, reject) => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const r = new SR();
      r.lang = 'zh-HK';
      r.continuous = false;
      r.interimResults = false;
      r.onresult = (ev) => resolve({
        text: ev.results[0][0].transcript.trim(),
        confidence: ev.results[0][0].confidence || 0.5,
        raw: ev.results[0][0]
      });
      r.onerror = (ev) => reject(new Error('Speech error: ' + ev.error));
      try { r.start(); } catch(e) { reject(e); }
    }); }
  },
  whisper: {
    id: 'whisper',
    name: 'Whisper 本地（離線）',
    description: 'iPad 內建模型，私隱零風險',
    costEmoji: '🆓',
    privacyEmoji: '🔒',
    isAvailable() {
      // Check for WebAssembly + Float32Array (needed by transformers.js)
      return typeof WebAssembly !== 'undefined' && typeof Worker !== 'undefined';
    },
    _pipeline: null,
    _pipelineLoading: null,
    async _ensurePipeline(onProgress) {
      if (this._pipeline) {
        __debug.log('whisper._ensurePipeline.cached', {});
        return this._pipeline;
      }
      if (this._pipelineLoading) {
        __debug.log('whisper._ensurePipeline.inFlight', {});
        return this._pipelineLoading;
      }
      const cdnUrl = window.TRANSFORMERS_CDN;
      const t0 = performance.now();
      __debug.log('whisper._ensurePipeline.start', { cdnUrl, webGPU: !!(typeof navigator !== 'undefined' && navigator.gpu) });
      this._pipelineLoading = (async () => {
        try {
          if (onProgress) onProgress({ stage: 'cdn-load', message: '⏳ 載入 Transformers.js…' });
          // Dynamic import — only loaded when first needed
          __debug.mark('whisper.import.CDN');
          const lib = await import(cdnUrl);
          __debug.log('whisper.import.CDN.done', { ms: +(performance.now() - t0).toFixed(0), hasPipeline: typeof lib.pipeline });
          if (onProgress) onProgress({ stage: 'model-load', message: '⏳ 下載 Whisper 模型（約 40MB，只需一次）…' });
          __debug.mark('whisper.pipeline.create');
          const pipe = await lib.pipeline(
            'automatic-speech-recognition',
            'Xenova/whisper-tiny',
            {
              // q8 量化 — 適合 WASM
              dtype: 'q8',
              // Use WebGPU if available for speed; else fall back to WASM
              device: typeof navigator !== 'undefined' && navigator.gpu ? 'webgpu' : 'wasm'
            }
          );
          __debug.log('whisper.pipeline.create.done', { ms: +(performance.now() - t0).toFixed(0), modelId: 'Xenova/whisper-tiny' });
          this._pipeline = pipe;
          return pipe;
        } catch (e) {
          __debug.error('whisper._ensurePipeline.fail', e);
          // Reset so the next call retries instead of returning the cached rejection
          this._pipelineLoading = null;
          throw e;
        }
      })();
      return this._pipelineLoading;
    },
    async transcribe(audioBlob, onProgress) {
      __debug.log('whisper.transcribe.entry', { blobSize: audioBlob?.size, blobType: audioBlob?.type });
      const t0 = performance.now();
      try {
        const pipe = await this._ensurePipeline(onProgress);
        if (onProgress) onProgress({ stage: 'preprocess', message: '⏳ 處理音訊…' });
        // Convert audioBlob to 16kHz mono Float32Array
        __debug.mark('whisper._blobToFloat32.start');
        const audio = await _blobToFloat32(audioBlob);
        __debug.log('whisper._blobToFloat32.done', { samples: audio.length, durationSec: +(audio.length / 16000).toFixed(2) });
        if (onProgress) onProgress({ stage: 'transcribe', message: '⏳ Whisper 識別中…' });
        // Cantonese: whisper doesn't have 'cantonese' code, but 'zh' works
        // (model is multilingual). Add language hint to bias toward Chinese.
        __debug.mark('whisper.pipe.inference');
        const result = await pipe(audio, {
          language: 'chinese',  // closer to Cantonese than 'zh'
          task: 'transcribe',
          // Chunked for long audio (we send ~4s, so this is safe)
          chunk_length_s: 30,
          stride_length_s: 5
        });
        __debug.log('whisper.pipe.inference.done', { ms: +(performance.now() - t0).toFixed(0) });
        const text = (result && result.text) ? result.text.trim() : '';
        return {
          text,
          confidence: 1,  // transformers.js doesn't expose confidence reliably
          raw: result
        };
      } catch (e) {
        console.error('Whisper transcribe error:', e);
        __debug.error('whisper.transcribe.fail', e);
        // FIX: re-throw with context (do NOT swallow into { text: '' }).
        // Production bug history: the previous swallow made the caller's
        // Promise.race 8s timeout unreliable — Promise.race only fires on
        // the first REJECT, so swallowing turned a hang into a permanent
        // resolve-with-empty-text, which then dropped through to the
        // no-speech fallback (good) but ALSO meant the inner transcribe
        // pipeline kept running for the full import/pipe duration in the
        // background, leaving the user stranded on "⏳ 處理中…" with no
        // navigation in cases where the engine never reached its first
        // onProgress callback. Re-throwing surfaces the failure to the
        // caller so the 8s race can win + the 12s external watchdog (in
        // onstop) can bail out if even the race fails.
        throw new Error(`Whisper: ${e.message}`);
      }
    }
  },
  custom: {
    id: 'custom',
    name: '自訂比對（聲紋 + pattern）',
    description: '純本地，唔上載任何嘢',
    costEmoji: '🆓',
    privacyEmoji: '🔒',
    isAvailable() { return typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined'; },
    transcribe(audioBlob, onProgress) {
      // Self-compare engine: returns empty text, scoring layer uses audio features instead
      return new Promise((resolve) => {
        if (onProgress) onProgress({ stage: 'analyze', message: '分析聲音特徵…' });
        setTimeout(() => {
          resolve({
            text: '',
            confidence: 0,
            raw: { customMode: true, engineId: 'custom', audioBlob }
          });
        }, 600);
      });
    }
  }
};

const _AVATAR_EMOJIS = ['🌟','🐯','🐻','🦁','🐼','🐨','🐸','🐵','🦊','🐰','🐱','🐶','🦄','🐙','🐢','🦋','🌸','🌈','🍎','🍇','⚽','🎨','🎵','🚀'];

// ================== AUDIO PREPROCESSING ==================
// Convert any audio Blob (webm/ogg/wav) → 16kHz mono Float32Array (what Whisper expects)
async function _blobToFloat32(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();
  try {
    // decodeAudioData works for webm/ogg/wav/mp4 in modern browsers
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    // Resample to 16kHz mono
    const targetSampleRate = 16000;
    const numSamples = Math.ceil(decoded.duration * targetSampleRate);
    const offlineCtx = new OfflineAudioContext(1, numSamples, targetSampleRate);
    const source = offlineCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(offlineCtx.destination);
    source.start(0);
    const rendered = await offlineCtx.startRendering();
    return rendered.getChannelData(0);  // Float32Array
  } finally {
    audioCtx.close();
  }
}

function speak(text) {
  if ('speechSynthesis' in window) {

function showConfirm(message, onYes) {
  const modal = document.getElementById('confirmModal');
  const msgEl = document.getElementById('confirmMsg');
  const yesBtn = document.getElementById('confirmYes');
  if (!modal || !msgEl || !yesBtn) {
    // Fallback: native confirm if DOM missing.
    if (window.confirm(message)) onYes && onYes();

  msgEl.textContent = message;

  yesBtn.onclick = () => { closeConfirmModal(); onYes && onYes(); };
