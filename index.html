<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朗讀評分 — 散文・詩詞</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
<!-- Transformers.js for on-device Whisper ASR (lazy loaded) -->
<script type="module">
  // Just expose the CDN URL as a hint. Actual dynamic import happens on first use.
  window.TRANSFORMERS_CDN = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.5';
</script>
<style>
:root { --purple:#7c3aed; --gold:#f59e0b; --green:#22c55e; --red:#ef4444; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Microsoft JhengHei',sans-serif; background:#1a1a2e; color:#fff; font-size:18px; min-height:100vh; }
.page { display:none; min-height:100vh; padding:20px; }
.page.active { display:block; }
.home-card, .hub-card, .vocab-card, .result-card { background:#fff; color:#1a1a2e; border:4px solid #f59e0b; border-radius:24px; padding:24px; margin:20px auto; max-width:700px; }
h1,h2 { font-size:2.2em; color:#f59e0b; text-align:center; margin-bottom:20px; }
input, button { font-size:1.4em; padding:18px 32px; border-radius:16px; border:none; min-height:70px; }
button { background:#7c3aed; color:#fff; cursor:pointer; touch-action:manipulation; }
button:active { transform:scale(0.95); }
.vocab-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; max-width:900px; margin:0 auto; }
.vocab-card { text-align:center; cursor:pointer; transition:transform .2s; }
.vocab-card:hover { transform:scale(1.03); }
.vocab-char { font-size:2.8em; font-weight:bold; color:#7c3aed; }
.vocab-pinyin { color:#666; margin:8px 0; }
.record-btn { background:#22c55e; font-size:1.6em; width:100%; margin-top:16px; }
.score { font-size:2.5em; font-weight:bold; color:#22c55e; }
.hub-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:800px; margin:0 auto; }
.hub-card { background:rgba(255,255,255,0.1); border:3px solid rgba(255,255,255,0.3); color:#fff; text-align:center; cursor:pointer; }
.hub-icon { font-size:3em; margin-bottom:12px; }
.progress { position:fixed; top:0; left:0; width:100%; background:#111; padding:8px; z-index:100; }
.progress-dots { display:flex; justify-content:center; gap:12px; }
.progress-dot { width:28px; height:28px; border-radius:50%; background:#444; display:flex; align-items:center; justify-content:center; font-size:0.9em; }
.progress-dot.done { background:#22c55e; }
.progress-dot.current { background:#f59e0b; animation:pulse 1.5s infinite; }
@keyframes pulse { 50%{transform:scale(1.2);} }
#toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:14px 28px; border-radius:12px; z-index:9999; display:none; pointer-events:none; }
.student-avatar-card {
  background:#fff;
  color:#1a1a2e;
  border:4px solid #f59e0b;
  border-radius:20px;
  padding:20px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform .2s;
  touch-action:manipulation;
  min-height:120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.student-avatar-card:hover { transform:scale(1.05); }
.student-avatar-card:active { transform:scale(0.95); }
.student-emoji { font-size:3em;display:block;margin-bottom:6px; }

/* ===== Responsive: phone portrait / small iPad ===== */
@media (max-width: 600px) {
  body { font-size:16px; }
  .page { padding:12px; padding-top:48px; }  /* leave room for fixed progress bar */
  /* Shrink the home card top margin so PIN keypad fits — kept for reference only (PIN mode removed 2026-06-13) */
  .home-card[style*="margin-top:60px"] { margin-top:20px !important; }
  h1, h2 { font-size:1.6em; }
  .home-card, .hub-card, .vocab-card, .result-card { padding:16px; margin:12px auto; border-width:3px; }
  /* Hub: stack 3 cards vertically on phone */
  .hub-grid { grid-template-columns:1fr; gap:12px; }
  .hub-icon { font-size:2.4em; }
  /* Vocab grid: still auto-fit but allow smaller min so single-column on phone */
  .vocab-grid { grid-template-columns:1fr; gap:12px; }
  /* Teacher summary 4-col → 2-col on phone */
  .page > div[style*="grid-template-columns:repeat(4,1fr)"] { grid-template-columns:repeat(2,1fr) !important; }
  /* Touch target enforcement */
  button, input { min-height:60px; font-size:1.2em; }
  /* Student avatar grid: 2 columns on phone */
  #studentAvatarGrid { grid-template-columns:repeat(2,1fr) !important; gap:12px !important; }
  .student-avatar-card { min-height:100px !important; padding:14px 8px !important; }
}
@media (max-width: 380px) {
  /* Very narrow phone: tighter grid */
  .student-avatar-card { min-height:90px !important; padding:10px 6px !important; }
}
</style>
</head>
<body>
<div class="progress"><div class="progress-dots" id="progressDots"></div></div>

<!-- HOME / LOGIN — student grid (no auth needed for SEN use case) -->
<div id="home" class="page active">
  <div style="text-align:center;max-width:700px;margin:40px auto;padding:0 20px;">
    <h1 style="font-size:2.2em;color:#f59e0b;margin-bottom:8px;">朗讀評分</h1>
    <p style="font-size:1.2em;color:rgba(255,255,255,0.8);margin-bottom:32px;">散文・詩詞朗讀評估</p>

    <!-- Student avatar grid -->
    <p style="font-size:1.1em;color:rgba(255,255,255,0.7);margin-bottom:20px;">撳你嘅相卡嚟開始朗讀</p>
    <div id="studentAvatarGrid" style="display:grid;gap:16px;max-width:560px;margin:0 auto;"><div style="grid-column:1/-1;text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:1.2em;">⏳ 載入中…</div></div>
    <div id="loginError" style="color:#ef4444;font-size:1.1em;min-height:24px;margin-top:16px;"></div>

    <!-- Confirmation modal -->
    <div id="confirmCard" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9000;align-items:center;justify-content:center;">
      <div style="background:#1a1a2e;border:4px solid #f59e0b;border-radius:24px;padding:32px;max-width:340px;width:90%;text-align:center;">
        <div id="confirmCardEmoji" style="font-size:5em;margin-bottom:12px;"></div>
        <div id="confirmCardName" style="font-size:2em;font-weight:bold;color:#f59e0b;margin-bottom:8px;"></div>
        <div style="color:rgba(255,255,255,0.7);font-size:1.1em;margin-bottom:28px;">係你嗎？</div>
        <button id="confirmCardYes" style="width:100%;background:#22c55e;font-size:1.3em;padding:16px;border-radius:16px;min-height:64px;">係，開始 ✅</button>
        <button onclick="App.cancelCardLogin()" style="margin-top:12px;background:#444;color:#fff;font-size:1.1em;padding:12px;border-radius:14px;width:100%;min-height:52px;">唔係，取消</button>
      </div>
    </div>

    <!-- Teacher entry — small, unobtrusive, at bottom -->
    <div style="margin-top:48px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.15);">
      <button onclick="App.enterTeacherMode()" style="background:transparent;color:rgba(255,255,255,0.45);font-size:0.9em;padding:10px 20px;min-height:44px;border:1px solid rgba(255,255,255,0.2);border-radius:10px;">🔧 老師模式</button>
    </div>

    <div id="engineStatusHome" style="margin-top:16px;font-size:0.85em;color:rgba(255,255,255,0.4);"></div>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="page">
  <div style="max-width:800px;margin:40px auto;text-align:center;">
    <div id="hubGreeting" style="font-size:2em;margin-bottom:30px;">👋 你好，準備好未？</div>
    <div class="hub-grid">
      <div class="hub-card" onclick="App.goTo('assessment');App.startAssessment();">
        <div class="hub-icon">📖</div>
        <div style="font-size:1.5em;font-weight:bold;">朗讀</div>
        <div style="opacity:0.8;">揀文章朗讀評分</div>
        <div id="hubAssessment" style="margin-top:12px;"></div>
      </div>
      <div class="hub-card" onclick="App.showMyProgress();">
        <div class="hub-icon">⭐</div>
        <div style="font-size:1.5em;font-weight:bold;">我的進度</div>
        <div style="opacity:0.8;">睇下我讀過咩</div>
      </div>
    </div>

    <!-- 老師設定面板（預設折疊） -->
    <!-- 老師入口（細字，避免學生混淆） -->
    <div style="margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.15);text-align:center;">
      <button onclick="App.enterTeacherMode()" style="background:transparent;color:rgba(255,255,255,0.5);font-size:0.9em;padding:8px 16px;min-height:36px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;">🔧 老師模式</button>
    </div>

    <button onclick="App.goTo('home')" style="margin-top:20px;background:#666;">🏠 返回首頁</button>
    <div id="engineIndicator" style="margin-top:14px;font-size:0.85em;color:rgba(255,255,255,0.5);"></div>
  </div>
</div>

<!-- ASSESSMENT PAGE -->
<div id="assessment" class="page">
  <h2>📖 朗讀評估</h2>
  <div id="assessmentContent" style="max-width:700px;margin:0 auto;"></div>
  <button onclick="App.updateHubStatus();App.goTo('hub')" style="margin:30px auto;display:block;background:#666;">🏠 返回中心</button>
</div>

<!-- MY PROGRESS (student-facing) -->
<div id="myProgress" class="page">
  <div id="myProgressContent" style="max-width:800px;margin:40px auto;padding:0 20px;"></div>
</div>

<!-- TEACHER WORKSPACE (isolated from student flow) -->
<div id="teacher" class="page" style="background:linear-gradient(135deg,#1a1a2e,#2d1b4e);min-height:100vh;">
  <div style="max-width:900px;margin:0 auto;padding:20px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <h1 style="color:#f59e0b;font-size:1.8em;margin:0;">🔧 老師工作台</h1>
      <div style="flex:1;"></div>
      <button onclick="App.exitTeacherMode()" style="background:#666;font-size:1em;padding:10px 20px;min-height:44px;border-radius:10px;">🚪 退出</button>
    </div>
    <!-- Tab nav -->
    <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid rgba(255,255,255,0.2);flex-wrap:wrap;">
      <button id="tchTabDashboardBtn" onclick="App.tchSwitchTab('dashboard')" style="flex:1;min-width:120px;background:#7c3aed;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">📊 Dashboard</button>
      <button id="tchTabStudentsBtn" onclick="App.tchSwitchTab('students')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">👨‍🎓 學生</button>
      <button id="tchTabEditBtn" onclick="App.tchSwitchTab('edit')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">📝 文章</button>
      <button id="tchTabSettingsBtn" onclick="App.tchSwitchTab('settings')" style="flex:1;min-width:120px;background:#444;font-size:1em;padding:12px;border-radius:8px 8px 0 0;min-height:48px;">⚙️ 系統</button>
    </div>
    <div id="tchTabDashboard" class="tch-tab-content"></div>
    <div id="tchTabStudents" class="tch-tab-content" style="display:none;"></div>
    <div id="tchTabEdit" class="tch-tab-content" style="display:none;"></div>
    <div id="tchTabSettings" class="tch-tab-content" style="display:none;"></div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="page">
  <div class="result-card" style="text-align:center;">
    <h2>評分結果</h2>
    <div id="resultWord" style="font-size:2.2em;margin:20px 0;color:#7c3aed;"></div>
    <div class="score" id="resultScore"></div>
    <div id="resultTier" style="font-size:1.1em;margin:6px 0;color:rgba(0,0,0,0.6);"></div>
    <div id="resultFeedback" style="font-size:1.3em;margin:14px 0;font-weight:bold;"></div>

    <!-- 4 sub-scores grid -->
    <div id="resultSubScores" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;"></div>

    <!-- 逐字 diff highlight -->
    <div style="background:#f3e8ff;padding:14px;border-radius:14px;margin:14px 0;text-align:left;">
      <div style="font-weight:bold;margin-bottom:6px;color:#7c3aed;font-size:0.95em;">📝 逐字對齊 <span style="font-weight:normal;font-size:0.85em;color:rgba(0,0,0,0.6);">（綠=啱 紅=錯 灰=漏咗 黃=多咗）</span></div>
      <div id="resultDiff" style="line-height:1.9;font-size:1.15em;font-family:inherit;"></div>
    </div>

    <!-- 流暢度指標 -->
    <div id="resultFluency" style="background:#fef3c7;padding:12px;border-radius:12px;margin:14px 0;text-align:left;font-size:0.95em;"></div>

    <!-- TTS / Replay buttons -->
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button id="resultListenBtn" onclick="App._resultListen()" style="flex:1;background:#0ea5e9;font-size:1.05em;padding:12px;">🔊 聽示範</button>
      <button id="resultReplayBtn" onclick="App._resultReplay()" style="flex:1;background:#7c3aed;font-size:1.05em;padding:12px;">▶ 聽自己</button>
    </div>

    <!-- Word retry section: hidden until scoring produces a wrong-word list -->
    <div id="resultWordRetry" style="display:none;background:#fee2e2;padding:12px;border-radius:12px;margin:14px 0;text-align:left;">
      <div style="font-weight:bold;margin-bottom:8px;color:#dc2626;font-size:0.95em;">🔁 錯字重讀（撳字重試）</div>
      <div id="resultWordRetryList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>

    <div id="resultAI" style="background:#f3e8ff;padding:14px;border-radius:14px;margin:14px 0;text-align:left;font-size:0.9em;"></div>

    <div style="display:flex;gap:8px;margin-top:20px;" id="resultActions">
      <button onclick="App.retryCurrentPassage()" style="flex:1;background:#f59e0b;font-size:1.1em;padding:14px;">🔄 再讀一次</button>
      <button onclick="App.showPassageSelector()" style="flex:1;background:#22c55e;font-size:1.1em;padding:14px;">📖 其他文章 →</button>
    </div>
    <button onclick="App.showCertModal()" style="margin-top:12px;background:#7c3aed;width:100%;font-size:1.1em;padding:14px;">🏆 睇我嘅證書</button>
  </div>
</div>

<!-- WORD REPRACTICE: shows when student taps a single wrong word -->
<div id="wordRepractice" class="page">
  <div class="hub-card" style="text-align:center;max-width:560px;">
    <h2>🎯 單字重讀</h2>
    <div id="wordRepracticeWord" style="font-size:3em;color:#dc2626;margin:20px 0;font-weight:bold;"></div>
    <div id="wordRepracticeContext" style="color:rgba(0,0,0,0.7);margin-bottom:16px;font-size:1em;"></div>
    <div id="wordRepracticeStatus" style="min-height:80px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.05);border-radius:14px;padding:14px;margin:14px 0;"></div>
    <div style="display:flex;gap:8px;">
      <button id="wordRepracticeListen" onclick="App._repracticeListen()" style="flex:1;background:#0ea5e9;font-size:1em;padding:12px;">🔊 聽示範</button>
      <button id="wordRepracticeRec" onclick="App._repracticeRecord()" style="flex:1;background:#ef4444;font-size:1em;padding:12px;">🎤 讀一次</button>
    </div>
    <div id="wordRepracticeResult" style="margin-top:14px;"></div>
    <button onclick="App.goTo('result')" style="margin-top:14px;background:#444;width:100%;font-size:1em;padding:12px;">↩ 返去睇結果</button>
  </div>
</div>

<div id="toast"></div>

<!-- Certificate Modal (view only, no print) -->
<div id="certModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10002;overflow:auto;">
  <div id="certContent" style="max-width:600px;margin:30px auto;padding:20px;"></div>
</div>

<!-- Passage Edit Modal -->
<div id="passageModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;overflow:auto;">
  <div style="background:#1a1a2e;border:3px solid #f59e0b;border-radius:20px;max-width:560px;margin:40px auto;padding:24px;color:#fff;">
    <h3 id="passageModalTitle" style="color:#f59e0b;text-align:center;margin-bottom:20px;">✏️ 新增文章</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <label style="font-size:1.1em;">
        標題 <span style="color:#ef4444;">*</span>
        <input id="pm_title" type="text" maxlength="50" style="width:100%;font-size:1.2em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
      </label>
      <label style="font-size:1.1em;">
        作者
        <input id="pm_author" type="text" maxlength="50" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
      </label>
      <div style="display:flex;gap:12px;">
        <label style="font-size:1.1em;flex:1;">
          類型
          <select id="pm_type" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
            <option value="prose">📖 散文</option>
            <option value="poetry">🪷 詩詞</option>
          </select>
        </label>
        <label style="font-size:1.1em;flex:1;">
          難度（星）
          <select id="pm_difficulty" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
            <option value="1">⭐ 易</option>
            <option value="2">⭐⭐ 中</option>
            <option value="3">⭐⭐⭐ 難</option>
          </select>
        </label>
      </div>
      <label style="font-size:1.1em;">
        文章內容 <span style="color:#ef4444;">*</span>
        <textarea id="pm_text" rows="5" maxlength="500" style="width:100%;font-size:1.1em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;resize:vertical;font-family:inherit;line-height:1.5;"></textarea>
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;">
      <button onclick="App.savePassageFromModal()" style="flex:1;background:#22c55e;font-size:1.1em;padding:14px;">💾 儲存</button>
      <button onclick="App.closePassageModal()" style="flex:1;background:#666;font-size:1.1em;padding:14px;">取消</button>
    </div>
  </div>
</div>
<!-- Student Edit Modal -->
<div id="studentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10000;overflow:auto;">
  <div style="background:#1a1a2e;border:3px solid #f59e0b;border-radius:20px;max-width:480px;margin:40px auto;padding:24px;color:#fff;">
    <h3 id="studentModalTitle" style="color:#f59e0b;text-align:center;margin-bottom:20px;">👨‍🎓 新增學生</h3>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <label style="font-size:1.1em;">
        姓名 <span style="color:#ef4444;">*</span>
        <input id="sm_name" type="text" maxlength="20" style="width:100%;font-size:1.2em;padding:12px;border-radius:10px;border:2px solid #555;background:#222;color:#fff;">
      </label>
      <label style="font-size:1.1em;">
        頭像（揀一個 emoji）
        <div id="sm_emoji_picker" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
          <!-- populated by JS -->
        </div>
      </label>
      <label style="font-size:1.1em;">
        顏色
        <input id="sm_color" type="color" value="#f59e0b" style="width:100%;height:50px;padding:4px;border-radius:10px;border:2px solid #555;background:#222;cursor:pointer;">
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;">
      <button onclick="App.saveStudentFromModal()" style="flex:1;background:#22c55e;font-size:1.1em;padding:14px;">💾 儲存</button>
      <button onclick="App.closeStudentModal()" style="flex:1;background:#666;font-size:1.1em;padding:14px;">取消</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:10001;">
  <div style="background:#1a1a2e;border:3px solid #f59e0b;border-radius:20px;max-width:480px;margin:120px auto;padding:24px;color:#fff;text-align:center;">
    <p id="confirmMsg" style="font-size:1.2em;margin-bottom:20px;"></p>
    <div style="display:flex;gap:12px;">
      <button id="confirmYes" style="flex:1;background:#dc2626;font-size:1.1em;padding:14px;">確認</button>
      <button onclick="App.closeConfirmModal()" style="flex:1;background:#666;font-size:1.1em;padding:14px;">取消</button>
    </div>
  </div>
</div>

<script>
// STATE
let state = {
  mode: 'student',  // 'student' | 'teacher'
  currentStudentId: null,
  currentPassage: null,
  completed: { assessment: false },
  autoTTS: true,
  types: [],
  passages: [],

  // Students + progress (loaded from localStorage at init)
  students: [],
  progress: {},       // { [studentId]: progressObj }
  // ASR engine selection (pluggable)
  asrEngine: 'webspeech',  // 'webspeech' | 'whisper' | 'custom'
  // Recording timeout (seconds). null = unlimited; student taps "完成" when done.
  recordingTimeout: null
};

// ================== SECURITY ==================
// Escape HTML special chars — use this for ALL user content injected into innerHTML.
function _e(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ================== SCORING CONSTANTS ==================
// Single source of truth for tier thresholds + history caps. Reused by
// _tierFromScore, _scoreColor, _recordPassageAttempt, renderDashboard.
const SCORING = Object.freeze({
  TIER_GOLD:   90,
  TIER_SILVER: 75,
  TIER_BRONZE: 60,
  HISTORY_CAP_PER_PASSAGE: 20,   // bp.history.length cap
  HISTORY_CAP_PER_STUDENT: 200,  // p.records.length cap
});

// ================== TIER / COLOR HELPERS ==================
// Convert a numeric score to its UI tier (label, color, emoji).
// Replaces the 2 inline ladders in scorePassage() and showCertModal().
function _tierFromScore(total) {
  if (total >= SCORING.TIER_GOLD)   return { label: '金',   color: '#ffd700', emoji: '🥇' };
  if (total >= SCORING.TIER_SILVER) return { label: '銀',   color: '#c0c0c0', emoji: '🥈' };
  if (total >= SCORING.TIER_BRONZE) return { label: '銅',   color: '#cd7f32', emoji: '🥉' };
  return                                    { label: '參與', color: '#7c3aed', emoji: '🌟' };
}

// Status color for sub-scores, dots, sparklines. Replaces 5+ copy-paste ladders.
function _scoreColor(score) {
  return score >= SCORING.TIER_GOLD   ? '#22c55e'
       : score >= SCORING.TIER_BRONZE ? '#f59e0b'
       :                                '#ef4444';
}

// ================== STORAGE SCHEMA ==================
// localStorage keys: yuePassages / yueTypes / yueAdminSettings / yueStudents
// / yueProgress / yueAsrEngine / yueLastStudentId / yueTeacherPassHash /
// yueSeededDemo_v2 / yueAudioBaselines. Bump _SCHEMA_VERSION when shape changes
// and add a migration entry in _migrateIfNeeded().
const _SCHEMA_VERSION = 2;
const _SCHEMA_VERSION_KEY = 'yueSchemaVersion';

// Defensive sanitize a single student's progress object on load.
// Returns a normalized object that downstream code can trust (no missing fields).
function _sanitizeProgress(p) {
  if (!p || typeof p !== 'object') return { byPassage: {}, records: [], totalAttempts: 0 };
  return {
    byPassage: (p.byPassage && typeof p.byPassage === 'object') ? p.byPassage : {},
    records: Array.isArray(p.records) ? p.records : [],
    totalAttempts: Number(p.totalAttempts) || 0,
    lastSession: p.lastSession || null
  };
}

// Run once on init: bring any persisted data up to the current schema version.
function _migrateIfNeeded() {
  const stored = parseInt(localStorage.getItem(_SCHEMA_VERSION_KEY) || '0', 10);
  if (stored >= _SCHEMA_VERSION) return;
  // v1 → v2: progress entries may be missing byPassage/records/totalAttempts.
  // Sanitize on read instead of bulk-rewriting localStorage.
  try {
    const raw = JSON.parse(localStorage.getItem('yueProgress') || '{}');
    const cleaned = {};
    for (const sid of Object.keys(raw || {})) cleaned[sid] = _sanitizeProgress(raw[sid]);
    state.progress = cleaned;
    _persistProgress();
  } catch (e) {
    console.warn('[migrate] progress sanitize failed', e);
    state.progress = {};
  }
  localStorage.setItem(_SCHEMA_VERSION_KEY, String(_SCHEMA_VERSION));
}

// ================== ASR ENGINE LAYER ==================
// Each engine implements: { id, name, transcribe(audioBlob?) → Promise<{text, confidence, raw}>, isAvailable() }
// Score is computed uniformly after transcribe (Levenshtein-based) — no per-engine scoring.
const _ASR_ENGINES = {
  webspeech: {
    id: 'webspeech',
    name: 'Web Speech API',
    description: '瀏覽器內建，廣東話支援較弱',
    costEmoji: '🆓',
    privacyEmoji: '🔓',
    isAvailable() { return 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window; },
    transcribe() { return new Promise((resolve, reject) => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const r = new SR();
      r.lang = 'zh-HK';
      r.continuous = false;
      r.interimResults = false;
      r.onresult = (ev) => resolve({
        text: ev.results[0][0].transcript.trim(),
        confidence: ev.results[0][0].confidence || 0.5,
        raw: ev.results[0][0]
      });
      r.onerror = (ev) => reject(new Error('Speech error: ' + ev.error));
      try { r.start(); } catch(e) { reject(e); }
    }); }
  },
  whisper: {
    id: 'whisper',
    name: 'Whisper 本地（離線）',
    description: 'iPad 內建模型，私隱零風險',
    costEmoji: '🆓',
    privacyEmoji: '🔒',
    isAvailable() {
      // Check for WebAssembly + Float32Array (needed by transformers.js)
      return typeof WebAssembly !== 'undefined' && typeof Worker !== 'undefined';
    },
    _pipeline: null,
    _pipelineLoading: null,
    async _ensurePipeline(onProgress) {
      if (this._pipeline) return this._pipeline;
      if (this._pipelineLoading) return this._pipelineLoading;
      this._pipelineLoading = (async () => {
        if (onProgress) onProgress({ stage: 'cdn-load', message: '⏳ 載入 Transformers.js…' });
        // Dynamic import — only loaded when first needed
        const lib = await import(window.TRANSFORMERS_CDN);
        if (onProgress) onProgress({ stage: 'model-load', message: '⏳ 下載 Whisper 模型（約 40MB，只需一次）…' });
        const pipe = await lib.pipeline(
          'automatic-speech-recognition',
          'Xenova/whisper-tiny',
          {
            // q8 量化 — 適合 WASM
            dtype: 'q8',
            // Use WebGPU if available for speed; else fall back to WASM
            device: typeof navigator !== 'undefined' && navigator.gpu ? 'webgpu' : 'wasm'
          }
        );
        this._pipeline = pipe;
        return pipe;
      })();
      return this._pipelineLoading;
    },
    async transcribe(audioBlob, onProgress) {
      try {
        const pipe = await this._ensurePipeline(onProgress);
        if (onProgress) onProgress({ stage: 'preprocess', message: '⏳ 處理音訊…' });
        // Convert audioBlob to 16kHz mono Float32Array
        const audio = await _blobToFloat32(audioBlob);
        if (onProgress) onProgress({ stage: 'transcribe', message: '⏳ Whisper 識別中…' });
        // Cantonese: whisper doesn't have 'cantonese' code, but 'zh' works
        // (model is multilingual). Add language hint to bias toward Chinese.
        const result = await pipe(audio, {
          language: 'chinese',  // closer to Cantonese than 'zh'
          task: 'transcribe',
          // Chunked for long audio (we send ~4s, so this is safe)
          chunk_length_s: 30,
          stride_length_s: 5
        });
        const text = (result && result.text) ? result.text.trim() : '';
        return {
          text,
          confidence: 1,  // transformers.js doesn't expose confidence reliably
          raw: result
        };
      } catch (e) {
        console.error('Whisper transcribe error:', e);
        return { text: '', confidence: 0, raw: { error: e.message, engineId: 'whisper' } };
      }
    }
  },
  custom: {
    id: 'custom',
    name: '自訂比對（聲紋 + pattern）',
    description: '純本地，唔上載任何嘢',
    costEmoji: '🆓',
    privacyEmoji: '🔒',
    isAvailable() { return typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined'; },
    transcribe(audioBlob, onProgress) {
      // Self-compare engine: returns empty text, scoring layer uses audio features instead
      return new Promise((resolve) => {
        if (onProgress) onProgress({ stage: 'analyze', message: '分析聲音特徵…' });
        setTimeout(() => {
          resolve({
            text: '',
            confidence: 0,
            raw: { customMode: true, engineId: 'custom', audioBlob }
          });
        }, 600);
      });
    }
  }
};

const _AVATAR_EMOJIS = ['🌟','🐯','🐻','🦁','🐼','🐨','🐸','🐵','🦊','🐰','🐱','🐶','🦄','🐙','🐢','🦋','🌸','🌈','🍎','🍇','⚽','🎨','🎵','🚀'];

// ================== AUDIO PREPROCESSING ==================
// Convert any audio Blob (webm/ogg/wav) → 16kHz mono Float32Array (what Whisper expects)
async function _blobToFloat32(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();
  try {
    // decodeAudioData works for webm/ogg/wav/mp4 in modern browsers
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    // Resample to 16kHz mono
    const targetSampleRate = 16000;
    const numSamples = Math.ceil(decoded.duration * targetSampleRate);
    const offlineCtx = new OfflineAudioContext(1, numSamples, targetSampleRate);
    const source = offlineCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(offlineCtx.destination);
    source.start(0);
    const rendered = await offlineCtx.startRendering();
    return rendered.getChannelData(0);  // Float32Array
  } finally {
    audioCtx.close();
  }
}

function speak(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-HK';
    u.rate = 0.85;
    speechSynthesis.speak(u);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 1800);
}

// Reusable confirm dialog (uses #confirmModal in DOM). Was missing pre-2026-06
// and called from 6 sites (deleteStudent, resetStudentProgress,
// clearAudioBaselines, clearWhisperCache, importStudentsJson); the missing
// definition caused the App namespace to throw and the whole script to abort
// before init() ran, hence "⏳ 載入中…" stuck on first load.
function showConfirm(message, onYes) {
  const modal = document.getElementById('confirmModal');
  const msgEl = document.getElementById('confirmMsg');
  const yesBtn = document.getElementById('confirmYes');
  if (!modal || !msgEl || !yesBtn) {
    // Fallback: native confirm if DOM missing.
    if (window.confirm(message)) onYes && onYes();
    return;
  }
  msgEl.textContent = message;
  // Replace onclick each call (single listener, no leak).
  yesBtn.onclick = () => { closeConfirmModal(); onYes && onYes(); };
  modal.style.display = 'block';
}
function closeConfirmModal() {
  const modal = document.getElementById('confirmModal');
  if (modal) modal.style.display = 'none';
}

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  // Update engine indicator
  const ind = document.getElementById('engineIndicator');
  if (ind && page === 'hub') {
    const e = _ASR_ENGINES[state.asrEngine];
    if (e) {
      let extra = '';
      if (e.id === 'whisper') {
        extra = _ASR_ENGINES.whisper._pipeline ? '（已預載）' : '（首次需下載 ~40MB）';
      }
      ind.textContent = `🎙 評估引擎：${e.name} ${e.privacyEmoji}${extra}`;
    }
  }
}

function updateProgress() {
  const dots = document.getElementById('progressDots');
  const items = [
    {id:'assessment', label:'📖'}
  ];
  dots.innerHTML = items.map(item => {
    const done = state.completed[item.id];
    const cls = done ? 'done' : (item.id === 'assessment' && !done ? 'current' : '');
    return `<div class="progress-dot ${cls}">${item.label}</div>`;
  }).join('');
}

function updateHubStatus() {
  const done = '<span style="background:#22c55e;color:#fff;padding:4px 12px;border-radius:20px;font-size:0.9em;">✅ 完成</span>';
  const locked = '<span style="background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;font-size:0.9em;">🔓 可選</span>';
  document.getElementById('hubAssessment').innerHTML = state.completed.assessment ? done : locked;
  updateProgress();
}

function startAssessment() {
  showPassageSelector();
}

// ================== PASSAGE SELECTOR ==================
function showPassageSelector() {
  const container = document.getElementById('assessmentContent');
  const types = state.types;
  const passages = state.passages;
  if (passages.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#f59e0b;font-size:1.3em;">
      尚未有任何文章<br>請先到老師設定加入文章
      <button onclick="App.enterTeacherMode()" style="margin-top:16px;background:#555;font-size:1em;padding:12px 24px;">🔧 老師設定</button>
      <br><button onclick="App.goTo('hub')" style="margin-top:12px;background:#666;font-size:1em;padding:12px 24px;">返回</button>
    </div>`;
    goTo('assessment');
    return;
  }
  // Group passages by type
  const byType = {};
  passages.forEach(p => {
    if (!byType[p.type]) byType[p.type] = [];
    byType[p.type].push(p);
  });

  let html = `<div style="max-width:700px;margin:0 auto;text-align:center;">
    <h3 style="color:#f59e0b;margin-bottom:8px;">📖 選擇朗讀文章</h3>
    <p style="color:rgba(255,255,255,0.7);font-size:1em;margin-bottom:24px;">點擊文章卡開始朗讀評估</p>`;

  // Type filter buttons
  const allEnabled = types.filter(t => t.enabled);
  if (allEnabled.length > 1) {
    html += `<div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;">`;
    html += `<button onclick="App.filterPassages('all')" id="filterBtn_all" style="background:#7c3aed;font-size:1em;padding:10px 18px;min-height:48px;border-radius:20px;">全部</button>`;
    allEnabled.forEach(t => {
      html += `<button onclick="App.filterPassages('${_e(t.id)}')" id="filterBtn_${_e(t.id)}" style="background:#444;font-size:1em;padding:10px 18px;min-height:48px;border-radius:20px;">${_e(t.icon || '')} ${_e(t.label)}</button>`;
    });
    html += `</div>`;
  }

  // Passage grid
  html += `<div id="passageGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;max-width:700px;margin:0 auto;">`;
  passages.forEach(p => {
    const type = types.find(t => t.id === p.type);
    const stars = '⭐'.repeat(p.difficulty || 1) + '☆'.repeat(3 - (p.difficulty || 1));
    const typeLabel = type ? `${type.icon || ''} ${type.label}` : p.type;
    const typeColor = p.type === 'poetry' ? '#7c3aed' : '#22c55e';
    const pShort = p.text.length > 40 ? p.text.slice(0, 40) + '…' : p.text;
    html += `
      <div class="vocab-card" data-passage-id="${_e(p.id)}" style="cursor:pointer;border-color:${typeColor};">
        <div style="background:${typeColor};color:#fff;font-size:0.85em;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:8px;">${typeLabel}</div>
        <div style="font-size:1.8em;font-weight:bold;color:#7c3aed;margin:8px 0;">${_e(p.title)}</div>
        <div style="color:#666;font-size:1em;margin-bottom:6px;">${_e(p.author || '')}</div>
        <div style="color:#f59e0b;font-size:1.1em;margin-bottom:8px;">${stars}</div>
        <div style="color:#555;font-size:0.95em;background:#f9f9f9;padding:10px;border-radius:10px;line-height:1.4;">${_e(pShort)}</div>
        <div style="color:#999;font-size:0.85em;margin-top:6px;">⏱ 錄音無時限，自行控制</div>
      </div>`;
  });
  html += `</div>`;

  html += `<button onclick="App.goTo('hub')" style="margin-top:24px;background:#666;width:80%;">🏠 返回中心</button>`;
  html += `</div>`;

  container.innerHTML = html;

  // Event delegation for passage cards
  container.querySelectorAll('.vocab-card[data-passage-id]').forEach(card => {
    card.addEventListener('click', () => {
      const pid = card.dataset.passageId;
      const passage = state.passages.find(p => p.id === pid);
      if (passage) startPassageReading(passage);
    });
  });

  goTo('assessment');
}

let _currentFilter = 'all';
function filterPassages(typeId) {
  _currentFilter = typeId;
  // Update button styles
  document.querySelectorAll('[id^="filterBtn_"]').forEach(btn => {
    const bid = btn.id.replace('filterBtn_', '');
    btn.style.background = (bid === typeId) ? '#7c3aed' : '#444';
  });
  // Show/hide cards
  document.querySelectorAll('#passageGrid .vocab-card').forEach(card => {
    if (typeId === 'all') {
      card.style.display = '';
    } else {
      const p = state.passages.find(pp => pp.id === card.dataset.passageId);
      card.style.display = (p && p.type === typeId) ? '' : 'none';
    }
  });
}

function startPassageReading(passage) {
  state.currentPassage = passage;
  const container = document.getElementById('assessmentContent');
  const type = state.types.find(t => t.id === passage.type);
  const typeLabel = type ? `${type.icon || ''} ${type.label}` : passage.type;
  const typeColor = passage.type === 'poetry' ? '#7c3aed' : '#22c55e';
  const stars = '⭐'.repeat(passage.difficulty || 1) + '☆'.repeat(3 - (passage.difficulty || 1));

  container.innerHTML = `
    <div style="max-width:700px;margin:0 auto;text-align:center;">
      <div style="background:${typeColor};color:#fff;font-size:0.9em;padding:6px 16px;border-radius:20px;display:inline-block;margin-bottom:12px;">${typeLabel}</div>
      <h2 style="color:#f59e0b;font-size:2em;margin-bottom:4px;">${_e(passage.title)}</h2>
      <div style="color:#666;font-size:1.1em;margin-bottom:8px;">${_e(passage.author || '')} ${stars}</div>

      <!-- Passage display -->
      <div style="background:#fff;color:#1a1a2e;border:4px solid ${typeColor};border-radius:20px;padding:24px;margin:20px 0;text-align:left;max-height:300px;overflow-y:auto;line-height:2;font-size:1.5em;">
        ${_e(passage.text).split('').map(c => c === '，' || c === '。' || c === '！' || c === '？' || c === '、' ? `<span style="color:#999;">${c}</span>` : c).join('')}
      </div>

      <!-- TTS demo -->
      <button id="speakPassageBtn" style="background:#0ea5e9;width:100%;margin-bottom:12px;">
        🔊 示範朗讀
      </button>

      <!-- Recording area -->
      <div id="recordingArea" style="margin:16px 0;">
        <button id="startRecBtn" style="background:#ef4444;width:100%;font-size:1.8em;padding:24px;border-radius:20px;min-height:100px;" onclick="App.startRecording()">
          🎤 開始朗讀
        </button>
        <div id="recordingStatus" style="text-align:center;margin-top:16px;font-size:1.2em;color:#f59e0b;min-height:60px;"></div>
      </div>

      <button onclick="App.showPassageSelector()" style="margin-top:16px;background:#666;width:100%;">← 選擇其他文章</button>
    </div>
  `;

  // TTS button
  document.getElementById('speakPassageBtn').addEventListener('click', () => {
    speak(passage.text);
  });

  goTo('assessment');
}

let recognition;
let _currentRecorder = null;
let _currentAudioBlob = null;

// "Stop recording" trigger from the in-recording UI button.
// Works for both Web Speech (recognition.stop()) and MediaRecorder (recorder.stop()).
function _stopRecordingFromUI() {
  try {
    if (typeof recognition !== 'undefined' && recognition) {
      try { recognition.stop(); } catch(e) {}
    }
    if (_currentRecorder && _currentRecorder.state === 'recording') {
      _currentRecorder.stop();
    }
  } catch(e) { console.warn('stop from UI failed', e); }
}

function startRecording() {
  const status = document.getElementById('recordingStatus');
  const engine = _ASR_ENGINES[state.asrEngine] || _ASR_ENGINES.webspeech;
  const passage = state.currentPassage;
  // No auto-stop: student finishes when ready, then taps "完成" button.
  state.recordingTimeout = null;

  if (!engine.isAvailable()) {
    status.innerHTML = '❌ 此裝置唔支援 ' + engine.name;
    return;
  }

  status.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin:8px 0;">
      <div style="font-size:1.4em;color:#ef4444;font-weight:bold;">🔴 錄音中</div>
      <div style="font-size:1em;color:rgba(255,255,255,0.7);">大聲朗讀文章，準備好就撳「完成」 👄</div>
      <button onclick="App._stopRecordingFromUI()" style="background:#22c55e;font-size:1.2em;padding:14px 32px;min-height:56px;border-radius:14px;color:#fff;min-width:160px;">⏹ 完成</button>
    </div>`;

  // For non-WebSpeech engines, we use MediaRecorder to capture audio blob
  if (engine.id === 'webspeech') {
    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
      status.innerHTML = '❌ 請用 Chrome（Safari 支援有限）';
      return;
    }
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRec();
    recognition.lang = 'zh-HK';
    recognition.continuous = false;
    recognition.interimResults = false;

    try { recognition.start(); } catch (e) {
      console.error(e);
      status.innerHTML = '❌ 無法啟動錄音，請檢查權限';
      return;
    }

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript.trim();
      status.innerHTML = `你讀咗：${_e(transcript)}`;
      scorePassage(transcript);
    };
    recognition.onerror = (event) => {
      console.error('Speech error:', event.error);
      let msg = '❌ 錄音出錯';
      if (event.error === 'not-allowed') msg = '❌ 請允許麥克風權限';
      else if (event.error === 'network') msg = '❌ 需要網絡連接';
      else if (event.error === 'no-speech') msg = '❌ 冇聽到聲音，請大聲啲';
      else if (event.error === 'audio-capture') msg = '❌ 麥克風問題，請檢查';
      else if (event.error === 'service-not-allowed') msg = '❌ 瀏覽器不支援，請用 Chrome';
      else if (event.error === 'aborted') msg = '❌ 已取消，請再試';
      else msg = '❌ 請大聲啲或換個安靜地方';
      status.innerHTML = msg + '，請再試';
    };
    recognition.onend = () => {
      if (status.innerHTML.includes('錄音中')) status.innerHTML = '錄音結束';
    };
  } else {
    // Whisper / Custom: use MediaRecorder to capture audio blob
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      status.innerHTML = '❌ 此瀏覽器不支援錄音';
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      _currentRecorder = new MediaRecorder(stream);
      const chunks = [];
      _currentRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      _currentRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: 'audio/webm' });
        _currentAudioBlob = blob;
        _currentRecorder = null;
        try {
          const result = await engine.transcribe(blob, (progress) => {
            status.innerHTML = '⏳ ' + (progress.message || '處理中…');
          });
          // If engine returned text, score it. If empty (mock/whisper not implemented), fall back.
if (result.text) {
            status.innerHTML = `你讀咗：${_e(result.text)}`;
            scorePassage(result.text, { engine: engine.id, audioBlob: blob, raw: result.raw });
          } else {
            // Engine returned no text (e.g. whisper not yet implemented, or custom mode)
            if (engine.id === 'custom') {
              status.innerHTML = '🎤 自訂模式：分析聲音特徵中…';
              const customScore = await _customScoreAudio(blob, state.currentPassage);
              scorePassage('', { engine: 'custom', customScore, audioBlob: blob });
            } else {
              status.innerHTML = `⚠️ ${engine.name} 未能識別。請用 Web Speech 或輸入你讀嘅文字：`;
              _promptManualPassageInput(status, state.currentPassage);
            }
          }
        } catch (e) {
          console.error(e);
          status.innerHTML = '❌ 引擎錯誤：' + e.message;
        }
      };
      _currentRecorder.start();
      // No auto-stop: student finishes when ready and taps "完成".
    }).catch(err => {
      status.innerHTML = '❌ 麥克風權限被拒：' + err.message;
    });
  }
}

function _promptManualPassageInput(status, passage) {
  // Fallback: ask student what they read (text input)
  const txt = prompt(`你讀嘅文章：${passage.title}\n\n輸入你讀咗嘅文字（粵語/普通話皆可）：`);
  if (txt === null) {
    status.innerHTML = '已取消';
    return;
  }
  status.innerHTML = `你讀咗：${_e(txt)}`;
  scorePassage(txt, { engine: 'manual' });
}

async function _customScoreAudio(audioBlob, passage) {
  try {
    const arrayBuffer = await audioBlob.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    audioCtx.close();

    const channel = decoded.getChannelData(0);
    const duration = decoded.duration;
    let sumSq = 0, peak = 0, zcr = 0;
    for (let i = 0; i < channel.length; i++) {
      const v = channel[i];
      sumSq += v * v;
      if (Math.abs(v) > peak) peak = Math.abs(v);
      if (i > 0 && Math.sign(channel[i-1]) !== Math.sign(v)) zcr++;
    }
    const rms = Math.sqrt(sumSq / channel.length);
    // Recording is unlimited — duration match is gentle (only penalises very short or runaway-long takes).
    const expected = 15;
    const durationMatch = duration > 2 ? Math.max(0, 1 - Math.abs(duration - expected) / Math.max(duration, expected)) : 0;
    const energyMatch = rms > 0.01 ? 0.8 : 0.4;
    const score = Math.round(Math.min(100, Math.max(0, energyMatch * 50 + durationMatch * 40 + (peak > 0.05 ? 10 : 0))));
    return { score, duration, rms, peak, durationMatch, energyMatch };
  } catch (e) {
    console.warn('custom scoring failed', e);
    return { score: 60, error: e.message };
  }
}

function _getAudioBaseline(word) {
  try {
    const all = JSON.parse(localStorage.getItem('yueAudioBaselines') || '{}');
    return all[word] || {};
  } catch(e) { return {}; }
}

function _updateAudioBaseline(word, features) {
  try {
    const all = JSON.parse(localStorage.getItem('yueAudioBaselines') || '{}');
    const existing = all[word];
    if (existing) {
      // EMA blend with new measurement
      existing.duration = existing.duration * 0.7 + features.duration * 0.3;
      existing.rms = existing.rms * 0.7 + features.rms * 0.3;
      existing.peak = existing.peak * 0.7 + features.peak * 0.3;
      existing.samples = (existing.samples || 0) + 1;
    } else {
      all[word] = { ...features, samples: 1 };
    }
    localStorage.setItem('yueAudioBaselines', JSON.stringify(all));
  } catch(e) {}
}

// ================== PASSAGE-LEVEL SCORING ==================
// Strip punctuation/whitespace for text comparison.
function _normText(s) {
  return (s || '').replace(/[，。！？、；：""''「」（）《》\.\,\!\?\;\:\s\n\r\(\)\[\]"'`]/g, '');
}

// Word-segment a Chinese string into individual characters (loose tokenization).
// Treats each Chinese char as a "word"; Latin tokens kept as-is.
function _tokenize(s) {
  const out = [];
  const re = /[\u4e00-\u9fff]|[A-Za-z0-9]+/g;
  let m;
  while ((m = re.exec(s)) !== null) out.push(m[0]);
  return out;
}

// Build a Levenshtein DP table and return alignment as two parallel arrays
// of {op: 'match'|'sub'|'del'|'ins', a, b} for traceback.
// Used to produce char-level diff highlight + accuracy sub-score.
function _alignTokens(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
  for (let i = 0; i <= n; i++) dp[0][i] = i;
  for (let j = 0; j <= m; j++) dp[j][0] = j;
  for (let j = 1; j <= m; j++) {
    for (let i = 1; i <= n; i++) {
      if (a[i - 1] === b[j - 1]) {
        dp[j][i] = dp[j - 1][i - 1];
      } else {
        dp[j][i] = 1 + Math.min(dp[j - 1][i - 1], dp[j][i - 1], dp[j - 1][i]);
      }
    }
  }
  // Traceback. Convention: a = target, b = user.
  //   del  = target has a token the user didn't say (skip in target)   → dp[j][i-1] predecessor
  //   ins  = user said a token the target doesn't have (extra in user) → dp[j-1][i] predecessor
  //   sub  = token differs                                            → dp[j-1][i-1] predecessor
  // Prefer del over sub on ties so the "single word retry" list shows what was *missed*,
  // not what was *substituted* (substitution often = dialect/cantonese variation that
  // doesn't need remediation).
  const ops = [];
  let i = n, j = m;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i - 1] === b[j - 1] && dp[j][i] === dp[j - 1][i - 1]) {
      ops.push({ op: 'match', a: a[i - 1], b: b[j - 1] });
      i--; j--;
    } else if (i > 0 && j > 0 &&
               (dp[j][i] === dp[j][i - 1] + 1) &&
               (dp[j][i] < dp[j - 1][i - 1] + 1)) {
      // del: target skipped, user didn't say this token.
      ops.push({ op: 'del', a: a[i - 1], b: null });
      i--;
    } else if (i > 0 && j > 0 && dp[j][i] === dp[j - 1][i - 1] + 1) {
      ops.push({ op: 'sub', a: a[i - 1], b: b[j - 1] });
      i--; j--;
    } else if (i > 0 && dp[j][i] === dp[j][i - 1] + 1) {
      // del tied with sub: prefer del for pedagogical reasons
      ops.push({ op: 'del', a: a[i - 1], b: null });
      i--;
    } else if (j > 0) {
      ops.push({ op: 'ins', a: null, b: b[j - 1] });
      j--;
    } else {
      break;
    }
  }
  ops.reverse();
  return { ops, dp, distance: dp[m][n] };
}

// Accuracy: alignment-based. match / max(target, user) * 100, with sub treated as half-credit.
function _accuracyScore(ops, targetLen, userLen) {
  if (targetLen === 0) return userLen === 0 ? 100 : 0;
  let correct = 0, near = 0;
  for (const o of ops) {
    if (o.op === 'match') correct++;
    else if (o.op === 'sub') near++;
  }
  const denom = Math.max(targetLen, userLen, 1);
  return Math.round(((correct + near * 0.5) / denom) * 100);
}

// Coverage: of target tokens, how many were matched (or substituted, since
// student at least attempted a token at that position).
function _coverageScore(ops, targetLen) {
  if (targetLen === 0) return 100;
  let hit = 0;
  for (const o of ops) {
    if (o.op === 'match' || o.op === 'sub') hit++;
  }
  return Math.round((hit / targetLen) * 100);
}

// Fluency: speech rate (chars/sec) within an ideal band + low long-pause penalty.
// pace = audio_duration_sec; chars = transcript length; longPauses = count of >1s silent gaps
function _fluencyScore(charCount, audioDuration, longPauses) {
  if (!audioDuration || audioDuration < 0.5) return 0;  // no audio = no score
  const cps = charCount / audioDuration;  // chars per second
  // Ideal band: 1.5 - 4 chars/sec for SEN reading. Outside penalised.
  let paceScore;
  if (cps >= 1.5 && cps <= 4) paceScore = 100;
  else if (cps < 1.5) paceScore = Math.max(0, 100 - (1.5 - cps) * 60);
  else paceScore = Math.max(0, 100 - (cps - 4) * 15);
  // Penalise long pauses: each >1s silent gap costs 5 pts, cap at -30
  const pausePenalty = Math.min(30, (longPauses || 0) * 5);
  return Math.round(Math.max(0, Math.min(100, paceScore - pausePenalty)));
}

// Expression: from pause distribution only (real prosody needs more audio features).
// Even cadence of short pauses (~punctuation) scores higher than clustered or absent pauses.
function _expressionScore(longPauses, charCount, audioDuration) {
  if (!audioDuration || charCount === 0) return 50;
  const cps = charCount / audioDuration;
  // Ideal: ~1 pause per 8 chars (matches natural Chinese punctuation cadence)
  const idealPauses = charCount / 8;
  const pauseRatio = (longPauses || 0) / idealPauses;
  let score;
  if (pauseRatio >= 0.7 && pauseRatio <= 1.3) score = 90;
  else if (pauseRatio < 0.7) score = 60 + pauseRatio * 30;  // too few pauses
  else score = 90 - (pauseRatio - 1.3) * 20;                // too many
  return Math.round(Math.max(0, Math.min(100, score)));
}

// Decode an audio blob and compute fluency-relevant features:
// returns {duration, charCount, longPauses, rms} (rms for diagnostics).
async function _analyzeAudioFeatures(blob, charCount) {
  const features = { duration: 0, longPauses: 0, rms: 0, valid: false };
  if (!blob || !blob.size) return features;
  try {
    const buf = await blob.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return features;
    const ctx = new AudioCtx();
    const decoded = await ctx.decodeAudioData(buf.slice(0));
    ctx.close();
    features.duration = decoded.duration;
    // Scan channel for silent gaps > 1s
    const ch = decoded.getChannelData(0);
    const sampleRate = decoded.sampleRate;
    const winSize = Math.floor(sampleRate * 0.05);  // 50ms windows
    const threshold = 0.01;
    const minPauseSamples = sampleRate * 1.0;  // 1s
    let silentRun = 0, totalSilent = 0;
    for (let i = 0; i < ch.length; i += winSize) {
      let sumSq = 0, n = 0;
      for (let k = 0; k < winSize && i + k < ch.length; k++) { sumSq += ch[i + k] * ch[i + k]; n++; }
      const rms = Math.sqrt(sumSq / n);
      if (rms < threshold) {
        silentRun += n;
      } else {
        if (silentRun >= minPauseSamples) totalSilent++;
        silentRun = 0;
      }
    }
    if (silentRun >= minPauseSamples) totalSilent++;
    features.longPauses = totalSilent;
    // overall RMS for diagnostics
    let ss = 0;
    for (let i = 0; i < ch.length; i++) ss += ch[i] * ch[i];
    features.rms = Math.sqrt(ss / ch.length);
    features.valid = true;
    return features;
  } catch (e) {
    console.warn('audio analysis failed', e);
    return features;
  }
}

// 4-dimension reading scoring. Used by scorePassage() and single-word repractice.
//  Returns {total, sub:{accuracy,coverage,fluency,expression}, alignment, tier, feedback, errorWords, fluencyMeta}
function _computePassageScore(target, transcript, audioFeatures) {
  const tClean = _normText(target);
  const uClean = _normText(transcript);
  const targetTokens = _tokenize(tClean);
  const userTokens = _tokenize(uClean);
  const align = _alignTokens(targetTokens, userTokens);

  const accuracy = _accuracyScore(align.ops, targetTokens.length, userTokens.length);
  const coverage = _coverageScore(align.ops, targetTokens.length);

  // Fluency + expression need audio; fall back to neutral if no audio
  const charCount = userTokens.length;
  const dur = audioFeatures && audioFeatures.valid ? audioFeatures.duration : 0;
  const longPauses = audioFeatures && audioFeatures.valid ? audioFeatures.longPauses : 0;
  const fluency = _fluencyScore(charCount, dur, longPauses);
  const expression = _expressionScore(longPauses, charCount, dur);

  // Weighted total: accuracy 35% / coverage 30% / fluency 20% / expression 15%
  // If no audio features, redistribute weight: accuracy 50% / coverage 50%
  let total, sub;
  if (dur > 0) {
    sub = { accuracy, coverage, fluency, expression };
    total = Math.round(accuracy * 0.35 + coverage * 0.30 + fluency * 0.20 + expression * 0.15);
  } else {
    sub = { accuracy, coverage, fluency: 0, expression: 0 };
    total = Math.round(accuracy * 0.50 + coverage * 0.50);
  }

  // Build word-level error list (sub + del targets) for the "single word retry" buttons
  const errorWords = [];
  for (const o of align.ops) {
    if (o.op === 'sub') errorWords.push({ kind: 'sub', expected: o.b, actual: o.a });
    else if (o.op === 'del') errorWords.push({ kind: 'miss', expected: o.a, actual: null });
  }
  // wrongChars = set of target chars that the student got wrong or missed.
  // Used to render the "single word retry" buttons.
  const wrongChars = [...new Set(errorWords.map(w => w.expected))];

  return {
    total, sub, align, errorWords, wrongChars,
    fluencyMeta: { charCount, duration: dur, longPauses, cps: dur ? +(charCount / dur).toFixed(2) : 0 }
  };
}

function scorePassage(transcript, opts) {
  opts = opts || {};
  const p = state.currentPassage;
  const target = p.text || '';
  const isCustom = (opts.engine === 'custom' && opts.customScore);

  // Async: get audio features (may be null for manual text input)
  _analyzeAudioFeatures(opts.audioBlob, (transcript || '').length).then(features => {
    let scoreResult, feedback, scoringMethod, audioNote = '';

    if (isCustom) {
      // Custom engine: respect its score, but still produce sub-scores for diagnostics
      const custom = opts.customScore;
      scoreResult = _computePassageScore(target, transcript, features);
      // Override total with custom score, but keep sub-scores as informational
      scoreResult.total = custom.score;
      feedback = custom.score >= 85 ? '做得好！' : custom.score >= 60 ? '唔錯！繼續努力～' : '再嚟多次！';
      scoringMethod = 'custom-audio';
    } else {
      scoreResult = _computePassageScore(target, transcript, features);
      const t = scoreResult.total;
      feedback = t >= 85 ? '做得好！朗讀好流暢！' : t >= 60 ? '唔錯！繼續努力～' : '再試一次，你可以嘅！';
      scoringMethod = 'passage-4dim';
    }

    if (!features.valid && !isCustom) {
      audioNote = '（冇錄音數據，流暢度同感情用預設值）';
    }

    _recordPassageAttempt(p.id, p.title, scoreResult.total, transcript);

    goTo('result');
    const tier = _tierFromScore(scoreResult.total);

    document.getElementById('resultWord').textContent = p.title;
    document.getElementById('resultScore').textContent = scoreResult.total + '/100';
    document.getElementById('resultScore').style.color = tier.color;
    document.getElementById('resultTier').textContent = `${tier.emoji} ${tier.label}獎${audioNote}`;
    document.getElementById('resultFeedback').textContent = feedback;

    _renderSubScores(scoreResult.sub);
    _renderDiffHighlight(target, scoreResult.align, transcript);
    _renderFluencyPanel(scoreResult.fluencyMeta, features);
    _renderWordRetryList(scoreResult.wrongChars, p);

    document.getElementById('resultAI').innerHTML = `
      <div style="margin-bottom:6px;"><b>你讀：</b>${_e(transcript || '（自訂模式）')}</div>
      <div style="margin-bottom:6px;"><b>文章：</b>${_e(target)}</div>
      <div style="font-size:0.85em;color:#7c3aed;">引擎：${_e(opts.engine || state.asrEngine)}｜方法：${_e(scoringMethod)}</div>`;

    if (scoreResult.total >= SCORING.TIER_GOLD) showConfetti(15);
  });
}

function _renderSubScores(sub) {
  const el = document.getElementById('resultSubScores');
  if (!el) return;
  const items = [
    { key: 'accuracy', label: '發音準確', icon: '🎯', color: '#22c55e' },
    { key: 'coverage', label: '覆蓋完整', icon: '📖', color: '#0ea5e9' },
    { key: 'fluency',  label: '流暢自然', icon: '💨', color: '#f59e0b' },
    { key: 'expression', label: '朗讀感情', icon: '🎵', color: '#7c3aed' }
  ];
  el.innerHTML = items.map(it => {
    const v = sub[it.key] || 0;
    const pct = Math.max(0, Math.min(100, v));
    const barColor = _scoreColor(pct);
    return `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 8px;text-align:left;">
      <div style="font-size:0.85em;color:#6b7280;display:flex;justify-content:space-between;align-items:center;">
        <span>${it.icon} ${it.label}</span>
        <b style="color:${barColor};">${v}</b>
      </div>
      <div style="background:#e5e7eb;height:6px;border-radius:3px;overflow:hidden;margin-top:4px;">
        <div style="width:${pct}%;height:100%;background:${barColor};"></div>
      </div>
    </div>`;
  }).join('');
}

function _renderDiffHighlight(target, align, transcript) {
  const el = document.getElementById('resultDiff');
  if (!el) return;
  // Render alignment as colored spans, with target punctuation preserved.
  // Walk through target char-by-char; for each char, find the alignment op covering it.
  const tokens = _tokenize(target);  // includes Chinese chars only
  const targetTokenIndex = [];  // map raw-target-char-index → token-index (or -1 for punct)
  let ti = 0;
  for (let i = 0; i < target.length; i++) {
    if (_tokenize(target[i]).length > 0) { targetTokenIndex.push(ti); ti++; }
    else targetTokenIndex.push(-1);
  }
  // Walk ops: build a map tokenIndex → op
  const opByToken = {};
  let opIdx = 0;
  for (const o of align.ops) {
    // Each op consumes 1 target token (or 0 for ins)
    if (o.op !== 'ins') {
      // opIdx is the position in targetTokens sequence; the Nth op that isn't ins corresponds to the Nth targetToken
      const tIdx = Object.keys(opByToken).length === 0
        ? 0
        : 0;  // we'll re-derive by walking ops in order
    }
  }
  // Simpler: rebuild mapping by walking ops in order and targetTokens in parallel
  opByToken.length = 0;
  const tTokenMap = {};  // token-index → op
  let tokenCounter = 0;
  for (const o of align.ops) {
    if (o.op === 'ins') continue;  // ins is purely on user side, not in target
    tTokenMap[tokenCounter] = o;
    tokenCounter++;
  }

  // Now render target char-by-char
  let html = '';
  let renderedTokens = 0;
  for (let i = 0; i < target.length; i++) {
    const ch = target[i];
    const tokenIdx = targetTokenIndex[i];
    if (tokenIdx < 0) {
      // punctuation / whitespace — render plain
      html += _e(ch);
    } else {
      const op = tTokenMap[tokenIdx];
      if (!op) { html += _e(ch); continue; }
      if (op.op === 'match') {
        html += `<span style="color:#16a34a;background:#dcfce7;padding:1px 3px;border-radius:4px;margin:0 1px;">${_e(ch)}</span>`;
      } else if (op.op === 'sub') {
        html += `<span style="color:#dc2626;background:#fee2e2;padding:1px 3px;border-radius:4px;margin:0 1px;text-decoration:line-through;" title="你讀咗「${_e(op.a)}」">${_e(ch)}</span>`;
      } else if (op.op === 'del') {
        html += `<span style="color:#6b7280;background:#f3f4f6;padding:1px 3px;border-radius:4px;margin:0 1px;border-bottom:2px dotted #9ca3af;" title="漏咗讀">${_e(ch)}</span>`;
      } else {
        html += _e(ch);
      }
      renderedTokens++;
    }
  }
  // Append inserted tokens (extra words the student said that aren't in the passage)
  const extras = align.ops.filter(o => o.op === 'ins');
  if (extras.length) {
    html += `<div style="margin-top:8px;font-size:0.85em;color:#92400e;">多咗讀：`;
    for (const o of extras) {
      html += `<span style="background:#fef3c7;padding:1px 4px;border-radius:4px;margin:0 2px;">${_e(o.b)}</span>`;
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

function _renderFluencyPanel(meta, features) {
  const el = document.getElementById('resultFluency');
  if (!el) return;
  if (!features || !features.valid) {
    el.innerHTML = `<div style="color:rgba(0,0,0,0.5);">⏱ 冇錄音數據 — 流暢度同感情需要實際錄音先評到</div>`;
    return;
  }
  const cps = meta.cps || 0;
  const cpsLabel = cps >= 1.5 && cps <= 4 ? '啱啱好' : cps < 1.5 ? '太慢' : '太快';
  const cpsColor = cps >= 1.5 && cps <= 4 ? '#16a34a' : cps < 1.5 ? '#0ea5e9' : '#dc2626';
  const pauseLabel = meta.longPauses === 0 ? '冇長停頓' : `有 ${meta.longPauses} 個長停頓（≥1秒）`;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">錄音長度</div><div style="font-weight:bold;font-size:1.1em;">${meta.duration.toFixed(1)} 秒</div></div>
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">朗讀速度</div><div style="font-weight:bold;font-size:1.1em;color:${cpsColor};">${cps} 字/秒 <span style="font-size:0.8em;">(${cpsLabel})</span></div></div>
      <div><div style="font-size:0.8em;color:rgba(0,0,0,0.5);">停頓</div><div style="font-weight:bold;font-size:1.1em;">${pauseLabel}</div></div>
    </div>`;
}

function _renderWordRetryList(wrongChars, passage) {
  const wrap = document.getElementById('resultWordRetry');
  const list = document.getElementById('resultWordRetryList');
  if (!wrap || !list) return;
  if (!wrongChars || !wrongChars.length) {
    wrap.style.display = 'none';
    return;
  }
  // De-dup and cap at first 12
  const uniq = [...new Set(wrongChars)].slice(0, 12);
  list.innerHTML = uniq.map(ch =>
    `<button onclick="App._startWordRepractice('${_e(ch)}')" style="background:#fff;color:#dc2626;border:2px solid #dc2626;font-size:1.1em;padding:8px 14px;min-height:48px;border-radius:10px;font-weight:bold;">${_e(ch)}</button>`
  ).join('');

let _repracticeWord = null;

function _startWordRepractice(word) {
  if (!word || !state.currentPassage) return;
  _repracticeWord = word;
  const p = state.currentPassage;
  // Find a 6-char context window around this word in the passage
  const idx = p.text.indexOf(word);
  let ctx = '';
  if (idx >= 0) {
    const start = Math.max(0, idx - 4);
    const end = Math.min(p.text.length, idx + word.length + 4);
    ctx = (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '');
  }
  _repracticeContext = ctx;
  document.getElementById('wordRepracticeWord').textContent = word;
  document.getElementById('wordRepracticeContext').textContent = ctx;
  document.getElementById('wordRepracticeStatus').innerHTML = '準備好就撳「🎤 讀一次」';
  document.getElementById('wordRepracticeResult').innerHTML = '';
  goTo('wordRepractice');
  // TTS the word once on entry for ear reference
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'zh-HK';
    u.rate = 0.7;
    speechSynthesis.speak(u);
  }
}

function _repracticeListen() {
  if (!('speechSynthesis' in window) || !_repracticeWord) return;

function _repracticeRecord() {
  if (!_repracticeWord) return;
  const status = document.getElementById('wordRepracticeStatus');
  const recBtn = document.getElementById('wordRepracticeRec');
  recBtn.disabled = true;
  recBtn.textContent = '⏺ 錄音中…';
  recBtn.style.background = '#999';

  if (state.asrEngine === 'webspeech' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    _repracticeRecognition = new SpeechRec();
    _repracticeRecognition.lang = 'zh-HK';
    _repracticeRecognition.continuous = false;
    _repracticeRecognition.interimResults = false;
    _repracticeRecognition.maxAlternatives = 3;
    try { _repracticeRecognition.start(); } catch(e) {
      status.innerHTML = '❌ 無法啟動錄音：' + e.message;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
      return;
    }
    _repracticeRecognition.onresult = (event) => {
      const alts = Array.from(event.results[0]).map(a => a.transcript.trim());
      _finishWordRepractice(alts, null);
    };
    _repracticeRecognition.onerror = (event) => {
      status.innerHTML = '❌ 錄音出錯：' + event.error;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    };
    _repracticeRecognition.onend = () => {
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    };
  } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      _repracticeRecorder = new MediaRecorder(stream);
      _repracticeChunks = [];
      _repracticeRecorder.ondataavailable = (e) => { if (e.data.size > 0) _repracticeChunks.push(e.data); };
      _repracticeRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(_repracticeChunks, { type: 'audio/webm' });
        _repracticeRecorder = null;
        // For non-webspeech engines we still get a blob; we can't transcribe without the engine.
        // Fall back to "recorded" confirmation only.
        _finishWordRepractice([], blob);
      };
      _repracticeRecorder.start();
      // 3-second auto-stop for single-word practice
      setTimeout(() => {
        if (_repracticeRecorder && _repracticeRecorder.state === 'recording') _repracticeRecorder.stop();
      }, 3000);
    }).catch(err => {
      status.innerHTML = '❌ 麥克風權限被拒：' + err.message;
      recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
    });
  } else {
    status.innerHTML = '❌ 此瀏覽器不支援錄音';
    recBtn.disabled = false; recBtn.textContent = '🎤 讀一次'; recBtn.style.background = '#ef4444';
  }
}

function _finishWordRepractice(alternatives, blob) {
  const status = document.getElementById('wordRepracticeStatus');
  const resultEl = document.getElementById('wordRepracticeResult');
  const target = _repracticeWord;
  const targetClean = _normText(target);
  // Check if any alternative contains the target (allows "明月光" vs "明月  光")
  let matched = false, closest = null;
  for (const alt of alternatives) {
    if (_normText(alt).includes(targetClean)) { matched = true; break; }
    // Track closest for feedback
    if (!closest || Math.abs(_normText(alt).length - targetClean.length) < Math.abs(_normText(closest).length - targetClean.length)) {
      closest = alt;
    }
  }
  if (alternatives.length === 0 && blob) {
    // Non-webspeech path: we have audio but no transcript
    status.innerHTML = '✅ 已錄音（需用 Web Speech 先比對）';
    resultEl.innerHTML = `<div style="background:#fef3c7;padding:10px;border-radius:10px;">錄咗音但冇 transcript 比對。建議喺 Engine Settings 揀 Web Speech 引擎再試。</div>`;
    return;
  }
  if (matched) {
    status.innerHTML = '✅ 讀啱咗！';
    resultEl.innerHTML = `<div style="background:#dcfce7;padding:12px;border-radius:10px;color:#16a34a;font-weight:bold;">🎉 呢個字過咗！可以揀下一個。</div>`;
  } else {
    status.innerHTML = `你讀咗：${_e(closest || '（無）')}`;
    resultEl.innerHTML = `<div style="background:#fee2e2;padding:12px;border-radius:10px;color:#dc2626;">
      ❌ 仲未啱。參考：
      <ol style="margin:6px 0 0 16px;padding:0;">
        <li>撳「🔊 聽示範」再聽一次</li>
        <li>大聲跟住讀</li>
        <li>再撳「🎤 讀一次」錄多一次</li>
      </ol>
    </div>`;
  }
}

function calculateSimilarity(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  return (longer.length - editDistance(longer, shorter)) / longer.length;
}

function editDistance(a, b) {
  const dp = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[0][i] = i;
  for (let j = 0; j <= b.length; j++) dp[j][0] = j;
  for (let j = 1; j <= b.length; j++) {
    for (let i = 1; i <= a.length; i++) {
      dp[j][i] = Math.min(
        dp[j-1][i] + 1,
        dp[j][i-1] + 1,
        dp[j-1][i-1] + (a[i-1] === b[j-1] ? 0 : 1)
      );
    }
  }
  return dp[b.length][a.length];
}

async function init() {
  // Load passages: try localStorage first, then inline defaults
  const savedPassages = localStorage.getItem('yuePassages');
  if (savedPassages) {
    try { state.passages = JSON.parse(savedPassages); } catch(e) { state.passages = _DEFAULT_PASSAGES; }
  } else {
    state.passages = _DEFAULT_PASSAGES;
  }

  const savedTypes = localStorage.getItem('yueTypes');
  if (savedTypes) {
    try { state.types = JSON.parse(savedTypes); } catch(e) { state.types = _DEFAULT_TYPES; }
  } else {
    state.types = _DEFAULT_TYPES;
  }

  // Apply enabled overrides
  const savedSettings = localStorage.getItem('yueAdminSettings');
  if (savedSettings) {
    try {
      const overrides = JSON.parse(savedSettings);
      state.types.forEach(t => { if (overrides[t.id] !== undefined) t.enabled = overrides[t.id]; });
    } catch(e) {}
  }

  // Load students + progress
  try {
    const sData = JSON.parse(localStorage.getItem('yueStudents') || '{}');
    state.students = Array.isArray(sData.students) ? sData.students : [];
  } catch(e) { state.students = []; }
  if (state.students.length === 0) {
    state.students = [{
      id: 's_demo',
      name: '示範同學',
      avatar: '🌟',
      color: '#f59e0b',
      createdAt: new Date().toISOString()
    }];
    _persistStudents();
  }
  // _migrateIfNeeded() both bumps the schema-version stamp AND normalizes
  // any stale progress entries that pre-date the current shape.
  _migrateIfNeeded();
  // Defensive fallback: if migration was skipped (already at current version)
  // or partially loaded, sanitize each student entry on read.
  for (const sid of Object.keys(state.progress)) {
    state.progress[sid] = _sanitizeProgress(state.progress[sid]);
  }

  setTimeout(() => { try { _seedDemoProgress(); } catch(e) { console.warn('[seed]', e); } }, 100);

  const savedEngine = localStorage.getItem('yueAsrEngine');
  if (savedEngine && _ASR_ENGINES[savedEngine]) {
    state.asrEngine = savedEngine;
  }

  // Recording is unlimited; legacy yueRecordingTimeout no longer used.
  state.recordingTimeout = null;

  state.mode = 'student';
  const lastStudent = localStorage.getItem('yueLastStudentId');
  if (lastStudent && state.students.find(s => s.id === lastStudent)) {
    state.currentStudentId = lastStudent;
  }

  _renderStudentGrid();
  updateProgress();
}

const _TEACHER_PASS_KEY = 'yueTeacherPassHash';

async function _hashTeacherPass(pass) {
  const data = new TextEncoder().encode(pass);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function enterTeacherMode() {
  // First-time setup: ask teacher to set a password (min 6 chars)
  let stored = localStorage.getItem(_TEACHER_PASS_KEY);
  if (!stored) {
    const pass = prompt('首次進入老師模式。請設定老師密碼（至少 6 個字元）：');
    if (!pass) return;
    if (pass.length < 6) { alert('密碼至少 6 個字元'); return; }
    const confirm = prompt('再輸入一次確認：');
    if (confirm !== pass) { alert('兩次輸入唔一致'); return; }
    const hash = await _hashTeacherPass(pass);
    localStorage.setItem(_TEACHER_PASS_KEY, hash);
    showToast('✅ 老師密碼已設定');
  } else {
    // Existing: ask for password
    const pass = prompt('請輸入老師密碼：');
    if (!pass) return;
    const hash = await _hashTeacherPass(pass);
    if (hash !== stored) { alert('❌ 密碼唔啱'); return; }
  }
  state.mode = 'teacher';
  goTo('teacher');
  tchSwitchTab('dashboard');
  showToast('🔧 老師模式');
}

function exitTeacherMode() {
  state.mode = 'student';
  goTo('home');
  showToast('👋 已退出老師模式');
}

function saveStudentFromModal() {
  const name = document.getElementById('sm_name').value.trim();
  if (!name) { alert('請填寫姓名'); return; }
  const color = document.getElementById('sm_color').value;
  const avatar = _selectedEmoji;
  if (_editingStudent.studentId === null) {
    const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    state.students.push({ id, name, color, avatar, createdAt: new Date().toISOString() });
  } else {
    const s = state.students.find(x => x.id === _editingStudent.studentId);
    if (s) { s.name = name; s.color = color; s.avatar = avatar; }
  }
  _persistStudents();
  closeStudentModal();
  renderStudentList();
  _renderStudentGrid();
  showToast('✅ 學生已儲存');
}

  document.getElementById('studentModal').style.display = 'none';

  const s = state.students.find(x => x.id === studentId);
  if (!s) return;
  if (s.id === 's_demo') {
    showToast('⚠️ 預設學生「示範同學」刪唔到（會自動恢復）');
    return;
  }
  showConfirm(`確定刪除「${s.name}」？所有練習記錄都會一齊刪除。`, () => {
    state.students = state.students.filter(x => x.id !== studentId);
    delete state.progress[studentId];
    if (state.currentStudentId === studentId) state.currentStudentId = null;
    _persistStudents();
    _persistProgress();
    renderStudentList();
    _renderLoginMode();
    showToast('🗑 學生已刪除');
  });
}
